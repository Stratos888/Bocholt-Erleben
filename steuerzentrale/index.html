<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Steuerzentrale · Bocholt erleben</title>
  <link rel="stylesheet" href="../css/style.css?v=2026-06-22-css-governance-v1">
</head>
<body class="cc-page" data-control-center-build="improvement-v1">
  <header class="cc-header">
    <div>
      <p class="cc-eyebrow">Bocholt erleben</p>
      <h1 id="cc-title">Übersicht</h1>
    </div>
    <div class="cc-header-actions">
      <button class="cc-icon-button" id="cc-refresh" type="button" aria-label="Aktualisieren">↻</button>
      <button class="cc-icon-button" id="cc-menu-button" type="button" aria-label="Menü öffnen" aria-expanded="false">⋯</button>
    </div>
  </header>

  <main class="cc-main" id="cc-main">
    <section class="cc-auth" id="cc-auth">
      <h2>Zugang</h2>
      <p>Die Steuerzentrale ist privat. Das Passwort wird nur für diese Sitzung verwendet.</p>
      <form id="cc-auth-form" class="cc-stack">
        <label class="cc-field"><span>Review-Passwort</span><input id="cc-password" type="password" autocomplete="current-password" required></label>
        <button class="cc-button cc-button--primary" type="submit">Steuerzentrale öffnen</button>
      </form>
    </section>

    <section id="cc-content" hidden>
      <div class="cc-status" id="cc-status" role="status" aria-live="polite"></div>
      <div id="cc-view"></div>
    </section>
  </main>

  <nav class="cc-nav" aria-label="Steuerzentrale">
    <button type="button" data-view="overview" class="is-active"><span>Übersicht</span></button>
    <button type="button" data-view="review"><span>Prüfen</span><b id="cc-badge-review" hidden></b></button>
    <button type="button" data-view="backlog"><span>Backlog</span><b id="cc-badge-backlog" hidden></b><b id="cc-badge-labor" hidden aria-hidden="true"></b></button>
    <button type="button" data-view="manage"><span>Verwaltung</span></button>
    <button type="button" data-view="development"><span>Entwicklung</span></button>
  </nav>

  <dialog id="cc-dialog" class="cc-dialog">
    <form method="dialog" class="cc-dialog__card" id="cc-dialog-form" novalidate>
      <button class="cc-dialog__close" id="cc-dialog-close" type="button" aria-label="Schließen">×</button>
      <div id="cc-dialog-body"></div>
    </form>
  </dialog>

  <script src="../js/control-center-environment.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-source-editors.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-final-bridge.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-seo-embed.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-stability.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-publication.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-development.js?v=2026-07-14-control-center-improvement-v1" defer></script>
  <script src="../js/control-center-integrations.js?v=2026-07-14-control-center-improvement-v1" defer></script>
</body>
</html>

name: Apply clean deploy release fix

on:
  push:
    branches:
      - fix/deploy-release-coherence-v2
    paths:
      - .github/workflows/apply-clean-deploy-release-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deploy-release-coherence-v2
          fetch-depth: 0

      - name: Apply bounded deploy patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply_deploy_release_coherence_patch.py
          git diff --check
          grep -q 'ORDERED_DEPLOY_RELEASE_PLAN_V1' .github/workflows/deploy-strato.yml
          grep -q 'STRATO_ORDERED_RELEASE_UPLOAD_V1' .github/workflows/deploy-strato.yml

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy-strato.yml
          git commit -m "fix: publish coherent build and service-worker release"
          git push origin HEAD:fix/deploy-release-coherence-v2

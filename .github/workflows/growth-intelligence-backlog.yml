# === BEGIN FILE: .github/workflows/growth-intelligence-backlog.yml | Zweck: erzeugt woechentlich deduplizierte Growth-/Acquisition-Backlog-Punkte aus GSC/GA4 ohne KI-Suchlauf-Kopplung; Umfang: kompletter Workflow ===
name: Growth Intelligence Backlog

on:
  # Wie bei den bestehenden sichtbaren Workflows: Push registriert den Workflow in GitHub Actions.
  push:
    branches: ["main", "staging"]
    paths:
      - ".github/workflows/growth-intelligence-backlog.yml"
      - "scripts/growth-intelligence-backlog.py"
      - "docs/GROWTH_INTELLIGENCE_BACKLOG.md"

  # Manuell im GitHub UI startbar (Actions → Workflow → Run workflow).
  # Bewusst ohne Inputs, damit GitHub den Button genauso wie bei Deploy to STRATO anzeigt.
  # Branch-Auswahl fuer main/staging kommt automatisch von GitHub.
  workflow_dispatch:

  schedule:
    # Woechentlich Montagmorgen: nach einer vollen Vorwoche neue Growth-/Acquisition-Hinweise sammeln.
    - cron: "20 5 * * 1"

permissions:
  contents: read

jobs:
  growth_intelligence_backlog:
    # Push ist absichtlich nur ein Sichtbarkeits-/Registrierungs-Trigger, damit GitHub den neuen Workflow
    # wie die bestehenden Workflows im Actions-Menue anzeigt. Echte Backlog-Erzeugung nur manuell oder geplant.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google API dependencies
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth pymysql

      - name: Resolve Growth runtime
        shell: bash
        env:
          LIVE_SHEET_ID: ${{ secrets.LIVE_SHEET_ID }}
          LEGACY_SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          set -e
          BE_SHEET_ID="${LIVE_SHEET_ID:-${LEGACY_SHEET_ID:-}}"
          if [ -z "$BE_SHEET_ID" ]; then
            echo "❌ LIVE_SHEET_ID oder SHEET_ID fehlt."
            exit 1
          fi

          echo "GROWTH_BACKLOG_TAB=Growth_Backlog" >> "$GITHUB_ENV"
          echo "GROWTH_REPORT_TAB=Growth_Intelligence_Report" >> "$GITHUB_ENV"
          echo "BE_SHEET_ID=$BE_SHEET_ID" >> "$GITHUB_ENV"
          echo "GROWTH_LOOKBACK_DAYS=30" >> "$GITHUB_ENV"
          echo "Growth lookback days: 30"

      - name: Update Growth Backlog
        timeout-minutes: 10
        shell: bash
        env:
          BE_SHEET_ID: ${{ env.BE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SEARCH_METRICS_GOOGLE_SITE_URL: ${{ secrets.SEARCH_METRICS_GOOGLE_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GROWTH_LOOKBACK_DAYS: ${{ env.GROWTH_LOOKBACK_DAYS }}
          GROWTH_BACKLOG_TAB: ${{ env.GROWTH_BACKLOG_TAB }}
          GROWTH_REPORT_TAB: ${{ env.GROWTH_REPORT_TAB }}
          BE_ENVIRONMENT: ${{ github.ref_name }}
          LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
          LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
          LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
          LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
          LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
        run: |
          set -e
          export GSC_SITE_URL="${GSC_SITE_URL:-${SEARCH_METRICS_GOOGLE_SITE_URL:-}}"
          python scripts/growth-intelligence-backlog.py

      # === BEGIN BLOCK: CONTENT_OPS_RECORD_GROWTH_IMPACT_V1 | Zweck: persistiert Growth-/Acquisition-Signale in der gemeinsamen Verwaltungs-Metrikschicht; Umfang: keine Aenderung an Backlog-Erzeugung ===
      - name: Record Content Ops growth impact
        if: always()
        shell: bash
        env:
          BE_ENVIRONMENT: ${{ github.ref_name == 'staging' && 'staging' || 'live' }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
          LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
          LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
          LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
          LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
        run: |
          set -e
          python scripts/content-ops-control.py record-growth

      - name: Upload growth content ops impact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: growth-content-ops-impact
          path: |
            data/growth-intelligence-summary.json
            data/content-ops/*.json
          if-no-files-found: ignore
      # === END BLOCK: CONTENT_OPS_RECORD_GROWTH_IMPACT_V1 ===
# === END FILE: .github/workflows/growth-intelligence-backlog.yml ===

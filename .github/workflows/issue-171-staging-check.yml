name: Check issue 171 on staging

on:
  push:
    branches:
      - fix/issue-171-responsive-grid-cache
    paths:
      - .github/workflows/issue-171-staging-check.yml

permissions:
  contents: write

jobs:
  staging-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout evidence branch
        uses: actions/checkout@v4
        with:
          ref: fix/issue-171-responsive-grid-cache
          fetch-depth: 0

      - name: Wait for responsive CSS on staging
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            css="$(curl --fail --silent --show-error --max-time 20 'https://staging.bocholt-erleben.de/css/home.css?issue171-check=1' || true)"
            if grep -Fq '@media (min-width: 1100px)' <<<"$css" && ! grep -Fq '@media (min-width: 900px) and (max-width: 1279.98px)' <<<"$css"; then
              printf '%s' "$css" > /tmp/staging-home.css
              echo "Staging serves the responsive contract."
              exit 0
            fi
            echo "Attempt $attempt/30: staging not updated yet."
            sleep 10
          done
          echo "Staging did not serve the expected responsive CSS within five minutes." >&2
          exit 1

      - name: Install browser runtime
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Measure real staging viewports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node --input-type=module <<'JS'
          import fs from 'node:fs/promises';
          import { chromium } from 'playwright';

          const baseUrl = 'https://staging.bocholt-erleben.de';
          const widths = [900, 1024, 1099, 1100, 1280, 1366, 1440, 1600, 1920];
          const browser = await chromium.launch({ headless: true });
          const results = [];
          let build = '';

          try {
            const response = await fetch(`${baseUrl}/meta/build.txt?issue171=${Date.now()}`, { cache: 'no-store' });
            build = response.ok ? (await response.text()).trim() : `HTTP ${response.status}`;
          } catch (error) {
            build = `unavailable: ${error.message}`;
          }

          try {
            for (const width of widths) {
              const context = await browser.newContext({
                viewport: { width, height: 900 },
                deviceScaleFactor: 1,
                ignoreHTTPSErrors: true,
              });
              const page = await context.newPage();
              const consoleErrors = [];
              page.on('console', (message) => {
                if (message.type() === 'error') consoleErrors.push(message.text());
              });

              const response = await page.goto(`${baseUrl}/events/?issue171=${Date.now()}-${width}`, {
                waitUntil: 'domcontentloaded',
                timeout: 30000,
              });
              if (!response || response.status() >= 500) {
                throw new Error(`Viewport ${width}: events page returned ${response?.status() ?? 'no response'}`);
              }
              await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
              const grid = page.locator('.events-feed-group__grid').first();
              await grid.waitFor({ state: 'visible', timeout: 20000 });
              const card = grid.locator('.event-card').first();
              await card.waitFor({ state: 'visible', timeout: 10000 });

              const metrics = await page.evaluate(() => {
                const gridElement = document.querySelector('.events-feed-group__grid');
                const cardElement = gridElement?.querySelector('.event-card');
                if (!gridElement || !cardElement) throw new Error('Event grid or card missing');
                const style = getComputedStyle(gridElement);
                const gridRect = gridElement.getBoundingClientRect();
                const cardRect = cardElement.getBoundingClientRect();
                const columnTokens = style.gridTemplateColumns === 'none'
                  ? []
                  : style.gridTemplateColumns.split(/\s+/).filter(Boolean);
                return {
                  display: style.display,
                  gridTemplateColumns: style.gridTemplateColumns,
                  computedColumns: style.display === 'grid' ? columnTokens.length : 1,
                  gridWidth: Math.round(gridRect.width * 100) / 100,
                  cardWidth: Math.round(cardRect.width * 100) / 100,
                  documentClientWidth: document.documentElement.clientWidth,
                  documentScrollWidth: document.documentElement.scrollWidth,
                };
              });

              const expectedColumns = width >= 1100 ? 2 : 1;
              if (metrics.computedColumns !== expectedColumns) {
                throw new Error(`Viewport ${width}: expected ${expectedColumns} columns, got ${metrics.computedColumns} (${metrics.gridTemplateColumns})`);
              }
              if (metrics.documentScrollWidth > metrics.documentClientWidth + 1) {
                throw new Error(`Viewport ${width}: horizontal overflow ${metrics.documentScrollWidth}/${metrics.documentClientWidth}`);
              }
              if (expectedColumns === 2 && metrics.cardWidth >= metrics.gridWidth * 0.75) {
                throw new Error(`Viewport ${width}: card remains too wide (${metrics.cardWidth}/${metrics.gridWidth})`);
              }
              if (expectedColumns === 1 && metrics.cardWidth < metrics.gridWidth * 0.9) {
                throw new Error(`Viewport ${width}: one-column card unexpectedly narrow (${metrics.cardWidth}/${metrics.gridWidth})`);
              }

              results.push({ width, expectedColumns, ...metrics, consoleErrors });
              await context.close();
            }
          } finally {
            await browser.close();
          }

          await fs.writeFile(
            'artifacts/issue-171-staging-evidence.json',
            `${JSON.stringify({ checkedAt: new Date().toISOString(), baseUrl, build, results }, null, 2)}\n`,
            'utf8',
          );
          JS

      - name: Commit staging evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/issue-171-staging-evidence.json
          git commit -m "test: record issue 171 staging viewport evidence"
          git push origin HEAD:fix/issue-171-responsive-grid-cache

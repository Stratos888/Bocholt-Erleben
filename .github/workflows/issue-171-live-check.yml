name: Diagnose issue 171 live asset state

on:
  push:
    branches:
      - fix/issue-171-responsive-grid-cache
    paths:
      - .github/workflows/issue-171-live-check.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout evidence branch
        uses: actions/checkout@v4
        with:
          ref: fix/issue-171-responsive-grid-cache

      - name: Install browser runtime
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Record live asset and service-worker state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node --input-type=module <<'JS'
          import fs from 'node:fs/promises';
          import { chromium } from 'playwright';

          const baseUrl = 'https://bocholt-erleben.de';
          const buildResponse = await fetch(`${baseUrl}/meta/build.txt?issue171=${Date.now()}`, { cache: 'no-store' });
          const build = (await buildResponse.text()).trim();
          const cssResponse = await fetch(`${baseUrl}/css/home.css?issue171=${Date.now()}`, { cache: 'no-store' });
          const cssText = await cssResponse.text();

          const browser = await chromium.launch({ headless: true });
          const results = [];
          try {
            const context = await browser.newContext({
              viewport: { width: 1366, height: 900 },
              deviceScaleFactor: 1,
              ignoreHTTPSErrors: true,
            });
            const page = await context.newPage();
            const consoleErrors = [];
            page.on('console', (message) => {
              if (message.type() === 'error') consoleErrors.push(message.text());
            });

            async function snapshot(phase) {
              const response = await page.goto(`${baseUrl}/events/?issue171=${phase}-${Date.now()}`, {
                waitUntil: 'domcontentloaded',
                timeout: 30000,
              });
              if (!response || response.status() >= 500) throw new Error(`${phase}: HTTP ${response?.status() ?? 'none'}`);
              await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
              const grid = page.locator('.events-feed-group__grid').first();
              await grid.waitFor({ state: 'visible', timeout: 20000 });
              const state = await page.evaluate(async () => {
                const gridElement = document.querySelector('.events-feed-group__grid');
                const styleLink = document.querySelector('link[rel="stylesheet"][href*="/css/style.css"]');
                const style = getComputedStyle(gridElement);
                const cacheNames = 'caches' in window ? await caches.keys() : [];
                const registrations = 'serviceWorker' in navigator
                  ? await navigator.serviceWorker.getRegistrations()
                  : [];
                return {
                  display: style.display,
                  gridTemplateColumns: style.gridTemplateColumns,
                  styleHref: styleLink?.href || '',
                  serviceWorkerController: Boolean(navigator.serviceWorker?.controller),
                  serviceWorkerScopes: registrations.map((entry) => entry.scope),
                  cacheNames,
                  documentClientWidth: document.documentElement.clientWidth,
                  documentScrollWidth: document.documentElement.scrollWidth,
                };
              });
              results.push({ phase, ...state });
            }

            await snapshot('fresh');
            await page.evaluate(async () => {
              if ('serviceWorker' in navigator) {
                await Promise.race([
                  navigator.serviceWorker.ready,
                  new Promise((_, reject) => setTimeout(() => reject(new Error('service worker readiness timeout')), 15000)),
                ]);
              }
            });
            await page.reload({ waitUntil: 'domcontentloaded', timeout: 30000 });
            await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
            await snapshot('warm-controlled');
            await context.close();
          } finally {
            await browser.close();
          }

          await fs.writeFile(
            'artifacts/issue-171-live-evidence.json',
            `${JSON.stringify({
              checkedAt: new Date().toISOString(),
              baseUrl,
              build,
              rawCssHasNewContract: cssText.includes('@media (min-width: 1100px)'),
              rawCssHasOldContract: cssText.includes('@media (min-width: 900px) and (max-width: 1279.98px)'),
              results,
            }, null, 2)}\n`,
            'utf8',
          );
          JS

      - name: Commit diagnostic evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/issue-171-live-evidence.json
          git commit -m "test: record issue 171 live asset diagnosis"
          git push origin HEAD:fix/issue-171-responsive-grid-cache

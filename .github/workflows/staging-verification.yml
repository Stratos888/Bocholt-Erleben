name: Staging Verification

on:
  push:
    branches: ["staging"]
    paths:
      - "api/control-center/**"
      - "api/growth-backlog/**"
      - "api/growth-backlog-lib.php"
      - "api/events/public.php"
      - "steuerzentrale/**"
      - "js/control-center*.js"
      - "js/control-center/**"
      - "css/style.css"
      - "css/control-center*.css"
      - "data/control_center_repo_workpacks.json"
      - "data/control_center_editorial_contract.json"
      - "data/event_visual_pool.json"
      - "scripts/control-center-e4-synthetic.py"
      - "scripts/resolve-deploy-target.sh"
      - "scripts/merge_events_overlay.py"
      - "tests/control_center_runtime_preflight_contract_test.php"
      - "tests/test_deploy_branch_routing.sh"
      - "tests/test_events_overlay_merge.py"
      - ".github/workflows/control-center-ci.yml"
      - ".github/workflows/control-center-e4-synthetic.yml"
      - ".github/workflows/staging-verification.yml"
      - ".github/workflows/deploy-strato.yml"
      - "docs/workpacks/active/CURRENT_WORKPACK.md"

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: staging-verification-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Staging Verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL: https://staging.bocholt-erleben.de
      REVIEW_PASSWORD: ${{ secrets.STAGING_REVIEW_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize verification
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          EXPECTED_BUILD="$(git rev-parse --short=12 HEAD)"
          echo "EXPECTED_BUILD=$EXPECTED_BUILD" >> "$GITHUB_ENV"
          export EXPECTED_BUILD
          python3 - <<'PY'
          import json, os, urllib.request
          api = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GH_TOKEN"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }
          for context, description in (
              ("deploy/staging-observed", f"Observing staging deploy for {sha[:12]}"),
              ("control-center/runtime-preflight-e3", f"E3 waiting for staging build {os.environ['EXPECTED_BUILD']}"),
          ):
              request = urllib.request.Request(
                  f"{api}/repos/{repo}/statuses/{sha}",
                  data=json.dumps({
                      "state": "pending",
                      "target_url": run_url,
                      "description": description[:140],
                      "context": context,
                  }).encode(),
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=30):
                  pass
          PY

      - name: Observe matching Deploy to STRATO run
        id: deploy
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, time, urllib.parse, urllib.request
          from pathlib import Path
          api = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "bocholt-erleben-staging-verification",
          }
          url = (
              f"{api}/repos/{repo}/actions/workflows/"
              f"{urllib.parse.quote('deploy-strato.yml', safe='')}/runs"
              "?branch=staging&event=push&per_page=50"
          )
          run = None
          for attempt in range(1, 91):
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=30) as response:
                  runs = json.loads(response.read().decode()).get("workflow_runs", [])
              matches = [item for item in runs if item.get("head_sha") == sha]
              if matches:
                  matches.sort(key=lambda item: int(item.get("run_attempt") or 0), reverse=True)
                  run = matches[0]
                  print(f"deploy={run.get('id')} status={run.get('status')} conclusion={run.get('conclusion')} attempt={attempt}")
                  if run.get("status") == "completed":
                      break
              time.sleep(10)
          if not run or run.get("status") != "completed":
              run = dict(run or {})
              run.update({"status": run.get("status", "missing"), "conclusion": "failure"})
          evidence = {
              "schema": 1,
              "expected_head_sha": sha,
              "observed_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "run": {
                  key: run.get(key)
                  for key in ("id", "status", "conclusion", "html_url", "head_sha", "run_attempt", "created_at", "updated_at")
              },
          }
          Path("artifacts/staging-deploy.json").write_text(json.dumps(evidence, indent=2) + "\n")
          if run.get("conclusion") != "success":
              raise SystemExit(f"Matching deploy did not succeed: {run}")
          PY

      - name: Validate local E3 contract
        if: steps.deploy.outcome == 'success'
        run: |
          set -euo pipefail
          php -l api/control-center/_runtime_preflight.php
          php -l api/control-center/preflight.php
          php tests/control_center_runtime_preflight_contract_test.php

      - name: Confirm matching staging build
        id: build
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            ACTUAL_BUILD="$(curl -fsSL --connect-timeout 5 --max-time 8 "$BASE_URL/meta/build.txt?attempt=$attempt" 2>/dev/null | tr -d '\r\n' || true)"
            printf '%s' "$ACTUAL_BUILD" > artifacts/last-build.txt
            if [ "$ACTUAL_BUILD" = "$EXPECTED_BUILD" ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Prove non-frozen read-only runtime plan
        id: e3
        if: steps.deploy.outcome == 'success' && steps.build.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -n "$REVIEW_PASSWORD"
          python3 - <<'PY'
          import json, os, urllib.error, urllib.request
          from pathlib import Path

          base = os.environ["BASE_URL"].rstrip("/")
          headers = {
              "Accept": "application/json",
              "X-BE-Review-Password": os.environ["REVIEW_PASSWORD"],
          }

          def request_json(path, method="GET", body=None):
              data = None
              request_headers = dict(headers)
              if body is not None:
                  data = json.dumps(body, ensure_ascii=False).encode()
                  request_headers["Content-Type"] = "application/json; charset=utf-8"
              request = urllib.request.Request(base + path, data=data, headers=request_headers, method=method)
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      return response.status, json.loads(response.read().decode())
              except urllib.error.HTTPError as error:
                  raw = error.read().decode(errors="replace")
                  try:
                      payload = json.loads(raw)
                  except json.JSONDecodeError:
                      payload = {"status": "error", "message": raw}
                  return error.code, payload

          status, payload = request_json("/api/control-center/cases.php?active=1")
          if status != 200 or payload.get("status") != "ok":
              raise SystemExit(f"Cases read failed: HTTP {status}")

          eligible = []
          frozen_skipped = []
          for item in payload.get("data", {}).get("items", []):
              if not isinstance(item, dict):
                  continue
              source = item.get("source", {})
              if not isinstance(source, dict) or source.get("system") != "inbox_feed":
                  continue
              case_id = str(item.get("id", "")).strip()
              haystack = " ".join((
                  str(item.get("title", "")),
                  str(item.get("object_id", "")),
                  str(source.get("reference", "")),
              )).casefold()
              if not case_id:
                  continue
              if "cityart" in haystack:
                  frozen_skipped.append({"id": case_id, "reason": "explicitly frozen fachfall"})
                  continue
              eligible.append((case_id, item))

          eligible.sort(key=lambda pair: pair[0])
          selected = None
          rejected = []
          for case_id, item in eligible:
              http, result = request_json(
                  "/api/control-center/preflight.php",
                  method="POST",
                  body={"case_id": case_id, "action": "approve", "payload": {}},
              )
              data = result.get("data", {}) if isinstance(result, dict) else {}
              if (
                  http == 200
                  and result.get("status") == "ok"
                  and data.get("mutation") is False
                  and data.get("allowed") is True
                  and data.get("blockers") == []
              ):
                  selected = (case_id, item, data)
                  break
              rejected.append({"id": case_id, "http": http, "blockers": data.get("blockers", [])})

          if selected is None:
              raise SystemExit(
                  "No non-frozen case produced an allowed read-only preflight: "
                  + json.dumps({"frozen": frozen_skipped, "rejected": rejected[:10]}, ensure_ascii=False)
              )

          case_id, item, data = selected
          runtime = data.get("runtime", {})
          build = runtime.get("build", {})
          resources = data.get("resources", {})
          source = data.get("source_snapshot", {})
          target = data.get("target_snapshot", {})
          selected_text = " ".join((
              str(item.get("title", "")),
              str(item.get("object_id", "")),
              str((item.get("source", {}) or {}).get("reference", "")),
          )).casefold()

          assertions = {
              "frozen_case_excluded": "cityart" not in selected_text,
              "mutation_false": data.get("mutation") is False,
              "allowed": data.get("allowed") is True,
              "no_blockers": data.get("blockers") == [],
              "build_matches": build.get("build_id") == os.environ["EXPECTED_BUILD"],
              "manifest_matches": build.get("manifest_build") == os.environ["EXPECTED_BUILD"],
              "staging_environment": (
                  build.get("manifest_environment") == "staging"
                  and runtime.get("resolved_environment") == "staging"
                  and runtime.get("configured_environment") == "staging"
              ),
              "staging_host": runtime.get("request", {}).get("host") == "staging.bocholt-erleben.de",
              "preflight_endpoint": runtime.get("request", {}).get("request_path") == "/api/control-center/preflight.php",
              "staging_resources": resources.get("source_tab") == "Inbox_Staging" and resources.get("target_tab") == "Events_Staging",
              "expected_writer": data.get("writer") == "be_cc_writeback_staging_inbox_approve_verified",
              "source_resolved": source.get("tab") == "Inbox_Staging" and source.get("resolution_status") == "resolved" and int(source.get("row_number") or 0) > 0,
              "target_read_only": target.get("tab") == "Events_Staging" and target.get("resolution_status") in {"absent", "resolved"},
              "live_unused": resources.get("live_inbox") == "not_used" and resources.get("live_events") == "not_used",
          }
          failed = [name for name, passed in assertions.items() if not passed]
          if failed:
              raise SystemExit("E3 assertions failed: " + ", ".join(failed))

          evidence = {
              "schema": 3,
              "evidence_level": "E3",
              "expected_build": os.environ["EXPECTED_BUILD"],
              "selected_case": {
                  "id": case_id,
                  "title": item.get("title", ""),
                  "source": item.get("source", {}),
              },
              "frozen_cases_skipped": frozen_skipped,
              "preflight": data,
              "assertions": assertions,
          }
          Path("artifacts/runtime-preflight.json").write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + "\n"
          )
          PY

      - name: Upload combined staging evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-verification-${{ github.run_number }}
          path: |
            artifacts/staging-deploy.json
            artifacts/runtime-preflight.json
            artifacts/last-build.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Publish final verification statuses and fail closed
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          E3_OUTCOME: ${{ steps.e3.outcome }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, urllib.request
          from pathlib import Path
          api = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GH_TOKEN"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          deploy = {}
          if Path("artifacts/staging-deploy.json").is_file():
              deploy = json.loads(Path("artifacts/staging-deploy.json").read_text()).get("run", {})
          deploy_ok = os.environ.get("DEPLOY_OUTCOME") == "success" and deploy.get("conclusion") == "success"
          e3_ok = (
              deploy_ok
              and os.environ.get("BUILD_OUTCOME") == "success"
              and os.environ.get("E3_OUTCOME") == "success"
              and Path("artifacts/runtime-preflight.json").is_file()
          )
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }
          statuses = (
              ("deploy/staging-observed", deploy_ok, deploy.get("html_url") or run_url,
               f"Deploy {'succeeded' if deploy_ok else 'failed'} for {sha[:12]}"),
              ("control-center/runtime-preflight-e3", e3_ok, run_url,
               "E3: non-frozen case; Inbox_Staging -> Events_Staging; mutation=false"
               if e3_ok else "E3 blocked"),
          )
          for context, success, target, description in statuses:
              request = urllib.request.Request(
                  f"{api}/repos/{repo}/statuses/{sha}",
                  data=json.dumps({
                      "state": "success" if success else "failure",
                      "target_url": target,
                      "description": description[:140],
                      "context": context,
                  }).encode(),
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=30):
                  pass
          if not (deploy_ok and e3_ok):
              raise SystemExit("Staging verification failed closed.")
          PY

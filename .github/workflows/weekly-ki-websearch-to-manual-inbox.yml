name: Weekly KI Websearch → Live Inbox

on:
  workflow_dispatch:
  schedule:
    # Dienstag 05:15 UTC = 07:15 MESZ / 06:15 MEZ
    - cron: "15 5 * * 2"

permissions:
  contents: read

concurrency:
  group: weekly-ki-websearch-live-inbox
  cancel-in-progress: false

jobs:
  weekly_ki_event_discovery:
    name: Discover and append verified KI event candidates
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth openai pymysql

      - name: Guard production KI branch
        run: |
          set -e
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "❌ Weekly KI Websearch darf nur auf main laufen."
            exit 1
          fi

      - name: Generate weekly KI candidates
        id: generate_candidates
        env:
          SHEET_ID: ${{ secrets.LIVE_SHEET_ID || secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
          EVENT_RULEBOOK_PATH: bocholt-erleben_eventsuche_regelwerk_v3.md
          MANUAL_INBOX_JSON_PATH: data/inbox_manual.json
          SOURCE_CANDIDATES_JSON_PATH: data/source_candidates.json
          TAB_EVENTS: Events
          TAB_INBOX: Inbox
          TAB_ARCHIVE: Inbox_Archive
          TAB_CONTENT_SEARCH_FEEDBACK: Content_Search_Feedback
          MAX_NEW_CANDIDATES: "24"
          SEARCH_WINDOW_DAYS: "210"
          ALLOW_RADIUS_KM: "20"
          WARN_ON_PENDING_INBOX: "true"
          FAIL_ON_PENDING_MANUAL: "false"
        run: |
          set -e
          python scripts/weekly-ki-websearch-to-manual-inbox.py

          MANUAL_HAS_ITEMS="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/inbox_manual.json")
          payload = json.loads(path.read_text(encoding="utf-8")) if path.exists() else []
          print("true" if isinstance(payload, list) and payload else "false")
          PY
          )"
          echo "manual_has_items=${MANUAL_HAS_ITEMS}" >> "$GITHUB_OUTPUT"

      - name: Append generated candidates to live Inbox
        id: append_inbox_sheet
        if: steps.generate_candidates.outputs.manual_has_items == 'true'
        env:
          SHEET_ID: ${{ secrets.LIVE_SHEET_ID || secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INBOX_TAB: Inbox
          EVENTS_TAB: Events
        run: |
          set -e
          python scripts/manual_ki_event_intake.py

      - name: Notify inbox push after appended KI candidates
        if: steps.generate_candidates.outputs.manual_has_items == 'true' && steps.append_inbox_sheet.outputs.appended_count != '0'
        env:
          LIVE_PUSH_SECRET: ${{ secrets.LIVE_PUSH_SECRET }}
          APPENDED_COUNT: ${{ steps.append_inbox_sheet.outputs.appended_count }}
        run: |
          set -e
          if [ -z "${LIVE_PUSH_SECRET:-}" ]; then
            echo "ℹ️ Push secret not configured. Skipping inbox push."
            exit 0
          fi

          payload=$(python - <<'PY'
          import json
          import os
          print(json.dumps({
              "source_type": "ki_inbox",
              "source_key": f"weekly-ki:{os.environ.get('GITHUB_RUN_ID', '')}:{os.environ.get('APPENDED_COUNT', '0')}",
          }))
          PY
          )

          curl -sS -X POST "https://bocholt-erleben.de/api/push/notify-inbox.php" \
            -H "Content-Type: application/json" \
            -H "X-BE-Push-Secret: ${LIVE_PUSH_SECRET}" \
            --data "$payload" \
            --max-time 15 || echo "⚠️ Inbox push call failed, intake continues."

      - name: Record Content Ops weekly KI impact
        if: always()
        env:
          BE_ENVIRONMENT: live
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEEKLY_DID_COMMIT: "false"
          WEEKLY_MANUAL_HAS_ITEMS: ${{ steps.generate_candidates.outputs.manual_has_items || 'false' }}
          LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
          LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
          LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
          LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
          LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
        run: python scripts/content-ops-control.py record-weekly-ki

      - name: Record Content Ops intake impact
        if: always()
        env:
          BE_ENVIRONMENT: live
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          APPENDED_COUNT: ${{ steps.append_inbox_sheet.outputs.appended_count || '0' }}
          RESET_DID_COMMIT: "false"
          LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
          LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
          LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
          LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
          LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
        run: python scripts/content-ops-control.py record-manual-intake

      - name: Upload weekly KI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ki-event-discovery
          path: |
            data/inbox_manual.json
            data/source_candidates.json
            data/manual-ki-intake-summary.json
            data/content-ops/*.json
            .tmp/weekly-ki-eventsuche/weekly_event_diagnostics.json
          if-no-files-found: warn

# === BEGIN BLOCK: WEEKLY KI WEBSEARCH TO MANUAL INBOX WORKFLOW (schedule + dispatch -> generate inbox_manual.json + trigger intake) ===
# Datei: .github/workflows/weekly-ki-websearch-to-manual-inbox.yml
# Zweck:
# - Startet die echte KI-Eventsuche automatisch 1x pro Woche
# - Nutzt den neuen Responses/Web-Search-Runner
# - Schreibt data/inbox_manual.json zurück ins Repo
# - Triggert danach automatisch den bestehenden Workflow "Manual KI Event Intake"
# Umfang:
# - Kein Parser-/Venue-Suchkern
# - Handoff in den bestehenden Intake-Flow direkt nach erfolgreichem Commit
# - Downstream-Dispatch bewusst per separatem Dispatch-Token statt GITHUB_TOKEN
# === END BLOCK: WEEKLY KI WEBSEARCH TO MANUAL INBOX WORKFLOW (schedule + dispatch -> generate inbox_manual.json + trigger intake) ===

name: Weekly KI Websearch → Manual Inbox

on:
  workflow_dispatch:
  schedule:
    # Montag 05:15 UTC
    - cron: "15 5 * * 1"

permissions:
  contents: write

concurrency:
  group: weekly-ki-websearch-manual-inbox
  cancel-in-progress: false

jobs:
  weekly_ki_websearch_manual_inbox:
    name: Generate data/inbox_manual.json via weekly KI web search
    runs-on: ubuntu-latest

    steps:
      # === BEGIN BLOCK: CHECKOUT REPOSITORY (input + commit target) ===
      # === END BLOCK: CHECKOUT REPOSITORY (input + commit target) ===
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # === BEGIN BLOCK: SETUP PYTHON RUNTIME (runner execution runtime) ===
      # === END BLOCK: SETUP PYTHON RUNTIME (runner execution runtime) ===
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # === BEGIN BLOCK: INSTALL RUNNER DEPENDENCIES (responses api + google sheets) ===
      # === END BLOCK: INSTALL RUNNER DEPENDENCIES (responses api + google sheets) ===
      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth openai

      # === BEGIN BLOCK: RUN WEEKLY KI WEBSEARCH GENERATOR (rulebook + snapshots + web search -> inbox_manual.json) ===
      # === END BLOCK: RUN WEEKLY KI WEBSEARCH GENERATOR (rulebook + snapshots + web search -> inbox_manual.json) ===
      - name: Run weekly KI websearch to manual inbox
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          OPENAI_MODEL: gpt-5.4
          EVENT_RULEBOOK_PATH: bocholt-erleben_eventsuche_regelwerk_v3.md
          MANUAL_INBOX_JSON_PATH: data/inbox_manual.json

          TAB_EVENTS: Events
          TAB_INBOX: Inbox
          TAB_ARCHIVE: Inbox_Archive

          MAX_NEW_CANDIDATES: "8"
          SEARCH_WINDOW_DAYS: "180"
          ALLOW_RADIUS_KM: "20"

          FAIL_ON_PENDING_INBOX: "true"
          FAIL_ON_PENDING_MANUAL: "true"
        run: |
          set -e
          python scripts/weekly-ki-websearch-to-manual-inbox.py

          echo "=== inbox_manual.json (head) ==="
          head -n 200 data/inbox_manual.json || true

      # === BEGIN BLOCK: COMMIT GENERATED MANUAL INBOX JSON (review buffer only) ===
      # === END BLOCK: COMMIT GENERATED MANUAL INBOX JSON (review buffer only) ===
      - name: Commit generated manual inbox JSON
        id: commit_manual_json
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/inbox_manual.json

          if git diff --cached --quiet; then
            echo "No manual inbox changes to commit."
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: generate weekly KI websearch manual inbox"
          git push
          echo "did_commit=true" >> "$GITHUB_OUTPUT"

      # === BEGIN BLOCK: TRIGGER EXISTING MANUAL KI EVENT INTAKE (automatic handoff into inbox review flow) ===
      # === END BLOCK: TRIGGER EXISTING MANUAL KI EVENT INTAKE (automatic handoff into inbox review flow) ===
      - name: Trigger Manual KI Event Intake
        if: steps.commit_manual_json.outputs.did_commit == 'true'
        env:
          WORKFLOW_DISPATCH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          set -e

          if [ -z "${WORKFLOW_DISPATCH_TOKEN}" ]; then
            echo "❌ Secret WORKFLOW_DISPATCH_TOKEN fehlt."
            exit 1
          fi

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${WORKFLOW_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/manual-ki-intake.yml/dispatches" \
            -d "{\"ref\":\"${TARGET_REF}\"}"

          echo "✅ Manual KI Event Intake workflow dispatched."

name: Control Center Validation

on:
  push:
    branches: ["staging", "main"]
    paths:
      - "api/control-center/**"
      - "steuerzentrale/**"
      - "js/control-center*.js"
      - "css/control-center.css"
      - "data/control_center_repo_workpacks.json"
      - "scripts/audit_control_center_product_contract.py"
      - "tests/control_center_contracts_test.php"
      - ".github/workflows/control-center-validation.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          find api/control-center -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l tests/control_center_contracts_test.php

      - name: Simulate control center contracts
        shell: bash
        run: php tests/control_center_contracts_test.php

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check js/control-center.js
          node --check js/control-center-source-editors.js
          node --check js/control-center-publication.js
          node --check js/control-center-development.js

      - name: Validate JSON manifests
        shell: bash
        run: python3 -m json.tool data/control_center_repo_workpacks.json >/dev/null

      - name: Validate product contract
        shell: bash
        run: python3 scripts/audit_control_center_product_contract.py

      - name: Validate required control center files
        shell: bash
        run: |
          set -euo pipefail
          test -s steuerzentrale/index.html
          test -s css/control-center.css
          test -s js/control-center.js
          test -s js/control-center-source-editors.js
          test -s js/control-center-publication.js
          test -s js/control-center-development.js
          test -s data/control_center_repo_workpacks.json
          test -s scripts/audit_control_center_product_contract.py
          test -s tests/control_center_contracts_test.php
          test -s api/control-center/overview.php
          test -s api/control-center/cases.php
          test -s api/control-center/action.php
          test -s api/control-center/case.php
          test -s api/control-center/content.php
          test -s api/control-center/publication.php
          test -s api/control-center/development.php
          test -s api/control-center/deploy.php
          test -s api/control-center/_content_source.php
          test -s api/control-center/_content_history.php
          test -s api/control-center/_contracts.php
          test -s api/control-center/_github_repo.php
          test -s api/control-center/_schema.php
          test -s api/control-center/_domain.php
          test -s api/control-center/_presentation.php
          test -s api/control-center/_sources.php
          test -s api/control-center/_writeback.php
          test -s api/control-center/_submission_source.php
          test -s api/control-center/_submission_writeback.php

      - name: Validate security and source contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -R "be_require_review_access" api/control-center/*.php >/dev/null
          grep -q "X-BE-Review-Password" js/control-center.js
          grep -q "X-BE-Review-Password" js/control-center-source-editors.js
          grep -q "X-BE-Review-Password" js/control-center-publication.js
          grep -q "X-BE-Review-Password" js/control-center-development.js
          grep -q "source_reference" api/control-center/_schema.php
          grep -q "UNIQUE KEY uq_control_cases_source" api/control-center/_schema.php
          grep -q "control_content_changes" api/control-center/_schema.php
          grep -q "control_development_snapshots" api/control-center/_schema.php
          grep -q "source_payment_confirmed" api/control-center/_submission_source.php
          grep -q "_domain.php" api/control-center/cases.php
          grep -q "be_cc_list_cases" api/control-center/cases.php
          grep -q "be_cc_case_presentation" api/control-center/_domain.php
          grep -q "be_cc_sync_growth_backlog" api/control-center/_sources.php
          grep -q "be_cc_sync_repo_workpacks" api/control-center/_sources.php
          grep -q "be_cc_update_event_fields" api/control-center/content.php
          grep -q "be_cc_verify_public_change" api/control-center/publication.php
          grep -q "BE_GITHUB_REPO_TOKEN" api/control-center/_github_repo.php
          grep -q "editable' => false" api/control-center/_content_source.php
          grep -q "search_console_connected" api/control-center/development.php

name: Inbox Operations

on:
  workflow_dispatch:
  schedule:
    # Daily on the default branch: import approved live candidates, then archive
    # finalized rows. Manual staging runs perform cleanup only on staging tabs.
    - cron: "50 5 * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: inbox-operations-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  inbox_operations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth pymysql

      - name: Resolve environment-safe Inbox targets
        run: |
          set -e
          case "${GITHUB_REF_NAME}" in
            main)
              echo "TAB_EVENTS=Events" >> "$GITHUB_ENV"
              echo "TAB_INBOX=Inbox" >> "$GITHUB_ENV"
              echo "TAB_ARCHIVE=Inbox_Archive" >> "$GITHUB_ENV"
              echo "RUN_EVENT_IMPORT=true" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "TAB_EVENTS=Events_Staging" >> "$GITHUB_ENV"
              echo "TAB_INBOX=Inbox_Staging" >> "$GITHUB_ENV"
              echo "TAB_ARCHIVE=Inbox_Archive_Staging" >> "$GITHUB_ENV"
              echo "RUN_EVENT_IMPORT=false" >> "$GITHUB_ENV"
              ;;
            *)
              echo "❌ Inbox Operations supports only main and staging."
              exit 1
              ;;
          esac

      - name: Import approved live Inbox rows into Events
        id: import_events
        if: env.RUN_EVENT_IMPORT == 'true'
        env:
          SHEET_ID: ${{ secrets.LIVE_SHEET_ID || secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TAB_EVENTS: ${{ env.TAB_EVENTS }}
          TAB_INBOX: ${{ env.TAB_INBOX }}
        run: |
          set -e
          python scripts/inbox-to-events.py | tee import.log
          if grep -q "Events: neue Zeilen appended" import.log; then
            echo "did_import=true" >> "$GITHUB_OUTPUT"
          else
            echo "did_import=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive finalized Inbox rows
        env:
          SHEET_ID: ${{ secrets.LIVE_SHEET_ID || secrets.SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TAB_INBOX: ${{ env.TAB_INBOX }}
          TAB_ARCHIVE: ${{ env.TAB_ARCHIVE }}
        run: |
          set -e
          python scripts/inbox-archive-cleanup.py

      - name: Record Content Ops inbox impact
        if: always()
        env:
          BE_ENVIRONMENT: ${{ github.ref_name == 'staging' && 'staging' || 'live' }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
          LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
          LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
          LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
          LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
        run: python scripts/content-ops-control.py record-inbox-cleanup

      - name: Send Content Ops inbox impact to HTTP ingest
        if: always()
        env:
          CONTENT_OPS_INGEST_URL: ${{ secrets.CONTENT_OPS_INGEST_URL }}
          CONTENT_OPS_INGEST_TOKEN: ${{ secrets.CONTENT_OPS_INGEST_TOKEN }}
        run: python scripts/content-ops-http-ingest.py --input data/content-ops

      - name: Upload Inbox Operations evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inbox-operations-${{ github.ref_name }}
          path: |
            import.log
            data/inbox-cleanup-summary.json
            data/content-ops/*.json
          if-no-files-found: ignore

      - name: Trigger Deploy to STRATO after imported live events
        if: steps.import_events.outputs.did_import == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-strato.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "✅ Deploy workflow dispatched after live event import."

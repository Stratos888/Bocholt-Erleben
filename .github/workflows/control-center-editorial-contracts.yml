name: Control Center Editorial Contracts

on:
  pull_request:
    branches: ["staging"]
    paths: &editorial_paths
      - "api/control-center/_decision_contract.php"
      - "api/control-center/_editorial_contracts.php"
      - "api/control-center/_event_review_tasks.php"
      - "api/control-center/_event_review_task_support.php"
      - "api/control-center/_event_review_task_schedule_a.php"
      - "api/control-center/_event_review_task_schedule_b.php"
      - "api/control-center/_event_review_task_details.php"
      - "api/control-center/_event_review_task_visual.php"
      - "api/control-center/_event_review_task_result.php"
      - "api/control-center/_event_review_writeback.php"
      - "api/control-center/_sheet_identity.php"
      - "api/control-center/_operations.php"
      - "api/control-center/_editorial_feedback.php"
      - "api/control-center/_editorial_runtime.php"
      - "api/control-center/_source_reconciliation.php"
      - "api/control-center/_verified_source_writeback.php"
      - "api/control-center/_activity_audit_writeback.php"
      - "api/control-center/_inbox_decision_writeback.php"
      - "api/control-center/_sheet_inbox_source.php"
      - "api/control-center/_submission_source.php"
      - "api/control-center/_submission_writeback.php"
      - "api/control-center/_sources.php"
      - "api/control-center/_schema.php"
      - "api/control-center/action.php"
      - "js/control-center.js"
      - "js/control-center/**"
      - "css/control-center-exception-review.css"
      - "steuerzentrale/index.html"
      - "data/control_center_editorial_contract.json"
      - "data/content_ops_decision_classes.json"
      - "data/event_visual_pool.json"
      - "tests/fixtures/control_center_editorial_cases.json"
      - "tests/control_center_editorial_contracts_test.php"
      - "tests/control_center_presentation_contract_test.php"
      - "tests/control_center_exception_review_runtime_test.php"
      - "tests/test_event_visual_gap_backlog.py"
      - "tests/control_center_sheet_identity_test.php"
      - "tests/control_center_editorial_runtime_contract_test.php"
      - "tests/control_center_state_consistency_contract_test.php"
      - "tests/control_center_frontend_contract_test.mjs"
      - "scripts/audit_control_center_editorial_contracts.py"
      - "scripts/build-event-visual-gap-backlog.py"
      - "scripts/event_visual_motifs.py"
      - ".github/workflows/control-center-editorial-contracts.yml"
  push:
    branches: ["staging"]
    paths: *editorial_paths
  workflow_dispatch:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate contract JSON
        run: |
          python3 -m json.tool data/control_center_editorial_contract.json >/dev/null
          python3 -m json.tool data/content_ops_decision_classes.json >/dev/null
          python3 -m json.tool data/event_visual_pool.json >/dev/null
          python3 -m json.tool tests/fixtures/control_center_editorial_cases.json >/dev/null
      - name: Validate PHP syntax
        run: |
          php -l api/control-center/_decision_contract.php
          php -l api/control-center/_editorial_contracts.php
          php -l api/control-center/_event_review_tasks.php
          php -l api/control-center/_event_review_task_support.php
          php -l api/control-center/_event_review_task_schedule_a.php
          php -l api/control-center/_event_review_task_schedule_b.php
          php -l api/control-center/_event_review_task_details.php
          php -l api/control-center/_event_review_task_visual.php
          php -l api/control-center/_event_review_task_result.php
          php -l api/control-center/_event_review_writeback.php
          php -l api/control-center/_sheet_identity.php
          php -l api/control-center/_operations.php
          php -l api/control-center/_editorial_feedback.php
          php -l api/control-center/_editorial_runtime.php
          php -l api/control-center/_source_reconciliation.php
          php -l api/control-center/_verified_source_writeback.php
          php -l api/control-center/_activity_audit_writeback.php
          php -l api/control-center/_inbox_decision_writeback.php
          php -l api/control-center/_sheet_inbox_source.php
          php -l api/control-center/_submission_source.php
          php -l api/control-center/_submission_writeback.php
          php -l api/control-center/_sources.php
          php -l api/control-center/_schema.php
          php -l api/control-center/action.php
          php -l tests/control_center_editorial_contracts_test.php
          php -l tests/control_center_presentation_contract_test.php
          php -l tests/control_center_exception_review_runtime_test.php
          php -l tests/control_center_sheet_identity_test.php
          php -l tests/control_center_editorial_runtime_contract_test.php
          php -l tests/control_center_state_consistency_contract_test.php
      - name: Run editorial and state fixtures
        run: |
          php tests/control_center_editorial_contracts_test.php
          php tests/control_center_presentation_contract_test.php
          php tests/control_center_exception_review_runtime_test.php
          php tests/control_center_sheet_identity_test.php
          php tests/control_center_editorial_runtime_contract_test.php
          php tests/control_center_state_consistency_contract_test.php
          python3 tests/test_event_visual_gap_backlog.py
          node tests/control_center_frontend_contract_test.mjs
      - name: Audit editorial contract completeness
        run: python3 scripts/audit_control_center_editorial_contracts.py

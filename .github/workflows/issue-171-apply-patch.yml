name: Apply issue 171 responsive patch

on:
  push:
    branches:
      - fix/issue-171-responsive-grid-cache
    paths:
      - .github/workflows/issue-171-apply-patch.yml

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pilot branch
        uses: actions/checkout@v4
        with:
          ref: fix/issue-171-responsive-grid-cache
          fetch-depth: 0

      - name: Apply exact responsive contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("css/home.css")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  "@media (min-width: 900px) and (max-width: 1279.98px) {",
                  "@media (min-width: 900px) and (max-width: 1099.98px) {",
                  "single-column breakpoint",
              ),
              (
                  "@media (min-width: 1280px) {\n  .events-feed-group__grid{",
                  "@media (min-width: 1100px) {\n  .events-feed-group__grid{",
                  "two-column breakpoint",
              ),
              (
                  "zwischen 900px und 1279.98px",
                  "zwischen 900px und 1099.98px",
                  "single-column owner comment",
              ),
              (
                  "ab 1280px",
                  "ab 1100px",
                  "two-column owner comment",
              ),
          ]

          for old, new, label in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one {label} occurrence, found {count}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate bounded change
        shell: bash
        run: |
          set -euo pipefail
          python3 tests/test_responsive_grid_cache_contract.py
          python3 tools/audit-css-governance.py
          bash scripts/validate-repo.sh frontend

      - name: Commit responsive fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/home.css
          git diff --cached --check
          git commit -m "fix: apply responsive event grid breakpoint contract"
          git push origin HEAD:fix/issue-171-responsive-grid-cache

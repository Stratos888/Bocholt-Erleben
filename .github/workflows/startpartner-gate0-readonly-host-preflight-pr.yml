name: Startpartner Gate 0 read-only host DB preflight PR

on:
  pull_request:
    branches:
      - staging
    paths:
      - ".github/workflows/startpartner-gate0-readonly-host-preflight-pr.yml"
      - "tools/startpartner-gate0-readonly-host-preflight.php"

permissions:
  contents: read

jobs:
  preflight:
    if: github.head_ref == 'evidence/startpartner-gate0-readonly-preflight-2026-07-24'
    name: Host-local read-only schema inventory with cleanup
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      STRATO_FTP_SERVER: ${{ secrets.STRATO_FTP_SERVER }}
      STRATO_FTP_USERNAME: ${{ secrets.STRATO_FTP_USERNAME }}
      STRATO_FTP_PASSWORD: ${{ secrets.STRATO_FTP_PASSWORD }}
      STRATO_SFTP_PHASE_ATTEMPTS: "3"
      STRATO_SFTP_RETRY_BASE_SECONDS: "5"
      STRATO_SFTP_MAX_PARALLEL: "1"
    steps:
      - name: Checkout evidence branch
        uses: actions/checkout@v4

      - name: Install SFTP client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Upload, query and remove temporary read-only endpoint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence host-preflight-payload/api host-preflight-empty

          RUN_KEY="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(openssl rand -hex 8)"
          REMOTE_FILE="_startpartner_gate0_${RUN_KEY}.php"
          TOKEN="$(openssl rand -hex 32)"
          TOKEN_HASH="$(printf '%s' "$TOKEN" | sha256sum | awk '{print $1}')"
          echo "::add-mask::$TOKEN"

          export REMOTE_FILE TOKEN TOKEN_HASH
          python - <<'PY'
          import os
          from pathlib import Path

          source = Path('tools/startpartner-gate0-readonly-host-preflight.php').read_text(encoding='utf-8')
          source = source.replace('__TOKEN_HASH__', os.environ['TOKEN_HASH'])
          source = source.replace(
              "require dirname(__DIR__) . '/_bootstrap.php';",
              "require __DIR__ . '/_bootstrap.php';",
          )
          target = Path('host-preflight-payload/api') / os.environ['REMOTE_FILE']
          target.write_text(source, encoding='utf-8')
          PY
          php -l "host-preflight-payload/api/$REMOTE_FILE"

          printf 'rm -f "api/%s"\n' "$REMOTE_FILE" > host-preflight-delete.lftp

          cleanup() {
            set +e
            local cleanup_status=0
            DEPLOY_TARGET_DIR="." bash scripts/run_strato_sftp_phase.sh host-preflight-empty 1 host-preflight-delete.lftp || cleanup_status=1
            DEPLOY_TARGET_DIR="staging" bash scripts/run_strato_sftp_phase.sh host-preflight-empty 1 host-preflight-delete.lftp || cleanup_status=1
            printf 'cleanup_status=%s\n' "$cleanup_status" > evidence/startpartner-gate0-host-cleanup-status.txt
            set -e
            return "$cleanup_status"
          }
          trap 'cleanup || true' EXIT

          DEPLOY_TARGET_DIR="." bash scripts/run_strato_sftp_phase.sh host-preflight-payload 1
          DEPLOY_TARGET_DIR="staging" bash scripts/run_strato_sftp_phase.sh host-preflight-payload 1

          LIVE_URL="https://bocholt-erleben.de/api/$REMOTE_FILE"
          STAGING_URL="https://staging.bocholt-erleben.de/api/$REMOTE_FILE"

          curl -fsS --retry 3 --retry-delay 2 --connect-timeout 15 --max-time 120 \
            -H "X-BE-Evidence-Token: $TOKEN" \
            "${LIVE_URL}?run=${GITHUB_RUN_ID}" \
            -o evidence/startpartner-gate0-live-db-preflight.json

          curl -fsS --retry 3 --retry-delay 2 --connect-timeout 15 --max-time 120 \
            -H "X-BE-Evidence-Token: $TOKEN" \
            "${STAGING_URL}?run=${GITHUB_RUN_ID}" \
            -o evidence/startpartner-gate0-staging-db-preflight.json

          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          reports = {}
          for expected in ('live', 'staging'):
              path = Path(f'evidence/startpartner-gate0-{expected}-db-preflight.json')
              data = json.loads(path.read_text(encoding='utf-8'))
              if data.get('status') != 'PASS':
                  raise SystemExit(f'{expected}: report status is not PASS')
              if data.get('environment') != expected:
                  raise SystemExit(f'{expected}: unexpected environment {data.get("environment")!r}')
              if data.get('read_only_transaction_enforced') is not True:
                  raise SystemExit(f'{expected}: read-only transaction not enforced')
              if data.get('write_operations_executed') is not False:
                  raise SystemExit(f'{expected}: write flag is not false')
              if data.get('personal_rows_exported') is not False:
                  raise SystemExit(f'{expected}: personal-row flag is not false')
              if not isinstance(data.get('tables'), dict):
                  raise SystemExit(f'{expected}: table inventory missing')
              reports[expected] = data

          summary = {
              'report_type': 'startpartner_gate0_readonly_host_db_preflight_summary',
              'overall_status': 'PASS',
              'write_operations_executed': False,
              'personal_rows_exported': False,
              'environments': {
                  key: {
                      'status': value['status'],
                      'database_name_matches_config': value.get('database_name_matches_config'),
                      'existing_tables': sum(1 for item in value['tables'].values() if item.get('exists')),
                      'expected_tables': len(value['tables']),
                  }
                  for key, value in reports.items()
              },
          }
          serialized = json.dumps(summary, ensure_ascii=False, indent=2, sort_keys=True) + '\n'
          Path('evidence/startpartner-gate0-host-preflight-summary.json').write_text(serialized, encoding='utf-8')
          digest = hashlib.sha256(serialized.encode('utf-8')).hexdigest()
          Path('evidence/startpartner-gate0-host-preflight-summary.sha256').write_text(
              f'{digest}  startpartner-gate0-host-preflight-summary.json\n', encoding='utf-8'
          )
          print(f'summary_sha256={digest}')
          for environment, result in summary['environments'].items():
              print(f"{environment}: {result['status']} tables={result['existing_tables']}/{result['expected_tables']}")
          PY

          cleanup

          LIVE_CODE="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 45 "${LIVE_URL}?cleanup=${GITHUB_RUN_ID}")"
          STAGING_CODE="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 45 "${STAGING_URL}?cleanup=${GITHUB_RUN_ID}")"
          printf 'live_http_after_cleanup=%s\nstaging_http_after_cleanup=%s\n' "$LIVE_CODE" "$STAGING_CODE" \
            > evidence/startpartner-gate0-host-cleanup-http.txt
          [ "$LIVE_CODE" = "404" ]
          [ "$STAGING_CODE" = "404" ]
          trap - EXIT

      - name: Upload redacted host-preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startpartner-gate0-readonly-host-db-preflight-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 14

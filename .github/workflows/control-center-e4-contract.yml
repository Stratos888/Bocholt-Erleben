name: Control Center E4 Contract

on:
  pull_request:
    branches: ["staging"]
    paths:
      - "scripts/control-center-e4-synthetic.py"
      - ".github/workflows/control-center-e4-contract.yml"
      - ".github/workflows/control-center-e4-synthetic.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate E4 harness without external access
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/control-center-e4-synthetic.py
          python3 scripts/control-center-e4-synthetic.py --self-test

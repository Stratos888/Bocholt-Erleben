name: PR Gate

on:
  pull_request:
    branches: ["staging", "main"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce serial branch path
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$HEAD_REPOSITORY" = "$CURRENT_REPOSITORY"
          if [ "$BASE_REF" = "staging" ]; then
            exit 0
          fi
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" = "staging" ]; then
            exit 0
          fi
          echo "Allowed paths: feature branch -> staging, staging -> main."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository tools
        shell: bash
        env:
          CONTRACT_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/validate-repo.sh repository

      - name: Validate backend and data contracts
        shell: bash
        run: bash scripts/validate-repo.sh backend

      - name: Validate frontend contracts
        shell: bash
        run: bash scripts/validate-repo.sh frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install browser-smoke runtime
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Check real repository feed navigation
        shell: bash
        run: bash scripts/run-event-navigation-smokes.sh real

      - name: Check bounded synthetic navigation fixture
        shell: bash
        run: bash scripts/run-event-navigation-smokes.sh fixture

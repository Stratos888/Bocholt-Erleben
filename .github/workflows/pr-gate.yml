name: PR Gate

on:
  pull_request:
    branches: ["staging", "main"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce serial branch path
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$HEAD_REPOSITORY" = "$CURRENT_REPOSITORY"
          if [ "$BASE_REF" = "staging" ]; then
            exit 0
          fi
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" = "staging" ]; then
            exit 0
          fi
          echo "Allowed paths: feature branch -> staging, staging -> main."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository tools
        shell: bash
        run: bash scripts/validate-repo.sh repository

      - name: Validate backend and data contracts
        shell: bash
        run: bash scripts/validate-repo.sh backend

      - name: Validate frontend contracts
        shell: bash
        run: bash scripts/validate-repo.sh frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install browser-smoke runtime
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Run browser-smoke against PR build
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8765 >/tmp/bocholt-erleben-pr-gate-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8765/events/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8765/events/ >/dev/null
          node scripts/browser-smoke.mjs             --base-url http://127.0.0.1:8765             --profile all             --out-dir /tmp/browser-smoke

name: PR Gate

on:
  pull_request:
    branches: ["staging", "main"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce serial branch path
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$HEAD_REPOSITORY" = "$CURRENT_REPOSITORY"
          if [ "$BASE_REF" = "staging" ]; then
            exit 0
          fi
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" = "staging" ]; then
            exit 0
          fi
          echo "Allowed paths: feature branch -> staging, staging -> main."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Capture repository validation
        id: repository_validation
        continue-on-error: true
        shell: bash
        run: bash scripts/validate-repo.sh repository > repository-validation.log 2>&1

      - name: Upload repository validation diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-diagnostic
          path: repository-validation.log
          if-no-files-found: error

      - name: Fail on repository validation error
        if: steps.repository_validation.outcome != 'success'
        run: exit 1

      - name: Validate backend and data contracts
        shell: bash
        run: bash scripts/validate-repo.sh backend

      - name: Validate frontend contracts
        shell: bash
        run: bash scripts/validate-repo.sh frontend

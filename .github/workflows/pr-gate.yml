name: PR Gate

on:
  pull_request:
    branches: ["staging", "main"]
    types: [opened, synchronize, reopened, ready_for_review, edited]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read

jobs:
  validate:
    name: PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce serial branch path
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$HEAD_REPOSITORY" = "$CURRENT_REPOSITORY"
          if [ "$BASE_REF" = "staging" ]; then
            exit 0
          fi
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" = "staging" ]; then
            exit 0
          fi
          echo "Allowed paths: feature branch -> staging, staging -> main."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate active workpack PR contract
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/validate_pr_contract.py

      - name: Check patch whitespace
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Validate full repository
        shell: bash
        run: |
          set -o pipefail
          bash scripts/validate-repo.sh 2>&1 | tee "${RUNNER_TEMP}/repository-validation.log"

      - name: Upload repository validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/repository-validation.log
          if-no-files-found: warn

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install browser-smoke runtime
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Run bounded synthetic event-navigation contract
        shell: bash
        env:
          SMOKE_OUT_DIR: ${{ runner.temp }}/browser-smoke-synthetic
        run: bash scripts/run-event-navigation-fixture-smoke.sh

      - name: Run bounded mobile exception-review contract
        shell: bash
        env:
          SMOKE_OUT_DIR: ${{ runner.temp }}/browser-smoke-control-center-mobile
        run: bash scripts/run-control-center-mobile-exception-review-smoke.sh

      - name: Upload bounded synthetic browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-event-navigation-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/browser-smoke-synthetic/
          if-no-files-found: warn

      - name: Upload mobile exception-review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-center-mobile-exception-review-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/browser-smoke-control-center-mobile/
          if-no-files-found: warn

name: PR Gate

on:
  pull_request:
    branches: ["staging", "main"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Inventory workflow files before checkout
        uses: actions/github-script@v8
        with:
          script: |
            const headSha = String(context.payload.pull_request?.head?.sha || "");
            const response = await github.rest.git.getTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tree_sha: headSha,
              recursive: "true",
            });
            const paths = response.data.tree
              .map((entry) => String(entry.path || ""))
              .filter((path) => /^\.github\/workflows\/[^/]+\.ya?ml$/.test(path))
              .sort();
            core.setFailed(`WORKFLOW_INVENTORY=${paths.join(",")}`);

      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce serial branch path
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$HEAD_REPOSITORY" = "$CURRENT_REPOSITORY"
          if [ "$BASE_REF" = "staging" ]; then
            exit 0
          fi
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" = "staging" ]; then
            exit 0
          fi
          echo "Allowed paths: feature branch -> staging, staging -> main."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate backend and data contracts
        shell: bash
        run: bash scripts/validate-repo.sh backend

      - name: Validate frontend contracts
        shell: bash
        run: bash scripts/validate-repo.sh frontend

      - name: Validate repository tools
        shell: bash
        run: bash scripts/validate-repo.sh repository

name: Startpartner Gate 0 read-only DB preflight

on:
  push:
    branches:
      - "evidence/startpartner-gate0-readonly-preflight-2026-07-24"
    paths:
      - ".github/workflows/startpartner-gate0-readonly-preflight.yml"

permissions:
  contents: read

jobs:
  preflight:
    name: Read-only schema and aggregate inventory
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    env:
      STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
      STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
      STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
      STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
      STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
      LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
      LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
      LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
      LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install read-only client dependency
        shell: bash
        run: python -m pip install --disable-pip-version-check pymysql==1.1.1

      - name: Query redacted schema metadata and aggregates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          python - <<'PY'
          import datetime as dt
          import hashlib
          import json
          import os
          from pathlib import Path

          import pymysql

          TABLES = [
              "organizers",
              "submissions",
              "subscriptions",
              "publication_entitlements",
              "publication_consumptions",
              "organizer_magic_links",
              "organizer_portal_sessions",
              "webhook_events",
              "value_metric_daily",
              "control_cases",
              "control_case_events",
          ]

          AGGREGATES = {
              "organizers": [
                  ("total", "SELECT COUNT(*) AS count_value FROM organizers"),
              ],
              "submissions": [
                  ("by_status_kind_model_payment_origin", """
                      SELECT status, submission_kind, requested_model_key, payment_kind,
                             COALESCE(intake_origin, '') AS intake_origin,
                             COUNT(*) AS count_value
                      FROM submissions
                      GROUP BY status, submission_kind, requested_model_key, payment_kind, COALESCE(intake_origin, '')
                      ORDER BY status, submission_kind, requested_model_key, payment_kind, intake_origin
                  """),
              ],
              "subscriptions": [
                  ("by_provider_plan_status", """
                      SELECT source_provider, plan_key, status, COUNT(*) AS count_value
                      FROM subscriptions
                      GROUP BY source_provider, plan_key, status
                      ORDER BY source_provider, plan_key, status
                  """),
              ],
              "publication_entitlements": [
                  ("by_source_plan_status_unlimited", """
                      SELECT source_type, COALESCE(plan_key, '') AS plan_key, status, is_unlimited,
                             COUNT(*) AS count_value,
                             COALESCE(SUM(included_publications), 0) AS included_publications,
                             COALESCE(SUM(consumed_publications), 0) AS consumed_publications
                      FROM publication_entitlements
                      GROUP BY source_type, COALESCE(plan_key, ''), status, is_unlimited
                      ORDER BY source_type, plan_key, status, is_unlimited
                  """),
              ],
              "publication_consumptions": [
                  ("by_reason", """
                      SELECT consumed_reason, COUNT(*) AS count_value, COALESCE(SUM(units), 0) AS units
                      FROM publication_consumptions
                      GROUP BY consumed_reason
                      ORDER BY consumed_reason
                  """),
              ],
              "organizer_magic_links": [
                  ("by_lifecycle", """
                      SELECT CASE
                                 WHEN consumed_at IS NOT NULL THEN 'consumed'
                                 WHEN revoked_at IS NOT NULL THEN 'revoked'
                                 WHEN expires_at < UTC_TIMESTAMP() THEN 'expired'
                                 ELSE 'active'
                             END AS lifecycle,
                             COUNT(*) AS count_value
                      FROM organizer_magic_links
                      GROUP BY lifecycle
                      ORDER BY lifecycle
                  """),
              ],
              "organizer_portal_sessions": [
                  ("by_lifecycle", """
                      SELECT CASE
                                 WHEN revoked_at IS NOT NULL THEN 'revoked'
                                 WHEN expires_at < UTC_TIMESTAMP() THEN 'expired'
                                 ELSE 'active'
                             END AS lifecycle,
                             COUNT(*) AS count_value
                      FROM organizer_portal_sessions
                      GROUP BY lifecycle
                      ORDER BY lifecycle
                  """),
              ],
              "webhook_events": [
                  ("by_provider_event_processed", """
                      SELECT provider, event_type, is_processed, COUNT(*) AS count_value
                      FROM webhook_events
                      GROUP BY provider, event_type, is_processed
                      ORDER BY provider, event_type, is_processed
                  """),
              ],
              "value_metric_daily": [
                  ("period", """
                      SELECT MIN(metric_date) AS oldest_metric_date,
                             MAX(metric_date) AS newest_metric_date,
                             COUNT(*) AS bucket_count,
                             COALESCE(SUM(count_value), 0) AS count_value
                      FROM value_metric_daily
                  """),
                  ("by_metric_and_target", """
                      SELECT metric_key, entity_type, reporting_target_type, source_context,
                             COUNT(*) AS bucket_count,
                             COALESCE(SUM(count_value), 0) AS count_value,
                             MIN(metric_date) AS oldest_metric_date,
                             MAX(metric_date) AS newest_metric_date
                      FROM value_metric_daily
                      GROUP BY metric_key, entity_type, reporting_target_type, source_context
                      ORDER BY metric_key, entity_type, reporting_target_type, source_context
                  """),
              ],
              "control_cases": [
                  ("by_type_state_priority_source", """
                      SELECT case_type, state, priority, source_system, decision_ready,
                             COUNT(*) AS count_value
                      FROM control_cases
                      GROUP BY case_type, state, priority, source_system, decision_ready
                      ORDER BY case_type, state, priority, source_system, decision_ready
                  """),
              ],
              "control_case_events": [
                  ("by_transition", """
                      SELECT action, COALESCE(from_state, '') AS from_state,
                             COALESCE(to_state, '') AS to_state,
                             COUNT(*) AS count_value
                      FROM control_case_events
                      GROUP BY action, COALESCE(from_state, ''), COALESCE(to_state, '')
                      ORDER BY action, from_state, to_state
                  """),
              ],
          }

          def json_value(value):
              if isinstance(value, (dt.datetime, dt.date, dt.time)):
                  return value.isoformat()
              if isinstance(value, bytes):
                  return value.decode("utf-8", errors="replace")
              return value

          def clean_rows(rows):
              return [
                  {str(key): json_value(value) for key, value in row.items()}
                  for row in rows
              ]

          def fetch_all(cursor, sql, params=()):
              cursor.execute(sql, params)
              return clean_rows(cursor.fetchall())

          def table_exists(cursor, database_name, table_name):
              cursor.execute(
                  """
                  SELECT COUNT(*) AS count_value
                  FROM INFORMATION_SCHEMA.TABLES
                  WHERE TABLE_SCHEMA = %s AND TABLE_NAME = %s
                  """,
                  (database_name, table_name),
              )
              return int(cursor.fetchone()["count_value"]) > 0

          def inspect_environment(label, prefix):
              values = {
                  "host": os.environ.get(f"{prefix}_DB_HOST", "").strip(),
                  "port": os.environ.get(f"{prefix}_DB_PORT", "").strip() or "3306",
                  "database": os.environ.get(f"{prefix}_DB_NAME", "").strip(),
                  "user": os.environ.get(f"{prefix}_DB_USER", "").strip(),
                  "password": os.environ.get(f"{prefix}_DB_PASSWORD", ""),
              }
              missing = [key for key, value in values.items() if key != "port" and value == ""]
              result = {
                  "environment": label,
                  "status": "FAIL" if missing else "PENDING",
                  "missing_configuration_keys": missing,
                  "database_name_matches_config": None,
                  "tables": {},
              }
              if missing:
                  return result

              connection = None
              try:
                  connection = pymysql.connect(
                      host=values["host"],
                      port=int(values["port"]),
                      user=values["user"],
                      password=values["password"],
                      database=values["database"],
                      charset="utf8mb4",
                      autocommit=False,
                      connect_timeout=20,
                      read_timeout=45,
                      write_timeout=45,
                      cursorclass=pymysql.cursors.DictCursor,
                  )
                  with connection.cursor() as cursor:
                      cursor.execute("START TRANSACTION READ ONLY")
                      cursor.execute("SELECT DATABASE() AS database_name")
                      selected_database = str(cursor.fetchone()["database_name"] or "")
                      result["database_name_matches_config"] = selected_database == values["database"]

                      for table_name in TABLES:
                          table_result = {
                              "exists": table_exists(cursor, selected_database, table_name),
                              "columns": [],
                              "indexes": [],
                              "foreign_keys": [],
                              "show_create_table": None,
                              "row_count": None,
                              "aggregates": {},
                          }
                          result["tables"][table_name] = table_result
                          if not table_result["exists"]:
                              continue

                          table_result["columns"] = fetch_all(
                              cursor,
                              """
                              SELECT ORDINAL_POSITION, COLUMN_NAME, COLUMN_TYPE, IS_NULLABLE,
                                     COLUMN_DEFAULT, EXTRA
                              FROM INFORMATION_SCHEMA.COLUMNS
                              WHERE TABLE_SCHEMA = %s AND TABLE_NAME = %s
                              ORDER BY ORDINAL_POSITION
                              """,
                              (selected_database, table_name),
                          )
                          table_result["indexes"] = fetch_all(
                              cursor,
                              """
                              SELECT INDEX_NAME, NON_UNIQUE, SEQ_IN_INDEX, COLUMN_NAME, INDEX_TYPE
                              FROM INFORMATION_SCHEMA.STATISTICS
                              WHERE TABLE_SCHEMA = %s AND TABLE_NAME = %s
                              ORDER BY INDEX_NAME, SEQ_IN_INDEX
                              """,
                              (selected_database, table_name),
                          )
                          table_result["foreign_keys"] = fetch_all(
                              cursor,
                              """
                              SELECT CONSTRAINT_NAME, COLUMN_NAME, REFERENCED_TABLE_NAME,
                                     REFERENCED_COLUMN_NAME
                              FROM INFORMATION_SCHEMA.KEY_COLUMN_USAGE
                              WHERE TABLE_SCHEMA = %s AND TABLE_NAME = %s
                                AND REFERENCED_TABLE_NAME IS NOT NULL
                              ORDER BY CONSTRAINT_NAME, ORDINAL_POSITION
                              """,
                              (selected_database, table_name),
                          )
                          cursor.execute(f"SHOW CREATE TABLE `{table_name}`")
                          create_row = cursor.fetchone()
                          table_result["show_create_table"] = str(
                              create_row.get("Create Table")
                              or create_row.get("Create View")
                              or ""
                          )
                          cursor.execute(f"SELECT COUNT(*) AS count_value FROM `{table_name}`")
                          table_result["row_count"] = int(cursor.fetchone()["count_value"])

                          for aggregate_name, aggregate_sql in AGGREGATES.get(table_name, []):
                              try:
                                  table_result["aggregates"][aggregate_name] = fetch_all(cursor, aggregate_sql)
                              except pymysql.MySQLError as error:
                                  table_result["aggregates"][aggregate_name] = {
                                      "status": "NOT_COMPATIBLE",
                                      "error_class": type(error).__name__,
                                  }

                      connection.rollback()
                  result["status"] = "PASS"
              except Exception as error:
                  if connection is not None:
                      try:
                          connection.rollback()
                      except Exception:
                          pass
                  result["status"] = "FAIL"
                  result["error_class"] = type(error).__name__
                  result["error_code"] = getattr(error, "args", [None])[0]
              finally:
                  if connection is not None:
                      connection.close()
              return result

          report = {
              "report_type": "startpartner_gate0_readonly_db_preflight",
              "generated_at_utc": dt.datetime.now(dt.timezone.utc).replace(microsecond=0).isoformat(),
              "repository": "Stratos888/Bocholt-Erleben",
              "branch": "evidence/startpartner-gate0-readonly-preflight-2026-07-24",
              "write_operations_executed": False,
              "personal_rows_exported": False,
              "environments": [
                  inspect_environment("staging", "STAGING"),
                  inspect_environment("live", "LIVE"),
              ],
          }
          report["overall_status"] = (
              "PASS" if all(item["status"] == "PASS" for item in report["environments"]) else "FAIL"
          )

          output_path = Path("evidence/startpartner-gate0-db-preflight.json")
          serialized = json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True) + "\n"
          output_path.write_text(serialized, encoding="utf-8")
          digest = hashlib.sha256(serialized.encode("utf-8")).hexdigest()
          Path("evidence/startpartner-gate0-db-preflight.sha256").write_text(
              f"{digest}  {output_path.name}\n", encoding="utf-8"
          )
          print(f"overall_status={report['overall_status']}")
          print(f"artifact_sha256={digest}")
          for item in report["environments"]:
              existing = sum(1 for table in item["tables"].values() if table.get("exists"))
              print(f"{item['environment']}: status={item['status']} existing_tables={existing}/{len(TABLES)}")
          PY

      - name: Upload redacted preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startpartner-gate0-readonly-db-preflight-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 14

      - name: Publish preflight summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          path = Path("evidence/startpartner-gate0-db-preflight.json")
          print("## Startpartner Gate 0 – read-only DB preflight")
          if not path.is_file():
              print("\n**FAIL:** Evidence file was not produced.")
              raise SystemExit(1)
          report = json.loads(path.read_text(encoding="utf-8"))
          print(f"\nOverall: **{report['overall_status']}**")
          print("\n| Environment | Status | Existing relevant tables |")
          print("|---|---:|---:|")
          for item in report["environments"]:
              existing = sum(1 for table in item["tables"].values() if table.get("exists"))
              print(f"| {item['environment']} | {item['status']} | {existing}/{len(item['tables'])} |")
          print("\nNo business write, migration, personal row export, mail, Stripe or publication action was executed.")
          if report["overall_status"] != "PASS":
              raise SystemExit(1)
          PY

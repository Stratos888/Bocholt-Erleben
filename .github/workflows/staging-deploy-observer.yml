name: Staging Deploy Observer

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: staging-deploy-observer-${{ github.sha }}
  cancel-in-progress: false

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Publish pending deploy status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/deploy-pending.json
          import json
          import os
          print(json.dumps({
              "state": "pending",
              "target_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "description": f"Observing Deploy to STRATO for {os.environ['GITHUB_SHA'][:12]}",
              "context": "deploy/staging-observed",
          }))
          PY
          curl -fsS --retry 3 --retry-all-errors \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data-binary @/tmp/deploy-pending.json

      - name: Observe matching deploy run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          api_url = os.environ["GITHUB_API_URL"].rstrip("/")
          repository = os.environ["GITHUB_REPOSITORY"]
          head_sha = os.environ["GITHUB_SHA"]
          token = os.environ["GH_TOKEN"]
          endpoint = (
              f"{api_url}/repos/{repository}/actions/workflows/"
              f"{urllib.parse.quote('deploy-strato.yml', safe='')}/runs"
              "?branch=staging&event=push&per_page=50"
          )
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "bocholt-erleben-deploy-observer",
          }

          observed = None
          for attempt in range(1, 91):
              request = urllib.request.Request(endpoint, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              matching = [
                  run for run in payload.get("workflow_runs", [])
                  if str(run.get("head_sha", "")) == head_sha
              ]
              if matching:
                  matching.sort(key=lambda run: int(run.get("run_attempt") or 0), reverse=True)
                  observed = matching[0]
                  print(
                      f"Deploy run {observed.get('id')} status={observed.get('status')} "
                      f"conclusion={observed.get('conclusion')} attempt={attempt}/90"
                  )
                  if observed.get("status") == "completed":
                      break
              else:
                  print(f"Matching deploy run not visible yet ({attempt}/90).")
              time.sleep(10)

          if not observed:
              observed = {
                  "id": None,
                  "status": "missing",
                  "conclusion": "failure",
                  "html_url": "",
                  "head_sha": head_sha,
                  "message": "No matching Deploy to STRATO run became visible.",
              }
          elif observed.get("status") != "completed":
              observed = dict(observed)
              observed["conclusion"] = "failure"
              observed["message"] = "Matching deploy run did not complete inside the bounded observation window."

          evidence = {
              "schema": 1,
              "observed_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "expected_head_sha": head_sha,
              "workflow": "deploy-strato.yml",
              "run": {
                  "id": observed.get("id"),
                  "status": observed.get("status"),
                  "conclusion": observed.get("conclusion"),
                  "html_url": observed.get("html_url", ""),
                  "head_sha": observed.get("head_sha", ""),
                  "run_attempt": observed.get("run_attempt"),
                  "created_at": observed.get("created_at"),
                  "updated_at": observed.get("updated_at"),
                  "message": observed.get("message", ""),
              },
          }
          Path("artifacts/staging-deploy-observer.json").write_text(
              json.dumps(evidence, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          if observed.get("status") != "completed" or observed.get("conclusion") != "success":
              raise SystemExit(
                  f"Deploy observation failed: status={observed.get('status')} "
                  f"conclusion={observed.get('conclusion')} run={observed.get('id')}"
              )
          PY

      - name: Upload deploy observer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-observer-${{ github.run_number }}
          path: artifacts/staging-deploy-observer.json
          if-no-files-found: warn

      - name: Publish final deploy status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          export CURRENT_JOB_STATUS
          python3 - <<'PY' > /tmp/deploy-final.json
          import json
          import os
          from pathlib import Path

          path = Path("artifacts/staging-deploy-observer.json")
          evidence = json.loads(path.read_text(encoding="utf-8")) if path.is_file() else {}
          run = evidence.get("run", {})
          run_id = run.get("id")
          conclusion = str(run.get("conclusion") or "failure")
          job_success = os.environ.get("CURRENT_JOB_STATUS") == "success"
          success = job_success and conclusion == "success"
          target_url = str(run.get("html_url") or "")
          if not target_url:
              target_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          if success:
              description = f"Deploy succeeded for {os.environ['GITHUB_SHA'][:12]} (run {run_id})"
          else:
              description = f"Deploy failed for {os.environ['GITHUB_SHA'][:12]} (run {run_id or 'missing'})"
          print(json.dumps({
              "state": "success" if success else "failure",
              "target_url": target_url,
              "description": description[:140],
              "context": "deploy/staging-observed",
          }))
          PY
          curl -fsS --retry 3 --retry-all-errors \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data-binary @/tmp/deploy-final.json

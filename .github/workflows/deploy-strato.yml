# =========================================================
# Deploy to STRATO (bocholt-erleben.de)
# Webroot: /STRATO-apps (Domain-Umleitung intern)
# Version File: /meta/build.txt (STRATO blockt .json Requests per Connection Reset)
# =========================================================

name: Deploy to STRATO

# === BEGIN BLOCK: WORKFLOW TRIGGERS (push + daily + manual) ===
on:
  push:
    branches: ["main", "staging"]

  # Manuell im GitHub UI startbar (Actions → Workflow → Run workflow)
  workflow_dispatch:

  # Täglich, damit der aus dem Google Sheet generierte Event-Feed aktuell bleibt.
  # Läuft weiterhin effektiv über den Default-Branch main.
  schedule:
    - cron: "15 5 * * *"
# === END BLOCK: WORKFLOW TRIGGERS (push + daily + manual) ===


concurrency:
  group: deploy-strato-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === BEGIN BLOCK: BUILD EVENTS + INBOX FEEDS (TSV -> JSON, fail-fast where needed) ===
      # Zweck:
      # - Google Sheet / Tab "Events" ist die einzige Quelle für redaktionelle Events.
      # - inbox.tsv ist die einzige Quelle für Inbox-Review.
      # - data/events.tsv + data/events.json werden nur in der Action generiert und nicht im Repo gepflegt.
      # - inbox.json wird in der Action generiert.
      # - Fail-Fast: Bei Fehlern KEIN Deploy.
      # Umfang:
      # - Exportiert Tabs "Events" und "Inbox" via Sheets API
      # - Führt scripts/build-events-from-tsv.py + scripts/build-inbox-from-tsv.py aus
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # === BEGIN BLOCK: GOOGLE SHEET → TSV EXPORTS (Events + Inbox, fail-fast) ===
      # Zweck:
      #   - Google Sheet ist die einzige Quelle (Fail-Fast, kein Fallback).
      #   - Exportiert gezielt die Tabs "Events" und "Inbox" via Sheets API.
      # Sicherheit:
      #   - Abbruch bei Auth-/Read-Fehlern oder fehlenden Pflichtspalten.
      # === BEGIN BLOCK: GOOGLE SHEET → TSV EXPORTS (Events + Inbox, fail-fast + retry-hardened) ===
      # Zweck:
      #   - Google Sheet bleibt die einzige Quelle (Fail-Fast, kein Fallback).
      #   - Transiente Read-/Timeout-Probleme werden sauber per Timeout + Retry + Backoff gehärtet.
      #   - Echte Strukturfehler (fehlende ENV, ungültiges JSON, fehlende Header) bleiben sofort fail-fast.
      - name: Install deps (Google Sheets API)
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      # === BEGIN BLOCK: DEPLOY_SHEET_AND_INBOX_TAB_TARGET_V2 | Zweck: nutzt ein gemeinsames Google Sheet, trennt aber Live-/Staging-Inbox ueber unterschiedliche Tabs; Umfang: setzt BE_SHEET_ID und INBOX_TAB_NAME fuer nachfolgende Exporte ===
      - name: Resolve Google Sheet and Inbox tab target
        shell: bash
        env:
          LIVE_SHEET_ID: ${{ secrets.LIVE_SHEET_ID }}
          LEGACY_SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          set -e

          BE_SHEET_ID="${LIVE_SHEET_ID:-${LEGACY_SHEET_ID:-}}"
          if [ -z "$BE_SHEET_ID" ]; then
            echo "❌ LIVE_SHEET_ID oder SHEET_ID fehlt."
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            INBOX_TAB_NAME="Inbox_Staging"
          else
            INBOX_TAB_NAME="Inbox"
          fi

          echo "BE_SHEET_ID=$BE_SHEET_ID" >> "$GITHUB_ENV"
          echo "INBOX_TAB_NAME=$INBOX_TAB_NAME" >> "$GITHUB_ENV"
          echo "✅ Google Sheet target resolved for ${GITHUB_REF_NAME}."
          echo "Inbox tab: $INBOX_TAB_NAME"
      # === END BLOCK: DEPLOY_SHEET_AND_INBOX_TAB_TARGET_V2 ===

      - name: Export Events tab to data/events.tsv (fail-fast, retry-hardened)
        timeout-minutes: 6
        shell: bash
        env:
          SHEET_ID: ${{ env.BE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          python - <<'PY'
          # === BEGIN BLOCK: EVENTS_TAB_EXPORT_RETRY_HARDENED ===
          import csv, json, os, sys, time, socket, ssl
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.errors import HttpError

          def fail(msg):
              print(f"❌ {msg}", file=sys.stderr)
              sys.exit(1)

          sheet_id = os.environ.get("SHEET_ID", "").strip()
          sa_json = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", "").strip()

          if not sheet_id:
              fail("ENV SHEET_ID fehlt.")
          if not sa_json:
              fail("ENV GOOGLE_SERVICE_ACCOUNT_JSON fehlt.")

          try:
              sa_info = json.loads(sa_json)
          except Exception:
              fail("GOOGLE_SERVICE_ACCOUNT_JSON ist kein gültiges JSON.")

          socket.setdefaulttimeout(90)

          scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"]
          creds = service_account.Credentials.from_service_account_info(sa_info, scopes=scopes)
          service = build("sheets", "v4", credentials=creds, cache_discovery=False)

          def fetch_values_with_retry(range_name, label, attempts=4):
              last_exc = None

              for attempt in range(1, attempts + 1):
                  try:
                      print(f"↻ {label}: Versuch {attempt}/{attempts}")
                      res = service.spreadsheets().values().get(
                          spreadsheetId=sheet_id,
                          range=range_name,
                          majorDimension="ROWS"
                      ).execute(num_retries=4)
                      return res.get("values", []) or []

                  except HttpError as exc:
                      status = getattr(exc.resp, "status", None)
                      retryable = status in (408, 429, 500, 502, 503, 504)
                      last_exc = exc

                      if (not retryable) or attempt >= attempts:
                          raise

                      wait_s = attempt * 5
                      print(f"⚠️ {label}: HttpError {status}, Retry in {wait_s}s", file=sys.stderr)
                      time.sleep(wait_s)

                  except (TimeoutError, socket.timeout, ssl.SSLError, OSError) as exc:
                      last_exc = exc

                      if attempt >= attempts:
                          raise

                      wait_s = attempt * 5
                      print(f"⚠️ {label}: {type(exc).__name__}, Retry in {wait_s}s", file=sys.stderr)
                      time.sleep(wait_s)

              raise last_exc or RuntimeError(f"{label}: unbekannter Exportfehler")

          rng = "Events!A:ZZ"
          values = fetch_values_with_retry(rng, "Events-Tab")

          if not values:
              fail("Events-Tab ist leer oder nicht lesbar.")

          header = [h.strip() for h in (values[0] or [])]
          required = ["id", "title", "date", "city", "location", "kategorie"]
          missing = [c for c in required if c not in header]
          if missing:
              fail(f"Events-Header unvollständig. Fehlende Spalten: {missing}. Header={header}")

          rows = []
          for r in values[1:]:
              r = (r or [])
              row = [(r[i].strip() if i < len(r) and r[i] is not None else "") for i in range(len(header))]
              if any(v for v in row):
                  rows.append(row)

          if not rows:
              fail("Events-Tab enthält keine Datenzeilen (nur Header).")

          out_path = "data/events.tsv"
          with open(out_path, "w", encoding="utf-8", newline="") as f:
              w = csv.writer(f, delimiter="\t", lineterminator="\n")
              w.writerow(header)
              w.writerows(rows)

          print(f"✅ Export OK: {len(rows)} Zeilen nach {out_path}")
          # === END BLOCK: EVENTS_TAB_EXPORT_RETRY_HARDENED ===
          PY
          test -s data/events.tsv
      # === BEGIN BLOCK: DEPLOY_ENV_DECISION_V4 | Zweck: main/live und staging nutzen denselben funktionierenden SFTP-Server/User; nur das Zielverzeichnis unterscheidet sich wieder ===
      - name: Decide deploy target
        shell: bash
        run: |
          set -e

          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            TARGET_DIR="staging"
            ENV_NAME="staging"
          else
            TARGET_DIR="."
            ENV_NAME="live"
          fi

          echo "DEPLOY_TARGET_DIR=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "DEPLOY_ENV_NAME=$ENV_NAME" >> "$GITHUB_ENV"

          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Deploy target dir: $TARGET_DIR"
          echo "Environment: $ENV_NAME"
      # === END BLOCK: DEPLOY_ENV_DECISION_V4 ===
      - name: Export Inbox tab to data/inbox.tsv (fail-fast, allow empty rows, retry-hardened)
        timeout-minutes: 6
        shell: bash
        env:
          SHEET_ID: ${{ env.BE_SHEET_ID }}
          INBOX_TAB_NAME: ${{ env.INBOX_TAB_NAME }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          python - <<'PY'
          # === BEGIN BLOCK: INBOX_TAB_EXPORT_RETRY_HARDENED ===
          import csv, json, os, sys, time, socket, ssl
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.errors import HttpError

          def fail(msg):
              print(f"❌ {msg}", file=sys.stderr)
              sys.exit(1)

          sheet_id = os.environ.get("SHEET_ID", "").strip()
          inbox_tab_name = os.environ.get("INBOX_TAB_NAME", "Inbox").strip() or "Inbox"
          sa_json = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", "").strip()

          if not sheet_id:
              fail("ENV SHEET_ID fehlt.")
          if not inbox_tab_name:
              fail("ENV INBOX_TAB_NAME fehlt.")
          if not sa_json:
              fail("ENV GOOGLE_SERVICE_ACCOUNT_JSON fehlt.")

          try:
              sa_info = json.loads(sa_json)
          except Exception:
              fail("GOOGLE_SERVICE_ACCOUNT_JSON ist kein gültiges JSON.")

          socket.setdefaulttimeout(90)

          scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"]
          creds = service_account.Credentials.from_service_account_info(sa_info, scopes=scopes)
          service = build("sheets", "v4", credentials=creds, cache_discovery=False)

          def fetch_values_with_retry(range_name, label, attempts=4):
              last_exc = None

              for attempt in range(1, attempts + 1):
                  try:
                      print(f"↻ {label}: Versuch {attempt}/{attempts}")
                      res = service.spreadsheets().values().get(
                          spreadsheetId=sheet_id,
                          range=range_name,
                          majorDimension="ROWS"
                      ).execute(num_retries=4)
                      return res.get("values", []) or []

                  except HttpError as exc:
                      status = getattr(exc.resp, "status", None)
                      retryable = status in (408, 429, 500, 502, 503, 504)
                      last_exc = exc

                      if (not retryable) or attempt >= attempts:
                          raise

                      wait_s = attempt * 5
                      print(f"⚠️ {label}: HttpError {status}, Retry in {wait_s}s", file=sys.stderr)
                      time.sleep(wait_s)

                  except (TimeoutError, socket.timeout, ssl.SSLError, OSError) as exc:
                      last_exc = exc

                      if attempt >= attempts:
                          raise

                      wait_s = attempt * 5
                      print(f"⚠️ {label}: {type(exc).__name__}, Retry in {wait_s}s", file=sys.stderr)
                      time.sleep(wait_s)

              raise last_exc or RuntimeError(f"{label}: unbekannter Exportfehler")

          rng = f"{inbox_tab_name}!A:ZZ"
          values = fetch_values_with_retry(rng, f"{inbox_tab_name}-Tab")

          if not values:
              fail(f"{inbox_tab_name}-Tab ist leer oder nicht lesbar.")

          header = [h.strip() for h in (values[0] or [])]
          required = ["status", "title", "source_url", "created_at"]
          missing = [c for c in required if c not in header]
          if missing:
              fail(f"Inbox-Header unvollständig. Fehlende Spalten: {missing}. Header={header}")

          rows = []
          for r in values[1:]:
              r = (r or [])
              row = [(r[i].strip() if i < len(r) and r[i] is not None else "") for i in range(len(header))]
              if any(v for v in row):
                  rows.append(row)

          out_path = "data/inbox.tsv"
          with open(out_path, "w", encoding="utf-8", newline="") as f:
              w = csv.writer(f, delimiter="\t", lineterminator="\n")
              w.writerow(header)
              if rows:
                  w.writerows(rows)

          print(f"✅ Export OK: {len(rows)} Zeilen nach {out_path}")
          # === END BLOCK: INBOX_TAB_EXPORT_RETRY_HARDENED ===
          PY
          test -s data/inbox.tsv
      # === END BLOCK: GOOGLE SHEET → TSV EXPORTS (Events + Inbox, fail-fast + retry-hardened) ===
      # === END BLOCK: GOOGLE SHEET → TSV EXPORTS (Events + Inbox, fail-fast) ===

      - name: Build events.json from events.tsv
        shell: bash
        run: |
          set -e
          python scripts/build-events-from-tsv.py

          echo "=== events.json (head) ==="
          head -n 40 data/events.json || true

      - name: Build inbox.json from inbox.tsv
        shell: bash
        run: |
          set -e
          python scripts/build-inbox-from-tsv.py

          echo "=== inbox.json (head) ==="
          head -n 60 data/inbox.json || true
      # === END BLOCK: BUILD EVENTS + INBOX FEEDS (TSV -> JSON, fail-fast where needed) ===

      - name: Compute build version
        shell: bash
        run: |
          set -e
          BUILD_ID="$(git rev-parse --short=12 HEAD)"
          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"


      - name: Prepare deploy folder
        shell: bash
        env:
          LIVE_DB_HOST: ${{ secrets.LIVE_DB_HOST }}
          LIVE_DB_PORT: ${{ secrets.LIVE_DB_PORT }}
          LIVE_DB_NAME: ${{ secrets.LIVE_DB_NAME }}
          LIVE_DB_USER: ${{ secrets.LIVE_DB_USER }}
          LIVE_DB_PASSWORD: ${{ secrets.LIVE_DB_PASSWORD }}
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
          STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          LIVE_STRIPE_SECRET_KEY: ${{ secrets.LIVE_STRIPE_SECRET_KEY }}
          LIVE_STRIPE_WEBHOOK_SECRET: ${{ secrets.LIVE_STRIPE_WEBHOOK_SECRET }}
          LIVE_STRIPE_PRICE_SINGLE: ${{ secrets.LIVE_STRIPE_PRICE_SINGLE }}
          LIVE_STRIPE_PRICE_STARTER: ${{ secrets.LIVE_STRIPE_PRICE_STARTER }}
          LIVE_STRIPE_PRICE_ACTIVE: ${{ secrets.LIVE_STRIPE_PRICE_ACTIVE }}
          LIVE_STRIPE_PRICE_UNLIMITED: ${{ secrets.LIVE_STRIPE_PRICE_UNLIMITED }}
          LIVE_STRIPE_PRICE_ACTIVITY_BASIC: ${{ secrets.LIVE_STRIPE_PRICE_ACTIVITY_BASIC }}
          LIVE_STRIPE_PRICE_ACTIVITY_PLUS: ${{ secrets.LIVE_STRIPE_PRICE_ACTIVITY_PLUS }}
          STAGING_STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
          STAGING_STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGING_STRIPE_WEBHOOK_SECRET }}
          STAGING_STRIPE_PRICE_SINGLE: ${{ secrets.STAGING_STRIPE_PRICE_SINGLE }}
          STAGING_STRIPE_PRICE_STARTER: ${{ secrets.STAGING_STRIPE_PRICE_STARTER }}
          STAGING_STRIPE_PRICE_ACTIVE: ${{ secrets.STAGING_STRIPE_PRICE_ACTIVE }}
          STAGING_STRIPE_PRICE_UNLIMITED: ${{ secrets.STAGING_STRIPE_PRICE_UNLIMITED }}
          STAGING_STRIPE_PRICE_ACTIVITY_BASIC: ${{ secrets.STAGING_STRIPE_PRICE_ACTIVITY_BASIC }}
          STAGING_STRIPE_PRICE_ACTIVITY_PLUS: ${{ secrets.STAGING_STRIPE_PRICE_ACTIVITY_PLUS }}
          STAGING_MAIL_FROM_NAME: ${{ secrets.STAGING_MAIL_FROM_NAME }}
          STAGING_MAIL_FROM_ADDRESS: ${{ secrets.STAGING_MAIL_FROM_ADDRESS }}
          STAGING_MAIL_SMTP_USERNAME: ${{ secrets.STAGING_MAIL_SMTP_USERNAME }}
          STAGING_MAIL_SMTP_PASSWORD: ${{ secrets.STAGING_MAIL_SMTP_PASSWORD }}
          # === BEGIN BLOCK: SEARCH_METRICS_AND_REVIEW_SECRETS_ENV_V1 | Zweck: macht Review- und Search-Metrics-Secrets für Dashboard-V2 im Deploy-Artefakt verfügbar; Umfang: ergänzt Live-Mail-, Review-, Google-Search-Console- und Bing-Webmaster-Secrets ===
          LIVE_MAIL_FROM_NAME: ${{ secrets.LIVE_MAIL_FROM_NAME }}
          LIVE_MAIL_FROM_ADDRESS: ${{ secrets.LIVE_MAIL_FROM_ADDRESS }}
          LIVE_MAIL_SMTP_USERNAME: ${{ secrets.LIVE_MAIL_SMTP_USERNAME }}
          LIVE_MAIL_SMTP_PASSWORD: ${{ secrets.LIVE_MAIL_SMTP_PASSWORD }}
          STAGING_REVIEW_PASSWORD: ${{ secrets.STAGING_REVIEW_PASSWORD }}
          LIVE_REVIEW_PASSWORD: ${{ secrets.LIVE_REVIEW_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SEARCH_METRICS_GOOGLE_SITE_URL: ${{ secrets.SEARCH_METRICS_GOOGLE_SITE_URL }}
          SEARCH_METRICS_BING_SITE_URL: ${{ secrets.SEARCH_METRICS_BING_SITE_URL }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          # === BEGIN BLOCK: INBOX_PUSH_SECRETS_ENV_V1 | Zweck: macht optionale Web-Push-Secrets im Deploy-Artefakt verfügbar; Umfang: ergänzt nur Env-Zugriff für private api/_config.php ===
          STAGING_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.STAGING_PUSH_VAPID_PUBLIC_KEY }}
          STAGING_PUSH_VAPID_PRIVATE_KEY_PEM: ${{ secrets.STAGING_PUSH_VAPID_PRIVATE_KEY_PEM }}
          STAGING_PUSH_SECRET: ${{ secrets.STAGING_PUSH_SECRET }}
          LIVE_PUSH_VAPID_PUBLIC_KEY: ${{ secrets.LIVE_PUSH_VAPID_PUBLIC_KEY }}
          LIVE_PUSH_VAPID_PRIVATE_KEY_PEM: ${{ secrets.LIVE_PUSH_VAPID_PRIVATE_KEY_PEM }}
          LIVE_PUSH_SECRET: ${{ secrets.LIVE_PUSH_SECRET }}
          # === END BLOCK: INBOX_PUSH_SECRETS_ENV_V1 === 
          # === END BLOCK: SEARCH_METRICS_AND_REVIEW_SECRETS_ENV_V1 ===
        run: |
          set -e

          rm -rf deploy
          mkdir -p deploy

          # === BEGIN BLOCK: SYNC_REPO_AND_INJECT_ENV_SPECIFIC_ROBOTS_SITEMAP_V1 | Zweck: deploy/ wird sauber aus dem Repo aufgebaut, aber robots.txt und sitemap.xml werden fail-fast immer umgebungsabhaengig aus Templates injiziert; Root-Dateien im Branch koennen dadurch kuenftig nichts mehr versehentlich ueberschreiben | Umfang: ersetzt nur den bisherigen rsync-Block im Step "Prepare deploy folder" ===
          rsync -a \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="deploy" \
            --exclude="deploy-templates" \
            --exclude="robots.txt" \
            --exclude="sitemap.xml" \
            ./ deploy/

          if [ "$DEPLOY_ENV_NAME" = "staging" ]; then
            cp deploy-templates/robots.staging.txt deploy/robots.txt
            cp deploy-templates/sitemap.staging.xml deploy/sitemap.xml

            grep -q '^User-agent: \*$' deploy/robots.txt
            grep -q '^Disallow: /$' deploy/robots.txt
          else
            cp deploy-templates/robots.live.txt deploy/robots.txt
            cp deploy-templates/sitemap.live.xml deploy/sitemap.xml

            grep -q '^User-agent: GPTBot$' deploy/robots.txt
            grep -q '^Sitemap: https://bocholt-erleben.de/sitemap.xml$' deploy/robots.txt
            grep -q '^Disallow: /intern/$' deploy/robots.txt
            grep -q '<loc>https://bocholt-erleben.de/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/events/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/aktivitaeten/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/aktivitaeten/sichtbar-werden/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/events-veroeffentlichen/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/events-veroeffentlichen/einreichen/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/events-veroeffentlichen/anbindung/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/fuer-veranstalter/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/ueber/</loc>' deploy/sitemap.xml
            grep -q '<loc>https://bocholt-erleben.de/bildnachweise/</loc>' deploy/sitemap.xml
          fi

          test -s deploy/robots.txt
          test -s deploy/sitemap.xml

          echo "=== PROOF robots.txt ==="
          cat deploy/robots.txt || true
          echo "=== PROOF sitemap.xml (head) ==="
          sed -n '1,40p' deploy/sitemap.xml || true
          # === END BLOCK: SYNC_REPO_AND_INJECT_ENV_SPECIFIC_ROBOTS_SITEMAP_V1 ===

                 # === BEGIN BLOCK: BUILD_ID CACHE-BUSTING + NORMALIZE + GUARD (HTML ASSETS) ===
          # Zweck:
          #  - PROOF-Instrumentation: zeigt exakt, in welchem Schritt deploy/index.html kaputt wird.
          #  - Keine inhaltliche Änderung am Verhalten außer zusätzlichen Debug-Ausgaben.
          #
          # Umfang:
          #  - Debug-Ausgaben vor/nach jedem Rewrite-Schritt
          #  - Guard bleibt unverändert
          #
          echo "=== PROOF A: after rsync (raw deploy/index.html style.css line) ==="
          grep -n "style.css" deploy/index.html || true

          # === BEGIN BLOCK: BUILD_ID REWRITE FOR HTML + STYLE IMPORTS | Purpose: propagate BUILD_ID not only into HTML assets but also into css/style.css @imports so split CSS files cannot stay stuck on stale ?v=1 cache keys | Scope: replaces step-1/step-2 proof section only ===
          echo "=== STEP 1A: replace existing ?v=... in HTML with BUILD_ID ==="
          find deploy -name "*.html" -print0 | xargs -0 sed -i "s/\?v=[^\"' >]*/?v=$BUILD_ID/g"

          echo "=== STEP 1B: replace existing ?v=... in deploy/css/style.css imports with BUILD_ID ==="
          sed -i "s/\?v=[^\"') >]*/?v=$BUILD_ID/g" deploy/css/style.css

          echo "=== PROOF B1: after STEP 1A (deploy/index.html style.css line) ==="
          grep -n "style.css" deploy/index.html || true

          echo "=== PROOF B2: after STEP 1B (deploy/css/style.css import lines) ==="
          nl -ba deploy/css/style.css | sed -n '1,20p' || true

          echo "=== STEP 2: normalize hashed suffix links back to ?v=BUILD_ID ==="
          find deploy -name "*.html" -print0 | xargs -0 perl -pi -e '
            s#(/css/style\.css)[0-9a-z]{5,}#$1?v='"$BUILD_ID"'#gi;
            s#(/config\.js)[0-9a-z]{5,}#$1?v='"$BUILD_ID"'#gi;
            s#(/js/[A-Za-z0-9._/-]+\.js)[0-9a-z]{5,}#$1?v='"$BUILD_ID"'#gi;
          '

          echo "=== PROOF C: after STEP 2 (deploy/index.html style.css line) ==="
          grep -n "style.css" deploy/index.html || true
          # === END BLOCK: BUILD_ID REWRITE FOR HTML + STYLE IMPORTS ===

          echo "=== DEBUG index.html: first 120 lines (final before guard) ==="
          nl -ba deploy/index.html | sed -n '1,120p' || true

          # 3) Guard: Wenn immer noch kaputte Muster existieren -> Deploy stoppen
          if grep -RInE '\.css[0-9a-z]{5,}(\b|")|\.js[0-9a-z]{5,}(\b|")' deploy/*.html deploy/**/*.html 2>/dev/null; then

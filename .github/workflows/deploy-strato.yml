          pwd
          cls -l
          rm -f index.html
          mirror -R --delete --verbose deploy/ .
          EOF
            )
          fi

          lftp -u "$STRATO_FTP_USERNAME","$STRATO_FTP_PASSWORD" "sftp://$STRATO_FTP_SERVER" <<LFTP
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 2
          set net:reconnect-interval-max 10
          set net:persist-retries 0

          pwd
          cls -l

          $LFTP_TARGET_COMMANDS

          cls -l
          bye
          LFTP
      # === END BLOCK: STRATO_UPLOAD_V6 ===

      # === BEGIN BLOCK: DEPLOY_HTTP_SMOKE_CHECK_V1 | Zweck: prüft nach STRATO-Upload zentrale Live-/Staging-Endpunkte fail-fast; Umfang: ruft tools/smoke-check-deploy.py gegen die gerade deployte Umgebung auf ===
      - name: Smoke-check deployed site
        shell: bash
        run: |
          set -e

          if [ "$DEPLOY_ENV_NAME" = "staging" ]; then
            SMOKE_BASE_URL="https://staging.bocholt-erleben.de"
          else
            SMOKE_BASE_URL="https://bocholt-erleben.de"
          fi

          python tools/smoke-check-deploy.py \
            --base-url "$SMOKE_BASE_URL" \
            --expected-build "$BUILD_ID"
      # === END BLOCK: DEPLOY_HTTP_SMOKE_CHECK_V1 ===

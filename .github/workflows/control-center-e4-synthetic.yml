name: Control Center E4 Synthetic Proof

on:
  workflow_dispatch:
    inputs:
      expected_staging_sha:
        description: "Exakter aktueller 40-stelliger staging-SHA"
        required: true
        type: string
      confirmation:
        description: "Exakt RUN_ONE_SYNTHETIC_E4 eingeben"
        required: true
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: control-center-e4-synthetic-staging
  cancel-in-progress: false

jobs:
  e4:
    name: isolated-synthetic-write-resume-cleanup
    if: >-
      github.ref_name == 'main' &&
      inputs.confirmation == 'RUN_ONE_SYNTHETIC_E4'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      BASE_URL: https://staging.bocholt-erleben.de
      LIVE_URL: https://bocholt-erleben.de
      E4_TARGET_SHA: ${{ inputs.expected_staging_sha }}
      REVIEW_PASSWORD: ${{ secrets.STAGING_REVIEW_PASSWORD }}
      SHEET_ID: ${{ secrets.LIVE_SHEET_ID || secrets.SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
      STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
      STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
      STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
      STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Validate one-shot dispatch contract
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "main"
          test "${{ inputs.confirmation }}" = "RUN_ONE_SYNTHETIC_E4"
          [[ "${E4_TARGET_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - name: Checkout exact staging commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_staging_sha }}
          fetch-depth: 0

      - name: Verify target is current staging head
        shell: bash
        run: |
          set -euo pipefail
          checked_out_sha="$(git rev-parse HEAD)"
          test "${checked_out_sha}" = "${E4_TARGET_SHA}"
          git fetch --no-tags origin refs/heads/staging:refs/remotes/origin/staging
          staging_head="$(git rev-parse refs/remotes/origin/staging)"
          test "${staging_head}" = "${E4_TARGET_SHA}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate local E4 contract
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/control-center-e4-synthetic.py
          python3 scripts/control-center-e4-synthetic.py --self-test

      - name: Install isolated E4 dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          pip install google-api-python-client google-auth pymysql

      - name: Run isolated synthetic E4 proof
        run: |
          set -euo pipefail
          python3 scripts/control-center-e4-synthetic.py \
            --evidence artifacts/control-center-e4-evidence.json

      - name: Upload E4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-center-e4-${{ github.run_number }}
          path: artifacts/control-center-e4-evidence.json
          if-no-files-found: error
          retention-days: 30

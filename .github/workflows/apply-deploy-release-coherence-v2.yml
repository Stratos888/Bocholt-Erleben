name: Run deploy coherence patch helper

on:
  push:
    branches:
      - fix/deploy-release-coherence
    paths:
      - .github/workflows/apply-deploy-release-coherence-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deploy-release-coherence
          fetch-depth: 0
      - name: Apply patch
        run: python3 scripts/apply_deploy_release_coherence_patch.py
      - name: Validate patch
        run: |
          python3 -m py_compile scripts/prepare_deploy_delta.py tests/test_deploy_release_coherence.py
          python3 tests/test_deploy_release_coherence.py
          git diff --check
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy-strato.yml
          git commit -m "fix: publish coherent build and service-worker release"
          git push origin HEAD:fix/deploy-release-coherence

name: Run deploy coherence patch helper

on:
  push:
    branches:
      - fix/deploy-release-coherence
    paths:
      - .github/workflows/apply-deploy-release-coherence-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deploy-release-coherence
          fetch-depth: 0
      - name: Apply patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_deploy_release_coherence_patch.py')
          text = path.read_text(encoding='utf-8')
          old = 're.subn(pattern, replacement, text, count=1, flags=re.S)'
          new = 're.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S)'
          if text.count(old) != 1:
              raise SystemExit('Expected one literal replacement helper target')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 scripts/apply_deploy_release_coherence_patch.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy-strato.yml
          git diff --cached --check
          git commit -m "fix: publish coherent build and service-worker release"
          git pull --rebase origin fix/deploy-release-coherence
          git push origin HEAD:fix/deploy-release-coherence

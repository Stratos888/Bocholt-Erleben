name: Apply final deploy release patch

on:
  push:
    branches:
      - fix/deploy-release-coherence
    paths:
      - .github/workflows/probe-deploy-fix-runner.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deploy-release-coherence
          fetch-depth: 0

      - name: Apply and verify bounded patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply_deploy_release_coherence_patch.py
          git diff --check
          grep -q 'ORDERED_DEPLOY_RELEASE_PLAN_V1' .github/workflows/deploy-strato.yml
          grep -q 'STRATO_ORDERED_RELEASE_UPLOAD_V1' .github/workflows/deploy-strato.yml

      - name: Commit through proven branch writer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy-strato.yml
          git commit -m "fix: publish coherent build and service-worker release"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin fix/deploy-release-coherence || true
            if git push origin HEAD:fix/deploy-release-coherence; then
              exit 0
            fi
            sleep 3
          done
          exit 1

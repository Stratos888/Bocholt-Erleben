=== BEGIN BLOCK: MANUAL KI EVENT INTAKE WORKFLOW (fixed build + commit order) ===

Datei: .github/workflows/manual-ki-intake.yml

Zweck:

- Importiert data/inbox_manual.json → data/inbox.tsv

- Baut danach data/inbox.json neu

- Commitet die aktualisierten Dateien

- Leert anschließend data/inbox_manual.json

=== END BLOCK ===

name: Manual KI Event Intake

on:
workflow_dispatch:

permissions:
contents: write

jobs:
manual_ki_event_intake:
runs-on: ubuntu-latest

steps:

  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  # JSON → TSV
  - name: Import manual inbox JSON
    run: |
      set -e
      python scripts/inbox-manual-to-sheet.py

  # TSV → JSON
  - name: Build inbox.json
    run: |
      set -e
      python scripts/build-inbox-from-tsv.py

  # Commit Änderungen
  - name: Commit inbox changes
    run: |
      set -e

      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add data/inbox.tsv data/inbox.json

      if git diff --cached --quiet; then
        echo "No inbox changes."
      else
        git commit -m "chore: update inbox review feed"
        git push
      fi

  # Buffer leeren (nach Commit)
  - name: Reset manual inbox buffer
    run: |
      printf '[]\n' > data/inbox_manual.json
      git add data/inbox_manual.json
      git commit -m "chore: clear manual inbox buffer" || true
      git push || true

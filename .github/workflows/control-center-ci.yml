name: Control Center CI

on:
  pull_request:
    branches: ["staging", "main"]
    paths: &control_center_ci_paths
      - "api/control-center/**"
      - "api/growth-backlog/**"
      - "api/growth-backlog-lib.php"
      - "api/events/public.php"
      - "steuerzentrale/**"
      - "js/control-center*.js"
      - "js/control-center/**"
      - "css/style.css"
      - "css/control-center*.css"
      - "data/control_center_repo_workpacks.json"
      - "data/control_center_editorial_contract.json"
      - "data/content_ops_decision_classes.json"
      - "data/event_visual_pool.json"
      - "tests/fixtures/control_center_editorial_cases.json"
      - "scripts/audit_control_center_product_contract.py"
      - "scripts/audit_control_center_editorial_contracts.py"
      - "scripts/build-event-visual-gap-backlog.py"
      - "scripts/event_visual_motifs.py"
      - "scripts/control-center-e4-synthetic.py"
      - "scripts/control_center_e4_server_adapter.py"
      - "scripts/control_center_e4_synthetic_core.py"
      - "tools/audit-css-governance.py"
      - "tests/control_center*.php"
      - "tests/control_center*.mjs"
      - "tests/test_event_visual_gap_backlog.py"
      - ".github/workflows/control-center-ci.yml"
      - ".github/workflows/control-center-e4-synthetic.yml"
      - ".github/workflows/staging-verification.yml"
      - ".github/workflows/deploy-strato.yml"
  workflow_dispatch:

concurrency:
  group: control-center-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Control Center CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate contract JSON
        run: |
          set -euo pipefail
          python3 -m json.tool data/control_center_repo_workpacks.json >/dev/null
          python3 -m json.tool data/control_center_editorial_contract.json >/dev/null
          python3 -m json.tool data/content_ops_decision_classes.json >/dev/null
          python3 -m json.tool data/event_visual_pool.json >/dev/null
          python3 -m json.tool tests/fixtures/control_center_editorial_cases.json >/dev/null

      - name: Validate PHP syntax
        run: |
          set -euo pipefail
          find api/control-center -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l api/growth-backlog-lib.php
          php -l api/growth-backlog/list.php
          php -l api/growth-backlog/create.php
          php -l api/growth-backlog/update.php
          php -l api/events/public.php
          for file in tests/control_center*.php; do php -l "$file"; done

      - name: Simulate all control center contracts
        env:
          BE_ACTIVITY_WRITEBACK_ENABLED: "false"
          BE_GITHUB_REPO_TOKEN: ""
        run: |
          set -euo pipefail
          php tests/control_center_contracts_test.php
          php tests/control_center_process_chain_test.php
          php tests/control_center_presentation_contract_test.php
          php tests/control_center_editorial_contracts_test.php
          php tests/control_center_exception_review_runtime_test.php
          php tests/control_center_backlog_roadmap_contract_test.php
          php tests/control_center_sheet_identity_test.php
          php tests/control_center_editorial_runtime_contract_test.php
          php tests/control_center_state_consistency_contract_test.php
          php tests/control_center_inbox_tab_contract_test.php
          php tests/control_center_inbox_schema_contract_test.php
          php tests/control_center_staging_events_isolation_contract_test.php
          php tests/control_center_runtime_preflight_contract_test.php
          php tests/control_center_e4_synthetic_runtime_contract_test.php
          python3 tests/test_event_visual_gap_backlog.py

      - name: Validate JavaScript modules and frontend contract
        run: |
          set -euo pipefail
          node --check js/control-center-environment.js
          node --check js/control-center.js
          node --check js/control-center-seo-embed.js
          for file in js/control-center/*.js; do node --input-type=module --check < "$file"; done
          node --check tests/control_center_frontend_contract_test.mjs
          node tests/control_center_frontend_contract_test.mjs

      - name: Validate product and editorial contracts
        run: |
          set -euo pipefail
          python3 scripts/audit_control_center_product_contract.py
          python3 scripts/audit_control_center_editorial_contracts.py

      - name: Validate CSS governance
        run: |
          set -euo pipefail
          python3 tools/audit-css-governance.py

      - name: Validate consolidated file architecture
        run: |
          set -euo pipefail
          for file in steuerzentrale/index.html css/style.css css/control-center.css css/control-center-final.css css/control-center-editorial.css css/control-center-exception-review.css js/control-center-environment.js js/control-center.js js/control-center-seo-embed.js js/control-center/shared.js js/control-center/app.js js/control-center/backlog.js js/control-center/review.js js/control-center/review-render.js js/control-center/review-actions.js js/control-center/manage.js js/control-center/manage-render.js js/control-center/manage-actions.js js/control-center/development.js api/growth-backlog-lib.php api/growth-backlog/list.php api/growth-backlog/create.php api/growth-backlog/update.php api/control-center/overview.php api/control-center/cases.php api/control-center/action.php api/control-center/preflight.php api/control-center/e4-synthetic.php api/control-center/case.php api/control-center/content.php api/control-center/publication.php api/control-center/development.php api/control-center/auth.php api/control-center/_presentation.php api/control-center/_editorial_runtime.php api/control-center/_editorial_contracts.php api/control-center/_e4_synthetic_runtime.php api/control-center/_event_review_tasks.php api/control-center/_event_review_task_support.php api/control-center/_event_review_task_schedule_a.php api/control-center/_event_review_task_schedule_b.php api/control-center/_event_review_task_details.php api/control-center/_event_review_task_visual.php api/control-center/_event_review_task_result.php api/control-center/_event_review_writeback.php api/control-center/_decision_contract.php api/control-center/_sheet_identity.php api/control-center/_source_reconciliation.php api/control-center/_verified_source_writeback.php api/control-center/_staging_events_writeback.php api/control-center/_runtime_preflight.php api/control-center/_activity_audit_writeback.php api/control-center/_inbox_tab.php api/control-center/_inbox_schema.php api/control-center/_inbox_decision_writeback.php api/control-center/_sheet_inbox_source.php api/control-center/_submission_source.php api/control-center/_submission_writeback.php scripts/control-center-e4-synthetic.py scripts/control_center_e4_server_adapter.py scripts/control_center_e4_synthetic_core.py tests/control_center_frontend_contract_test.mjs tests/control_center_presentation_contract_test.php tests/control_center_editorial_contracts_test.php tests/control_center_exception_review_runtime_test.php tests/control_center_backlog_roadmap_contract_test.php tests/control_center_state_consistency_contract_test.php tests/control_center_inbox_tab_contract_test.php tests/control_center_inbox_schema_contract_test.php tests/control_center_staging_events_isolation_contract_test.php tests/control_center_runtime_preflight_contract_test.php tests/control_center_e4_synthetic_runtime_contract_test.php; do test -s "$file"; done
          test ! -e js/control-center-source-editors.js
          test ! -e js/control-center-final-bridge.js
          test ! -e js/control-center-stability.js
          test ! -e js/control-center-publication.js
          test ! -e js/control-center-development.js
          test ! -e js/control-center-integrations.js

      - name: Validate security and integration contracts
        run: |
          set -euo pipefail
          grep -R "be_require_review_access" api/control-center/*.php >/dev/null
          grep -q "be_require_review_access" api/control-center/preflight.php
          grep -q "REQUEST_METHOD" api/control-center/preflight.php
          grep -q "'mutation' => false" api/control-center/_runtime_preflight.php
          grep -q "be_cc_inbox_writer_name" api/control-center/action.php
          grep -q "be_cc_inbox_writer_name" api/control-center/_runtime_preflight.php
          grep -q "be_require_review_access" api/control-center/e4-synthetic.php
          grep -q "be_app_env_value" api/control-center/e4-synthetic.php
          grep -q "Synthetic E4 runtime operations are allowed only on staging" api/control-center/_e4_synthetic_runtime.php
          grep -q "Only the exact controlled partial-failure operation may be seeded" api/control-center/_e4_synthetic_runtime.php
          grep -q "authenticated staging HTTPS contract" scripts/control-center-e4-synthetic.py
          grep -q "e4-synthetic.php" scripts/control-center-e4-synthetic.py
          if grep -Eq 'pymysql|STAGING_DB_(HOST|PORT|NAME|USER|PASSWORD)' scripts/control-center-e4-synthetic.py; then
            echo "The active E4 entrypoint must never connect to MySQL directly."
            exit 1
          fi
          grep -q "be_require_review_access" api/growth-backlog/list.php
          grep -q "be_require_review_access" api/growth-backlog/create.php
          grep -q "be_require_review_access" api/growth-backlog/update.php
          grep -q "X-BE-Review-Password" js/control-center/shared.js
          grep -q "BE_CONTROL_CENTER_BASE" js/control-center-environment.js
          grep -q "window.fetch =" js/control-center-environment.js
          grep -q "mapDocumentUrl" js/control-center-seo-embed.js
          grep -q "ResizeObserver" js/control-center-seo-embed.js
          grep -q "operator_status" js/control-center/app.js
          grep -q "control-center-editorial.css" css/style.css
          grep -q "control_operations" api/control-center/_schema.php
          grep -q "control_editorial_feedback" api/control-center/_schema.php
          grep -q "be_cc_event_candidate_review_contract" api/control-center/_presentation.php
          grep -q "be_cc_resolve_event_review_task" api/control-center/action.php
          grep -q "be_cc_resolve_audit_row" api/control-center/_editorial_runtime.php
          grep -q "suggested_description" api/control-center/case.php
          grep -q "be_cc_assert_case_postcondition" api/control-center/action.php
          grep -q "be_cc_writeback_activity_audit_verified" api/control-center/action.php
          grep -q "be_cc_writeback_staging_inbox_approve_verified" api/control-center/action.php
          grep -q "be_cc_events_tab_name" api/control-center/_staging_events_writeback.php
          grep -q "be_cc_inbox_tab_name" api/control-center/_inbox_tab.php
          grep -q "be_cc_inbox_table_from_values" api/control-center/_sheet_inbox_source.php
          grep -q "be_cc_inbox_table_from_values" api/control-center/_inbox_decision_writeback.php
          grep -q "be_cc_reconcile_source_case" api/control-center/_sheet_inbox_source.php
          grep -q "be_cc_reconcile_source_case" api/control-center/_submission_source.php
          grep -q "be_cc_reconcile_source_case" api/control-center/_sources.php
          grep -q "caseIsReviewVisible" js/control-center/shared.js

      - name: Validate E4 harness without external access
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/control-center-e4-synthetic.py
          python3 -m py_compile scripts/control_center_e4_server_adapter.py
          python3 -m py_compile scripts/control_center_e4_synthetic_core.py
          python3 scripts/control-center-e4-synthetic.py --self-test

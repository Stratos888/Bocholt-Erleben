name: Agent children magic show visual gap

on:
  push:
    branches:
      - agent/children-magic-show-visual-gap
    paths:
      - tools/agent-children-magic-show-visual-gap.py
      - .github/workflows/agent-children-magic-show-visual-gap.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out visual gap branch
        uses: actions/checkout@v4
        with:
          ref: agent/children-magic-show-visual-gap
          fetch-depth: 0

      - name: Apply children magic show visual gap patch
        run: python3 tools/agent-children-magic-show-visual-gap.py

      - name: Validate visual contract and backlog
        run: |
          python3 -m json.tool data/event_visual_pool.json >/dev/null
          python3 -m py_compile scripts/event_visual_motifs.py
          python3 tests/test_children_magic_show_visual_gap.py
          python3 tests/test_event_visual_gap_backlog.py

      - name: Commit only final product and process files
        run: |
          rm -f tools/agent-children-magic-show-visual-gap.py
          rm -f .github/workflows/agent-children-magic-show-visual-gap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          ACTUAL="$(git diff --cached --name-only | sort | tr '\n' ' ')"
          EXPECTED="data/event_visual_gap_backlog.tsv data/event_visual_pool.json scripts/event_visual_motifs.py tests/test_children_magic_show_visual_gap.py "
          echo "Changed: $ACTUAL"
          test "$ACTUAL" = "$EXPECTED"
          git commit -m "Register children magic show visual gap"
          git push origin HEAD:agent/children-magic-show-visual-gap

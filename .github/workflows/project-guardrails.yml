name: Apply Documentation Migration

on:
  push:
    branches: ["agent/documentation-domain-inventory"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply role and reference migration
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-documentation-content-migration.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No migration changes detected."
            exit 1
          fi

          git commit -m "Consolidate documentation roles and references"
          git push origin "HEAD:${GITHUB_REF_NAME}"

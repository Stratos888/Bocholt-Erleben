name: Project Guardrails

on:
  pull_request:
    branches: ["staging", "main"]
    paths: &guardrail_paths
      - "**/*.md"
      - ".github/workflows/**"
      - ".github/pull_request_template.md"
      - "scripts/audit-documentation-governance.py"
      - "scripts/report-documentation-inventory.py"
      - "scripts/resolve-deploy-target.sh"
      - "scripts/merge_events_overlay.py"
      - "tests/test_deploy_branch_routing.sh"
      - "tests/test_events_overlay_merge.py"
  push:
    branches: ["staging", "main"]
    paths: *guardrail_paths
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy branch routing
        shell: bash
        run: bash tests/test_deploy_branch_routing.sh

      - name: Validate stable PR gate
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/pr-gate.yml
          grep -q '^name: PR Gate$' .github/workflows/pr-gate.yml
          grep -q '^    name: PR Gate$' .github/workflows/pr-gate.yml
          grep -q 'Only staging may be merged into main' .github/workflows/pr-gate.yml
          grep -q 'Aggregate started GitHub Actions checks' .github/workflows/pr-gate.yml

          if grep -q '^[[:space:]]*paths:' .github/workflows/pr-gate.yml; then
            echo "PR Gate must remain an always-run pull-request workflow without a paths filter."
            exit 1
          fi

      - name: Validate authoritative workflow topology
        shell: bash
        run: |
          set -euo pipefail

          for file in \
            .github/workflows/pr-gate.yml \
            .github/workflows/project-guardrails.yml \
            .github/workflows/control-center-ci.yml \
            .github/workflows/deploy-strato.yml \
            .github/workflows/staging-verification.yml \
            .github/workflows/control-center-e4-synthetic.yml \
            api/control-center/_runtime_resource_contract.php; do
            test -s "$file"
          done

          for legacy in \
            .github/workflows/control-center-validation.yml \
            .github/workflows/control-center-editorial-contracts.yml \
            .github/workflows/control-center-contract-diagnostics.yml \
            .github/workflows/control-center-e4-contract.yml \
            .github/workflows/control-center-runtime-preflight.yml \
            .github/workflows/staging-deploy-observer.yml; do
            test ! -e "$legacy"
          done

          grep -q '^name: Control Center CI$' .github/workflows/control-center-ci.yml
          grep -q '^    name: Control Center CI$' .github/workflows/control-center-ci.yml
          grep -q '^name: Staging Verification$' .github/workflows/staging-verification.yml
          grep -q 'deploy/staging-observed' .github/workflows/staging-verification.yml
          grep -q 'control-center/runtime-preflight-e3' .github/workflows/staging-verification.yml
          grep -q '"mode": "runtime"' .github/workflows/staging-verification.yml
          grep -q 'no_fachfall' .github/workflows/staging-verification.yml
          grep -q 'runtime_and_resource_contract_only' .github/workflows/staging-verification.yml
          grep -q 'mutation_false' .github/workflows/staging-verification.yml
          grep -q 'be_cc_runtime_resource_contract' api/control-center/preflight.php
          grep -q 'python3 scripts/control-center-e4-synthetic.py --self-test' .github/workflows/control-center-ci.yml

          if grep -q '/api/control-center/cases.php' .github/workflows/staging-verification.yml; then
            echo "Staging Verification must not select a real control case for E3."
            exit 1
          fi
          if grep -q '"case_id"' .github/workflows/staging-verification.yml; then
            echo "Staging Verification must not send a case identity for E3."
            exit 1
          fi
          if grep -q 'control-center-e4-synthetic.yml.*dispatches' .github/workflows/staging-verification.yml; then
            echo "Staging Verification must never dispatch E4."
            exit 1
          fi

      - name: Inventory all tracked documentation
        shell: bash
        run: python3 scripts/report-documentation-inventory.py --check --output build/documentation-inventory.json

      - name: Validate documentation governance
        shell: bash
        run: python3 scripts/audit-documentation-governance.py

      - name: Upload documentation inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-inventory
          path: build/documentation-inventory.json
          if-no-files-found: error
          retention-days: 14

      - name: Validate durable engineering contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'Architekturprinzip: vereinfachen statt schichten' ENGINEERING.md
          grep -q 'Ressourcen-Lock' ENGINEERING.md
          grep -q 'Ein echter Fachdatensatz wird erst nach isoliertem synthetischem Staging-Beweis verwendet' ENGINEERING.md

      - name: Validate no canonical freeze replacement
        shell: bash
        run: |
          set -euo pipefail
          test -s STEUERZENTRALE_FREEZE_2026-07-10.md
          grep -q '^# Steuerzentrale' STEUERZENTRALE_FREEZE_2026-07-10.md

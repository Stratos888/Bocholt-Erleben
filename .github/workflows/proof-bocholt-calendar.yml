name: Proof Bocholt Calendar Pagination

on:
  workflow_dispatch:

jobs:
  run-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run proof script
        run: |
          python scripts/_proof_bocholt_calendar_pagination.py

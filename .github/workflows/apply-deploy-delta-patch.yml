name: Apply deploy workflow patch
on:
  workflow_dispatch:
  push:
    branches: ["staging"]
    paths:
      - "scripts/apply_deploy_delta_patch.py"
      - ".github/workflows/apply-deploy-delta-patch.yml"
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
      - name: Build patched workflow copy
        run: |
          set -euo pipefail
          python scripts/apply_deploy_delta_patch.py
          cp .github/workflows/deploy-strato.yml deploy-strato.patched.yml
          git checkout -- .github/workflows/deploy-strato.yml
      - name: Publish patched copy for final repository move
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-strato.patched.yml
          git diff --cached --check
          git commit -m "Prepare fast staging deploy workflow payload"
          git push origin HEAD:staging

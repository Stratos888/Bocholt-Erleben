# === BEGIN FILE: .github/workflows/browser-smoke.yml | Zweck: manueller read-only Browser-Smoke fuer Staging/Live ohne Redeploy; Umfang: Playwright Chromium, Artefakte und Step Summary ===
name: Browser Smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Zielumgebung"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live
          - custom
      base_url:
        description: "Nur fuer target=custom: vollstaendige Basis-URL"
        required: false
        default: ""
      profile:
        description: "Browserprofil"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - desktop
          - mobile

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  browser-smoke:
    name: Browser-Smoke read-only
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target URL
        run: |
          set -e
          case "${{ github.event.inputs.target }}" in
            staging)
              BASE_URL="https://staging.bocholt-erleben.de"
              ;;
            live)
              BASE_URL="https://bocholt-erleben.de"
              ;;
            custom)
              BASE_URL="${{ github.event.inputs.base_url }}"
              ;;
            *)
              echo "❌ Unbekanntes target: ${{ github.event.inputs.target }}"
              exit 1
              ;;
          esac

          if ! printf '%s' "$BASE_URL" | grep -Eq '^https?://'; then
            echo "❌ BASE_URL muss mit https:// oder http:// beginnen."
            exit 1
          fi

          echo "BROWSER_SMOKE_BASE_URL=${BASE_URL%/}" >> "$GITHUB_ENV"
          echo "Browser-Smoke target: ${BASE_URL%/}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          set -e
          npm install --no-save playwright@1.50.1
          npx playwright install --with-deps chromium

      - name: Run browser smoke
        run: |
          set -e
          mkdir -p artifacts/browser-smoke
          node scripts/browser-smoke.mjs \
            --base-url "$BROWSER_SMOKE_BASE_URL" \
            --profile "${{ github.event.inputs.profile }}" \
            --out-dir artifacts/browser-smoke

      - name: Add browser smoke summary
        if: always()
        run: |
          if [ -f artifacts/browser-smoke/summary.md ]; then
            cat artifacts/browser-smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Browser-Smoke hat keine summary.md erzeugt." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ github.event.inputs.target }}-${{ github.run_number }}
          path: artifacts/browser-smoke/
          if-no-files-found: warn
# === END FILE: .github/workflows/browser-smoke.yml ===

name: Bathing Water Guard V2

on:
  workflow_dispatch:
    inputs:
      max_measurement_age_days:
        description: "Maximum age in days for a positive NRW sample before state becomes unknown"
        required: false
        default: "45"
      warn_measurement_age_days:
        description: "Age in days where an otherwise OK NRW sample becomes watch"
        required: false
        default: "35"
      guard_date:
        description: "Optional guard date YYYY-MM-DD; empty = today UTC"
        required: false
        default: ""
  schedule:
    # Daily during the bathing season. This is the single owner of the generated
    # frontend bathing-water status file and never edits redactional offers.json.
    - cron: "17 5 * 5-9 *"

permissions:
  contents: write

concurrency:
  group: bathing-water-guard-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  guard-status:
    name: Build bathing water status and safe frontend writeback
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Guard production status branch
        run: |
          set -e
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "❌ Bathing Water Guard darf nur auf main laufen."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile guard script
        run: python3 -m py_compile scripts/check-bathing-water-status.py

      - name: Run bathing water guard V2
        run: |
          mkdir -p artifacts/bathing-water-guard-v2
          args=(
            --max-measurement-age-days "${{ github.event.inputs.max_measurement_age_days || '45' }}"
            --warn-measurement-age-days "${{ github.event.inputs.warn_measurement_age_days || '35' }}"
            --out-json artifacts/bathing-water-guard-v2/bathing-water-status-guard.json
            --out-md artifacts/bathing-water-guard-v2/bathing-water-status-guard.md
            --write-data data/bathing_water_status.json
          )
          if [ -n "${{ github.event.inputs.guard_date || '' }}" ]; then
            args+=(--today "${{ github.event.inputs.guard_date }}")
          fi
          python3 scripts/check-bathing-water-status.py "${args[@]}"

      - name: Upload guard artifact
        uses: actions/upload-artifact@v4
        with:
          name: bathing-water-guard-v2
          path: artifacts/bathing-water-guard-v2/
          if-no-files-found: error

      - name: Commit generated frontend status file when changed
        run: |
          set -e
          if git diff --quiet -- data/bathing_water_status.json; then
            echo "No bathing-water status data change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bathing_water_status.json
          git commit -m "Aktualisiere Badegewaesser-Status"
          git push

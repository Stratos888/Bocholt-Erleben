<!DOCTYPE html>
<html lang="de">
<head>
<link rel="canonical" href="https://bocholt-erleben.de/angebote/">
<meta charset="UTF-8">

<meta name="description" content="Aktivitäten in Bocholt und Umgebung: Natur, Kultur, Freizeitideen und Unternehmungen – passend zu deiner Situation und schnell gefunden.">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Aktivitäten in Bocholt – Freizeit, Natur, Kultur & Ideen</title>

<!-- === BEGIN BLOCK: CSS LINK ENTERPRISE V2 (consistent cache-busting) ===
Zweck:
- Vereinheitlicht den stylesheet-link mit dem restlichen Projekt
Umfang:
- Ersetzt nur den stylesheet-link
=== -->
<link rel="stylesheet" href="/css/style.css?v=1">
<!-- === END BLOCK: CSS LINK ENTERPRISE V2 (consistent cache-busting) === -->
</head>

<body>
<!-- === BEGIN BLOCK: HEADER (logo/title + install + about) ===
Zweck:
- Gleiche Header-DNA wie Home
- Keine Sonderlogik nur für Aktivitäten
Umfang:
- kompletter Header
=== -->
<header class="app-header">
  <div class="header-left">
    <img
      src="/icons/app/icon-192.png"
      alt="Bocholt erleben Logo"
      class="app-logo"
    >
    <span class="app-title">Bocholt erleben</span>
  </div>
  <div class="header-right">
    <button type="button" class="pwa-install-button" data-pwa-install-trigger aria-label="Als App installieren"></button>
    <a class="pwa-install-button" href="/ueber/" aria-label="Über Bocholt erleben"></a>
  </div>
</header>
<!-- === END BLOCK: HEADER (logo/title + install + about) === -->

<main class="page page--activities">
<!-- === BEGIN BLOCK: ACTIVITIES INTRO + CONTROLS (home-dna, no hero overload) ===
  Zweck:
  - übernimmt die Home-Grammatik (Intro + top-stack + Search + 2 Controls)
  - bleibt mobile-first kompakt
  Umfang:
  - oberer Bereich der Aktivitätenseite inkl. Activity-Filter-Sheets
  === -->
  <section class="desktop-hero activities-hero" aria-label="Aktivitäten finden">
    <section class="desktop-entry desktop-hero__copy" aria-label="Einführung">
      <div class="desktop-entry__inner">
        <div class="desktop-entry__content">
          <h1 class="desktop-entry__title">Aktivitäten in Bocholt</h1>
          <p class="desktop-entry__text">Freizeitideen, Natur, Kultur und Unternehmungen<br>in Bocholt und Umgebung – passend zu deiner Situation.</p>
        </div>
      </div>
    </section>

    <div class="top-stack activities-top-stack">
      <div class="desktop-hero__search-row activities-controls" aria-label="Suche und Filter">
        <div class="events-filter desktop-hero__search-slot">
          <label class="desktop-hero__search-field" for="search-filter">
            <span class="desktop-hero__icon desktop-hero__icon--search" aria-hidden="true"></span>
            <input
              id="search-filter"
              type="search"
              placeholder="Aktivität oder Ort suchen"
              aria-label="Aktivitäten suchen"
              autocomplete="off"
              inputmode="search"
            >
          </label>
        </div>

        <button
          type="button"
          class="filter-pill desktop-hero__toolbar-pill"
          id="offer-situation-pill"
          aria-haspopup="dialog"
          aria-controls="sheet-situation"
        >
          <span class="filter-pill__label">Situation</span>
          <span class="filter-pill__value" id="offer-situation-value">Alle</span>
        </button>

        <button
          type="button"
          class="filter-pill desktop-hero__toolbar-pill"
          id="offer-category-pill"
          aria-haspopup="dialog"
          aria-controls="sheet-category"
        >
          <span class="filter-pill__label">Bereich</span>
          <span class="filter-pill__value" id="offer-category-value">Alle</span>
        </button>

        <button type="button" class="filter-pill filter-pill--reset" id="offer-reset-pill" hidden>
          Zurücksetzen
        </button>
      </div>
    </div>
  </section>

  <div class="filter-sheet" id="sheet-situation" role="dialog" aria-modal="true" aria-label="Situation auswählen" hidden>
    <div class="filter-sheet__overlay" data-close-sheet></div>
    <div class="filter-sheet__card">
      <div class="filter-sheet__header">
        <div class="filter-sheet__title">Situation</div>
        <button type="button" class="filter-sheet__close" data-close-sheet aria-label="Schließen">×</button>
      </div>
      <div class="filter-sheet__body" id="sheet-situation-options">
        <button type="button" class="filter-sheet-option is-active" data-situation="">Alle</button>
      </div>
    </div>
  </div>

  <div class="filter-sheet" id="sheet-category" role="dialog" aria-modal="true" aria-label="Bereich auswählen" hidden>
    <div class="filter-sheet__overlay" data-close-sheet></div>
    <div class="filter-sheet__card">
      <div class="filter-sheet__header">
        <div class="filter-sheet__title">Bereich</div>
        <button type="button" class="filter-sheet__close" data-close-sheet aria-label="Schließen">×</button>
      </div>
      <div class="filter-sheet__body" id="sheet-category-options">
        <button type="button" class="filter-sheet-option is-active" data-category="">Alle</button>
      </div>
    </div>
  </div>
  <!-- === END BLOCK: ACTIVITIES INTRO + CONTROLS (home-dna, no hero overload) === -->

  <div id="loading" class="loading-container" style="display:none" role="status" aria-live="polite" aria-busy="true">
    <div class="loading-spinner" aria-hidden="true"></div>
    <p>Aktivitäten werden geladen...</p>
  </div>

  <section class="events-section activity-feed-section" aria-label="Aktivitäten">
    <div id="offer-cards" class="event-cards-grid activity-cards-grid"></div>
  </section>
</main>

<!-- === BEGIN BLOCK: OVERLAY ROOTS (activities) ===
Zweck:
- Dedizierter Overlay-Root direkt unter <body> gemäß Architekturregel
- wird von js/offers-details.js benutzt
Umfang:
- genau ein Root-Container für Activity-Detailpanel
=== -->
<div id="offer-detail-root"></div>
<!-- === END BLOCK: OVERLAY ROOTS (activities) === -->

    <span class="bottom-tabbar__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" focusable="false" aria-hidden="true">

      <svg viewBox="0 0 24 24" width="22" height="22" focusable="false" aria-hidden="true">
        <path d="M3 12.5C3 8.358 6.358 5 10.5 5c1.878 0 3.594.69 4.91 1.83L18.086 4.5A1 1 0 1 1 19.5 5.914L16.823 8.59A7.47 7.47 0 0 1 18 12.5C18 16.642 14.642 20 10.5 20S3 16.642 3 12.5Zm7.5-5.5A5.5 5.5 0 1 0 16 12.5 5.5 5.5 0 0 0 10.5 7Zm9.793 10.379 1.914 1.914a1 1 0 0 1-1.414 1.414l-1.914-1.914a1 1 0 0 1 1.414-1.414Z"/>
      </svg>
    </span>
    <span class="bottom-tabbar__label">Aktivitäten</span>

</body>
</html>

<!-- === BEGIN BLOCK: INBOX REVIEW PAGE (standalone, writeback-ready) ===
Zweck:
- Private Inbox-Review-Seite (nicht verlinkt)
- Lädt /data/inbox.json, filtert status=review
- Öffnen (url/source_url) + Übernehmen/Verwerfen per Apps-Script-Writeback
Umfang:
- Komplettes inbox/index.html inkl. Inline-JS
=== END BLOCK: INBOX REVIEW PAGE (standalone, writeback-ready) === -->
<!-- === BEGIN BLOCK: INBOX REVIEW PAGE (FINAL UI, storage-free) ===
Zweck:
- Finaler Daily-Review Screen: 1 Event gleichzeitig, maximal übersichtlich.
- Immer sichtbarer extrahierter Text (description).
- Auto-Unlock beim ersten Übernehmen/Verwerfen (Passwort-Prompt).
- Kein localStorage/sessionStorage (Tracking-Prevention kompatibel).
- API_URL fest verdrahtet.
Umfang:
- Komplette inbox/index.html (konsolidiert).
=== END BLOCK: INBOX REVIEW PAGE (FINAL UI, storage-free) === -->
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inbox Review</title>
<link rel="stylesheet" href="/css/style.css?v=1" />
  <style>
    /* === BEGIN BLOCK: FINAL REVIEW UI CSS (minimal, readable) ===
       Zweck:
       - Max. Lesbarkeit & klare Hierarchie für schnelles Ja/Nein.
       - Keine Debug-/Setup-UI.
       Umfang:
       - Nur Styles für diese Seite.
    === END BLOCK: FINAL REVIEW UI CSS (minimal, readable) === */

    /* === BEGIN BLOCK: REVIEW UI LAYOUT WITH COMPLETE EVENT DATA V1 ===
       Zweck:
       - Zeigt alle entscheidungsrelevanten Kandidatendaten lesbar an
       - Ergänzt Review-Grid, URL-Block und Ablehnungsgrund-Auswahl
       Umfang:
       - Nur Styles für inbox/index.html
    === END BLOCK: REVIEW UI LAYOUT WITH COMPLETE EVENT DATA V1 === */

    .wrap { max-width: 820px; margin: 0 auto; padding: 14px; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .brand { display:flex; align-items:baseline; gap:10px; }
    .title { font-weight: 700; }
    .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(0,0,0,.18); font-size: 12px; }
    .originBadge { display:inline-flex; align-items:center; width:max-content; margin:0 0 10px 0; padding:4px 10px; border-radius:999px; border:1px solid rgba(0,0,0,.18); font-size:12px; font-weight:700; }
    .riskBox { margin: 10px 0 12px; padding: 10px; border-radius: 12px; border: 1px solid rgba(160,0,0,.25); background: rgba(160,0,0,.04); font-size: 13px; line-height: 1.35; }
    .riskBox ul { margin: 6px 0 0 18px; padding: 0; }
    .muted { opacity: .75; }
    .btn { padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,.18); background: transparent; cursor: pointer; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-good { border-color: rgba(0,120,0,.45); }
    .btn-bad { border-color: rgba(160,0,0,.45); }

    .status { margin-top: 10px; font-size: 13px; }
    .card { margin-top: 12px; border: 1px solid rgba(0,0,0,.12); border-radius: 16px; padding: 14px; background: rgba(255,255,255,.02); }
    .card h1 { margin: 0 0 12px 0; font-size: 20px; line-height: 1.25; }

    .reviewGrid { display:grid; gap:7px; margin: 0 0 12px 0; }
    .reviewRow { display:grid; grid-template-columns: minmax(110px, 160px) 1fr; gap:10px; font-size:14px; line-height:1.35; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,.08); }
    .reviewLabel { font-weight:700; opacity:.78; }
    .reviewValue { min-width:0; overflow-wrap:anywhere; }

    .descTitle { margin: 14px 0 6px; font-size: 12px; letter-spacing: .02em; text-transform: uppercase; opacity: .8; }
    .desc { white-space: pre-wrap; font-size: 14px; line-height: 1.4; margin: 0 0 12px 0; }

    .urlBox { margin: 10px 0 12px; padding: 10px; border-radius: 12px; background: rgba(0,0,0,.035); font-size: 13px; line-height: 1.35; }
    .urlLine { overflow-wrap:anywhere; margin: 4px 0; }

    .rejectBox { margin: 10px 0 0; display:grid; gap:6px; }
    .rejectLabel { font-size: 12px; letter-spacing:.02em; text-transform: uppercase; opacity:.8; }
    .rejectSelect { width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(0,0,0,.18); background: transparent; font: inherit; }

    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    .actions .btn { flex: 1 1 160px; padding: 12px; font-size: 15px; }
    .sourceBtn { flex: 1 1 240px; }

    .footer { margin-top: 10px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }

    @media (max-width: 560px) {
      .reviewRow { grid-template-columns: 1fr; gap:2px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <div class="brand">
        <div class="title">Inbox Review</div>
        <span id="lockState" class="pill muted">gesperrt</span>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="deployBtn" class="btn" type="button">Deploy jetzt</button>
        <button id="reloadBtn" class="btn" type="button" aria-label="Reload">↻</button>
      </div>
    </div>

    <div id="statusLine" class="status muted"></div>

    <section id="one"></section>

    <div class="footer">
      <span id="progressLeft" class="pill muted"></span>
      <span id="progressRight" class="pill muted"></span>
    </div>
  </main>

  <script>
    // === BEGIN BLOCK: FINAL REVIEW LOGIC (storage-free, fixed API, auto-unlock) ===
    // Zweck:
    // - Lädt /data/inbox.json, filtert status=review
    // - Zeigt immer genau 1 Event
    // - description immer sichtbar
    // - Auto-Unlock beim ersten Approve/Reject (Passwort-Prompt)
    // - Token nur im RAM (solange Tab offen)
    // Umfang:
    // - Vollständige Logik für diese Seite (konsolidiert)
    // === END BLOCK: FINAL REVIEW LOGIC (storage-free, fixed API, auto-unlock) ===

    // === BEGIN BLOCK: REVIEW_INBOX_SOURCE_ENDPOINTS_V1 ===
    // Zweck:
    // - Bestehende KI-/Sheet-Inbox bleibt unverändert
    // - Formular-Submissions werden zusätzlich aus der DB-Review-API geladen
    // Umfang:
    // - Nur Endpoint-Konstanten für inbox/index.html
    const API_URL  = "https://script.google.com/macros/s/AKfycbxU3MYnINbhk-1XFehzGRYeto3f4BH9fyL6RmMlQPwmTt_wciHoESRo27nx1-KSIAos/exec";
    const SUBMISSIONS_REVIEW_API_URL = "/api/submissions/review-list.php";
    // === END BLOCK: REVIEW_INBOX_SOURCE_ENDPOINTS_V1 ===

    const elOne = document.getElementById("one");
    const elStatus = document.getElementById("statusLine");
    const elLock = document.getElementById("lockState");
    const elLeft = document.getElementById("progressLeft");
    const elRight = document.getElementById("progressRight");

    let queue = [];
    let current = null;
    let totalLoaded = 0;

    // Token nur im RAM (keine Storage APIs)
    let sessionToken = "";

    // === BEGIN BLOCK: REVIEW PAGE BUTTON BINDINGS V2 ===
    // Zweck:
    // - Bindet Reload und Deploy genau einmal
    // Umfang:
    // - Entfernt den doppelten Deploy-Listener
    document.getElementById("reloadBtn").addEventListener("click", () => loadAndShow());
    document.getElementById("deployBtn").addEventListener("click", async () => {
      const ok = await ensureUnlocked();
      if (!ok) return;
      await triggerDeploy();
    });
    // === END BLOCK: REVIEW PAGE BUTTON BINDINGS V2 ===

    function setStatus(msg) {
      elStatus.textContent = msg || "";
    }

    function isUnlocked() {
      return !!sessionToken;
    }

    function refreshLock() {
      if (isUnlocked()) {
        elLock.textContent = "entsperrt";
        elLock.classList.remove("muted");
      } else {
        elLock.textContent = "gesperrt";
        elLock.classList.add("muted");
      }
    }

    // === BEGIN BLOCK: REVIEW_INBOX_LOAD_SHEET_AND_SUBMISSIONS_V1 ===
    // Zweck:
    // - Lädt bestehende KI-/Sheet-Fälle weiter über Apps Script
    // - Lädt bezahlte Formular-Einreichungen zusätzlich aus MySQL über PHP-Review-API
    // - Kennzeichnet Sheet-Fälle als ai_search, ohne Event-Kategorie zu verändern
    // Umfang:
    // - Ersetzt loadAndShow und ergänzt Fetch-/Normalisierungshelfer
    async function fetchSubmissionReviewItems() {
      try {
        const response = await fetch(SUBMISSIONS_REVIEW_API_URL, {
          method: "GET",
          credentials: "same-origin",
          headers: { Accept: "application/json" }
        });

        const rawText = await response.text();
        let data = null;

        try {
          data = rawText ? JSON.parse(rawText) : null;
        } catch (_error) {
          data = null;
        }

        if (!response.ok || !data || data.status !== "ok") {
          return { items: [], total: 0, error: "submission_review_load_failed" };
        }

        const items = Array.isArray(data.data?.items) ? data.data.items : [];
        return { items, total: Number(data.data?.total || items.length || 0), error: "" };
      } catch (_error) {
        return { items: [], total: 0, error: "submission_review_network_failed" };
      }
    }

    function normalizeSheetReviewItem(item) {
      return {
        ...item,
        review_source: item.review_source || "sheet_inbox",
        intake_origin: item.intake_origin || "ai_search",
        intake_origin_label: item.intake_origin_label || "KI-Suche"
      };
    }

    async function loadAndShow() {
      setStatus("Lade …");
      elOne.innerHTML = "";
      queue = [];
      current = null;
      totalLoaded = 0;

      try {
        const [res, submissionsResult] = await Promise.all([
          jsonp(API_URL, { action: "listReview" }),
          fetchSubmissionReviewItems()
        ]);

        if (!res || !res.ok) {
          const err = (res && (res.error || res.detail || JSON.stringify(res))) || "unknown_error";
          setStatus("Fehler beim Laden: " + err);
          elLeft.textContent = "";
          elRight.textContent = "";
          refreshLock();
          return;
        }

        const sheetItems = Array.isArray(res.items) ? res.items.map(normalizeSheetReviewItem) : [];
        const submissionItems = Array.isArray(submissionsResult.items) ? submissionsResult.items : [];

        queue = [...submissionItems, ...sheetItems];
        totalLoaded = Number(res.total || sheetItems.length || 0) + Number(submissionsResult.total || submissionItems.length || 0);

        refreshLock();
        if (!queue.length && submissionsResult.error) {
          setStatus("Keine review-items. DB-Review konnte nicht geladen werden: " + submissionsResult.error);
        } else {
          setStatus(queue.length ? "" : "Keine review-items.");
        }

        showNext(totalLoaded);
      } catch (e) {
        console.error(e);
        setStatus("Fehler beim Laden (Netz/JSONP): " + (e && e.message ? e.message : e));
        elLeft.textContent = "";
        elRight.textContent = "";
        refreshLock();
      }
    }
    // === END BLOCK: REVIEW_INBOX_LOAD_SHEET_AND_SUBMISSIONS_V1 ===

    function showNext(totalCount) {
      current = queue.shift() || null;
      renderCurrent(totalCount);
    }

    function renderCurrent(totalCount) {
      refreshLock();

      const remaining = queue.length + (current ? 1 : 0);
      elLeft.textContent = remaining ? `${remaining} übrig` : `0 übrig`;
      elRight.textContent = totalCount ? `Inbox: ${totalCount}` : "";

      if (!current) {
        elOne.innerHTML = `
          <div class="card">
            <h1>Fertig 🎉</h1>
            <div class="muted">↻ zum Neuladen.</div>
          </div>
        `;
        return;
      }

      // === BEGIN BLOCK: RENDER COMPLETE REVIEW CARD WITH REJECTION REASONS V1 ===
      // Zweck:
      // - Zeigt alle entscheidungsrelevanten Eventdaten inkl. endDate, Kategorie, URLs, Dedupe-Hinweise
      // - Verwerfen verlangt festen deutschen Ablehnungsgrund
      // Umfang:
      // - Ersetzt den Rendering-Teil innerhalb renderCurrent(totalCount) ab const it=current bis Button-Listener
      const it = current;

      const date = (it.date || "").trim();
      const endDate = (it.endDate || "").trim();
      const time = (it.time || "").trim();

      const eventType = endDate ? "Mehrtagesevent" : "Einzeltermin";
      const dateLine = endDate ? `${date || "?"} bis ${endDate}` : date;
      const timeLine = time || (endDate ? "keine einheitliche Startzeit / nicht angegeben" : "nicht angegeben");

      const placeLine = [
        (it.city || "").trim(),
        (it.location || "").trim()
      ].filter(Boolean).join(" — ");

      const sourceLine = (it.source_name || "").trim();
      const desc = (it.description || "").trim();

      const eventUrl = (it.url || "").trim();
      const sourceUrl = (it.source_url || "").trim();
      const openEventDisabled = !eventUrl;
      const openSourceDisabled = !sourceUrl;

      const rejectOptions = [
        ["", "Ablehnungsgrund auswählen …"],
        ["DUBLETTE", "DUBLETTE – Event ist bereits vorhanden oder schon entschieden"],
        ["DATUM_FALSCH", "DATUM_FALSCH – Datum falsch oder nicht sicher belegbar"],
        ["ZEIT_FALSCH", "ZEIT_FALSCH – Uhrzeit falsch, Zeitspanne falsch oder Zeit nicht belegbar"],
        ["URL_FALSCH", "URL_FALSCH – URL falsch, 404, falscher Termin oder nicht instanzpassend"],
        ["QUELLE_ZU_SCHWACH", "QUELLE_ZU_SCHWACH – Quelle zu allgemein, unsicher oder keine echte Detailseite"],
        ["KEIN_EVENT", "KEIN_EVENT – kein echtes Event, eher Info, Öffnungszeit, Kursliste oder Promo"],
        ["ZU_NISCHIG", "ZU_NISCHIG – formal korrekt, aber zu wenig Nutzerwert"],
        ["AUSSERHALB_SCOPE", "AUSSERHALB_SCOPE – außerhalb Radius oder nicht relevant genug"],
        ["MONETARISIERUNGSSCHUTZ", "MONETARISIERUNGSSCHUTZ – geschützte Venue / direkte Promo potenzieller Kunden"],
        ["BOT_FEHLER_SONSTIGES", "BOT_FEHLER_SONSTIGES – Bot hat falsch extrahiert oder modelliert"],
        ["SONSTIGES", "SONSTIGES – nur wenn kein anderer Grund passt"]
      ];

      const rejectOptionsHtml = rejectOptions.map(([value, label]) => {
        return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
      }).join("");

      const originLabel = (it.intake_origin_label || "KI-Suche").trim();
      const originBadgeHtml = `<span class="originBadge">${escapeHtml(originLabel)}</span>`;
      const reviewRiskFlags = Array.isArray(it.review_risk_flags) ? it.review_risk_flags.filter(Boolean) : [];
      const reviewRiskHtml = reviewRiskFlags.length ? `
        <div class="riskBox">
          <strong>Review-Risiko</strong>
          <ul>${reviewRiskFlags.map((flag) => `<li>${escapeHtml(flag)}</li>`).join("")}</ul>
        </div>
      ` : "";

      const infoRows = [
        ["Herkunft", originLabel],
        ["Typ", eventType],
        ["Laufzeit", dateLine],
        ["Startzeit", timeLine],
        ["Ort", placeLine],
        ["Adresse/Treffpunkt", (it.location_address || "").trim()],
        ["Ortsfreigabe", it.review_source === "submission_db" ? (it.location_public_confirmed ? "bestätigt" : "nicht bestätigt") : ""],
        ["Kategorie", (it.kategorie_suggestion || "").trim()],
        ["Quelle", sourceLine],
        ["Match Score", (it.match_score || "").trim()],
        ["Matched Event ID", (it.matched_event_id || "").trim()],
        ["ID-Vorschlag", (it.id_suggestion || "").trim()],
        ["Submission-ID", it.submission_id ? String(it.submission_id) : ""],
        ["Eingang", (it.created_at || "").trim()],
        ["Notes", (it.notes || "").trim()]
      ].filter(([, value]) => value);

      const infoRowsHtml = infoRows.map(([label, value]) => `
        <div class="reviewRow">
          <div class="reviewLabel">${escapeHtml(label)}</div>
          <div class="reviewValue">${escapeHtml(value)}</div>
        </div>
      `).join("");

      elOne.innerHTML = `
        <article class="card">
          ${originBadgeHtml}
          <h1>${escapeHtml(it.title || "(ohne Titel)")}</h1>

          <div class="reviewGrid">
            ${infoRowsHtml}
          </div>

          ${reviewRiskHtml}

          <div class="descTitle">Beschreibung / extrahierter Text</div>
          <p class="desc">${escapeHtml(desc || "(kein Text vorhanden)")}</p>

          <div class="urlBox">
            ${eventUrl ? `<div class="urlLine"><strong>Event-URL:</strong> ${escapeHtml(eventUrl)}</div>` : ``}
            ${sourceUrl ? `<div class="urlLine"><strong>Source-URL:</strong> ${escapeHtml(sourceUrl)}</div>` : ``}
          </div>

          <div class="rejectBox">
            <label class="rejectLabel" for="rejectReason">Ablehnungsgrund beim Verwerfen</label>
            <select id="rejectReason" class="rejectSelect">
              ${rejectOptionsHtml}
            </select>
          </div>

          <div class="actions">
            <button id="btnOpenEvent" class="btn sourceBtn" type="button" ${openEventDisabled ? "disabled" : ""}>Event-URL öffnen</button>
            <button id="btnOpenSource" class="btn sourceBtn" type="button" ${openSourceDisabled ? "disabled" : ""}>Source-URL öffnen</button>
            <button id="btnNo" class="btn btn-bad" type="button">❌ Verwerfen</button>
            <button id="btnOk" class="btn btn-good" type="button">✅ Übernehmen</button>
          </div>

          ${isUnlocked() ? `` : `<div class="muted" style="margin-top:10px;">Beim ersten Klick auf Übernehmen/Verwerfen wird einmal nach Passwort gefragt.</div>`}
        </article>
      `;

      document.getElementById("btnOpenEvent").addEventListener("click", () => {
        if (!eventUrl) return;
        window.open(eventUrl, "_blank", "noopener,noreferrer");
      });

      document.getElementById("btnOpenSource").addEventListener("click", () => {
        if (!sourceUrl) return;
        window.open(sourceUrl, "_blank", "noopener,noreferrer");
      });

      document.getElementById("btnOk").addEventListener("click", () => approveReject("übernehmen"));
      document.getElementById("btnNo").addEventListener("click", () => approveReject("verworfen"));
      // === END BLOCK: RENDER COMPLETE REVIEW CARD WITH REJECTION REASONS V1 ===
    }

    async function approveReject(status) {
      if (!current) return;

      const ok = await ensureUnlocked();
      if (!ok) return;

      await writeStatus(current, status);
    }

    async function ensureUnlocked() {
      if (isUnlocked()) return true;

      const pw = prompt("Passwort (einmal pro Session):");
      if (!pw) return false;

      try {
        const res = await jsonp(API_URL, { action: "unlock", password: pw });
        if (!res || !res.ok || !res.token) {
          setStatus("Unlock fehlgeschlagen.");
          return false;
        }
        sessionToken = String(res.token || "");
        refreshLock();
        setStatus("");
        return true;
      } catch (e) {
        console.error(e);
        setStatus("Unlock fehlgeschlagen.");
        return false;
      }
    }

    // === BEGIN BLOCK: WRITE STATUS WITH REQUIRED REJECTION REASON V1 ===
    // Zweck:
    // - Übernehmen bleibt direkter Approve-Import
    // - Verwerfen sendet verpflichtend ablehnungsgrund an Apps Script
    // Umfang:
    // - Ersetzt writeStatus(it, newStatus)
    function writeStatus(it, newStatus) {
      return new Promise(async (resolve) => {
        if (String(it.review_source || "") === "submission_db") {
          await writeSubmissionStatus(it, newStatus);
          return resolve();
        }

        if (!it.row_number) {
          alert("Fehlt: row_number im Feed. Bitte Deploy prüfen.");
          return resolve();
        }

        const btnOk = document.getElementById("btnOk");
        const btnNo = document.getElementById("btnNo");
        const btnOpenEvent = document.getElementById("btnOpenEvent");
        const btnOpenSource = document.getElementById("btnOpenSource");
        const btnDeploy = document.getElementById("deployBtn");

        if (btnOk) btnOk.disabled = true;
        if (btnNo) btnNo.disabled = true;
        if (btnOpenEvent) btnOpenEvent.disabled = true;
        if (btnOpenSource) btnOpenSource.disabled = true;
        if (btnDeploy) btnDeploy.disabled = true;

        try {
          const isApprove = String(newStatus) === "übernehmen";

          let payload;

          if (isApprove) {
            payload = {
              action: "approve",
              token: sessionToken,
              row_number: String(it.row_number)
            };
          } else {
            const reasonSelect = document.getElementById("rejectReason");
            const ablehnungsgrund = reasonSelect ? String(reasonSelect.value || "").trim() : "";

            if (!ablehnungsgrund) {
              alert("Bitte zuerst einen Ablehnungsgrund auswählen.");
              renderCurrent(totalLoaded);
              return resolve();
            }

            payload = {
              action: "setStatus",
              token: sessionToken,
              row_number: String(it.row_number),
              status: String(newStatus),
              ablehnungsgrund: ablehnungsgrund
            };
          }

          const res = await jsonp(API_URL, payload);

          if (res && res.ok) {
            setStatus(isApprove ? "Übernommen." : "Verworfen.");
            await loadAndShow();
            return resolve();
          }

          const err = (res && (res.error || res.detail || JSON.stringify(res))) || "unknown_error";

          if (res && (res.error === "invalid_or_expired_token" || res.error === "missing_token")) {
            sessionToken = "";
            refreshLock();
            setStatus("Token ungültig/abgelaufen – bitte erneut klicken.");
            renderCurrent(totalLoaded);
            return resolve();
          }

          setStatus("Serverfehler: " + err);
          renderCurrent(totalLoaded);
          return resolve();

        } catch (e) {
          console.error(e);
          setStatus("Fehler beim Schreiben (Netz/JSONP): " + (e && e.message ? e.message : e));
          renderCurrent(totalLoaded);
          return resolve();
        } finally {
          if (btnOk) btnOk.disabled = false;
          if (btnNo) btnNo.disabled = false;
          if (btnOpenEvent) btnOpenEvent.disabled = false;
          if (btnOpenSource) btnOpenSource.disabled = false;
          if (btnDeploy) btnDeploy.disabled = false;
        }
      });
    }
    // === END BLOCK: WRITE STATUS WITH REQUIRED REJECTION REASON V1 ===

    // === BEGIN BLOCK: WRITE_SUBMISSION_REVIEW_STATUS_V1 ===
    // Zweck:
    // - Übernimmt oder verwirft DB-Submissions ohne Apps-Script-Row-Nummer
    // - Übernehmen nutzt bestehenden Approval-Endpunkt und bucht erst dann Kontingent
    // - Verwerfen nutzt neuen Reject-Endpunkt ohne Kontingentverbrauch
    // Umfang:
    // - Ergänzt PHP-JSON-Schreibpfad für review_source=submission_db
    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          Accept: "application/json"
        },
        body: JSON.stringify(payload)
      });

      const rawText = await response.text();
      let data = null;

      try {
        data = rawText ? JSON.parse(rawText) : null;
      } catch (_error) {
        data = null;
      }

      if (!response.ok || !data || data.status !== "ok") {
        const message = data?.message || data?.error_message || "request_failed";
        throw new Error(message);
      }

      return data;
    }

    async function writeSubmissionStatus(it, newStatus) {
      const submissionId = Number(it.submission_id || 0);
      if (submissionId <= 0) {
        alert("Fehlt: submission_id im DB-Review-Fall.");
        return;
      }

      const isApprove = String(newStatus) === "übernehmen";

      if (isApprove) {
        await postJson("/api/submissions/approve.php", { submission_id: submissionId });
        setStatus("Submission geprüft und freigegeben.");
        await loadAndShow();
        return;
      }

      const reasonSelect = document.getElementById("rejectReason");
      const ablehnungsgrund = reasonSelect ? String(reasonSelect.value || "").trim() : "";

      if (!ablehnungsgrund) {
        alert("Bitte zuerst einen Ablehnungsgrund auswählen.");
        renderCurrent(totalLoaded);
        return;
      }

      await postJson("/api/submissions/reject.php", {
        submission_id: submissionId,
        reason: ablehnungsgrund
      });

      setStatus("Submission verworfen.");
      await loadAndShow();
    }
    // === END BLOCK: WRITE_SUBMISSION_REVIEW_STATUS_V1 ===

    async function triggerDeploy() {
      const btnDeploy = document.getElementById("deployBtn");
      if (btnDeploy) btnDeploy.disabled = true;

      try {
        setStatus("Deploy wird gestartet …");

        const res = await jsonp(API_URL, {
          action: "deploy",
          token: sessionToken
        });

        if (res && res.ok) {
          setStatus("Deploy gestartet.");
          return;
        }

        const err = (() => {
          if (!res) return "unknown_error";
          if (res.error === "deploy_internal_error" && res.detail) {
            return res.error + ": " + res.detail;
          }
          return res.error || res.detail || JSON.stringify(res);
        })();

        if (res && (res.error === "invalid_or_expired_token" || res.error === "missing_token")) {
          sessionToken = "";
          refreshLock();
          setStatus("Token ungültig/abgelaufen – bitte erneut klicken.");
          return;
        }

        setStatus("Deploy-Fehler: " + err);
      } catch (e) {
        console.error(e);
        setStatus("Fehler beim Deploy (Netz/JSONP): " + (e && e.message ? e.message : e));
      } finally {
        if (btnDeploy) btnDeploy.disabled = false;
      }
    }

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // JSONP, damit Unlock robust ohne CORS-Header funktioniert
    function jsonp(apiUrl, params) {
      return new Promise((resolve, reject) => {
        const cbName = "__inbox_cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams(params || {});
        qs.set("callback", cbName);

        const src = apiUrl.replace(/\/exec.*$/, "/exec") + "?" + qs.toString() + "&t=" + Date.now();
        const script = document.createElement("script");

        window[cbName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("jsonp_load_failed"));
        };

        function cleanup() {
          try { delete window[cbName]; } catch (_) { window[cbName] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.src = src;
        document.body.appendChild(script);
      });
    }

    // Init
    (function init() {
      refreshLock();
      loadAndShow().catch(err => {
        console.error(err);
        setStatus("Fehler beim Laden.");
      });
    })();
  </script>

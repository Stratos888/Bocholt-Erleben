<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inbox Review</title>
<link rel="stylesheet" href="/css/style.css?v=2026-06-22-css-governance-v1" />
  <style>
    /* === BEGIN BLOCK: FINAL REVIEW UI CSS (minimal, readable) ===
       Zweck:
       - Max. Lesbarkeit & klare Hierarchie für schnelles Ja/Nein.
       - Keine Debug-/Setup-UI.
       Umfang:
       - Nur Styles für diese Seite.
    === END BLOCK: FINAL REVIEW UI CSS (minimal, readable) === */

    /* === BEGIN BLOCK: REVIEW UI LAYOUT WITH COMPLETE EVENT DATA V1 ===
       Zweck:
       - Zeigt alle entscheidungsrelevanten Kandidatendaten lesbar an
       - Ergänzt Review-Grid, URL-Block und Ablehnungsgrund-Auswahl
       Umfang:
       - Nur Styles für inbox/index.html
    === END BLOCK: REVIEW UI LAYOUT WITH COMPLETE EVENT DATA V1 === */

    /* === BEGIN BLOCK: REVIEW_INBOX_WORKBENCH_UI_V2 | Zweck: macht die Inbox zur kompakten Review-Arbeitskarte mit klarer Priorisierung von Daten, Flow und Aktionen; Umfang: zentrale Inbox-UI-Styles === */
    .wrap { max-width: 760px; margin: 0 auto; padding: 12px; }
    .top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .brand { display:flex; align-items:baseline; gap:10px; padding-top: 8px; }
    .title { font-weight: 800; line-height: 1.1; }
    .inboxToolbar { display:flex; justify-content:flex-end; gap:7px; flex-wrap:wrap; }
    /* === BEGIN BLOCK: INBOX_CONTENT_VERIFICATION_WORKBENCH_CSS_V1 | Zweck: fuehrt Audit-Faelle als klare Content-Pruefaufgaben mit Anweisung, Checkliste und Korrekturfeldern; Umfang: Mode-Switch und Verification-Karten-Ergaenzungen === */
    .reviewModeSwitch { display:flex; gap:7px; flex-wrap:wrap; margin: 9px 0 0; }
    .reviewModeSwitch .btn { padding: 7px 10px; font-size: 13px; }
    .reviewModeSwitch .is-active { border-color: rgba(38,118,62,.42); background: rgba(38,118,62,.075); font-weight: 800; }
    .auditIssueBox { display:grid; gap:7px; margin:0; padding:11px 12px; border-radius:14px; border:1px solid rgba(155,112,0,.28); background:rgba(155,112,0,.055); font-size:14px; line-height:1.35; }
    .auditIssueBox--critical { border-color:rgba(160,0,0,.35); background:rgba(160,0,0,.065); }
    .auditIssueBox--review_needed { border-color:rgba(155,112,0,.32); background:rgba(155,112,0,.065); }
    .auditIssueBox--warning { border-color:rgba(42,95,150,.25); background:rgba(42,95,150,.055); }
    .auditInstructionBox { display:grid; gap:8px; margin:0; padding:12px; border-radius:14px; border:1px solid rgba(38,118,62,.22); background:rgba(38,118,62,.055); font-size:14px; line-height:1.38; }
    .auditInstructionBox strong { display:block; margin-bottom:2px; }
    .auditChecklist { margin: 0; padding-left: 20px; display:grid; gap:5px; font-size:13.5px; line-height:1.32; }
    .auditFormGrid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:8px; }
    .auditField { display:grid; gap:4px; }
    .auditField--wide { grid-column: 1 / -1; }
    .auditField label { font-size:12px; font-weight:760; opacity:.78; }
    .auditField input,
    .auditField textarea { width:100%; box-sizing:border-box; padding:9px 10px; border-radius:12px; border:1px solid rgba(0,0,0,.18); font:inherit; background:transparent; }
    .auditField textarea { min-height:76px; resize:vertical; }
    .auditActionHint { font-size:12.5px; line-height:1.35; opacity:.76; }
    .auditStateNote { border-radius:12px; padding:9px 10px; background:rgba(0,0,0,.035); font-size:13px; line-height:1.35; }
    @media (max-width: 560px) { .auditFormGrid { grid-template-columns:1fr; } }
    /* === END BLOCK: INBOX_CONTENT_VERIFICATION_WORKBENCH_CSS_V1 === */
    .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(0,0,0,.16); font-size: 12px; }
    .muted { opacity: .72; }
    .status { margin-top: 8px; font-size: 13px; }

    .btn { padding: 9px 11px; border-radius: 12px; border: 1px solid rgba(0,0,0,.18); background: transparent; cursor: pointer; font: inherit; }
    .btn:disabled { opacity: .42; cursor: not-allowed; }
    .btn-push-active { border-color: rgba(0,120,0,.45); }
    .btn-good { border-color: rgba(0,120,0,.45); }
    .btn-bad { border-color: rgba(160,0,0,.45); }

    .card { margin-top: 12px; border: 1px solid rgba(0,0,0,.12); border-radius: 16px; padding: 14px; background: rgba(255,255,255,.02); }
    .reviewCard { display:grid; gap:12px; }
    .reviewCardHead { display:grid; gap:8px; padding-bottom: 2px; }
    .reviewCard h1 { margin: 0; font-size: 21px; line-height: 1.16; }
    .reviewMetaLine { color: rgba(20,35,28,.78); font-size: 13px; line-height: 1.3; overflow-wrap:anywhere; }

    .reviewBadgeRow { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .originBadge,
    .reviewChip { display:inline-flex; align-items:center; width:max-content; padding:4px 9px; border-radius:999px; border:1px solid rgba(0,0,0,.15); font-size:12px; font-weight:760; line-height:1.1; }
    .reviewChip--paid,
    .reviewChip--approved { border-color: rgba(38,118,62,.35); background: rgba(38,118,62,.07); color: rgb(24,83,42); }
    .reviewChip--waiting { border-color: rgba(155,112,0,.35); background: rgba(155,112,0,.08); color: rgb(92,65,15); }
    .reviewChip--blocked,
    .reviewChip--rejected { border-color: rgba(160,0,0,.32); background: rgba(160,0,0,.07); color: rgb(92,20,20); }

    .reviewSection { border-top: 1px solid rgba(0,0,0,.09); padding-top: 11px; }
    .reviewSectionTitle { margin: 0 0 8px; font-size: 12px; font-weight: 850; letter-spacing: .045em; text-transform: uppercase; opacity: .72; }
    .reviewPrimaryGrid { display:grid; gap:7px; }
    .reviewRow { display:grid; grid-template-columns: minmax(96px, 128px) 1fr; gap:10px; font-size:13.5px; line-height:1.26; padding: 3px 0; }
    .reviewLabel { font-weight:760; opacity:.78; }
    .reviewValue { min-width:0; overflow-wrap:anywhere; }

    .desc { white-space: pre-wrap; font-size: 14px; line-height: 1.34; margin: 0; overflow-wrap:anywhere; }
    .urlBox { display:grid; gap:5px; margin: 8px 0 0; padding: 9px 10px; border-radius: 12px; background: rgba(0,0,0,.035); font-size: 13px; line-height: 1.3; }
    .urlLine { overflow-wrap:anywhere; }

    .reviewDisclosure { border-top: 1px solid rgba(0,0,0,.09); padding-top: 9px; }
    .reviewDisclosure summary { cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12px; font-weight:850; letter-spacing:.045em; text-transform:uppercase; opacity:.76; }
    .reviewDisclosure summary::-webkit-details-marker { display:none; }
    .reviewDisclosure summary::after { content:"›"; transform:rotate(90deg); font-size:18px; line-height:1; opacity:.7; }
    .reviewDisclosure[open] summary::after { transform:rotate(-90deg); }
    .reviewDisclosureBody { margin-top: 8px; }

    .riskBox { margin: 0; padding: 9px 10px; border-radius: 12px; border: 1px solid rgba(160,0,0,.25); background: rgba(160,0,0,.04); font-size: 13px; line-height: 1.35; }
    .riskBox ul { margin: 6px 0 0 18px; padding: 0; }

    .rejectBox { display:grid; gap:6px; }
    .rejectLabel { font-size: 12px; letter-spacing:.02em; text-transform: uppercase; opacity:.75; }
    .rejectSelect { width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(0,0,0,.18); background: transparent; font: inherit; }
    .actions { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:8px; margin-top: 8px; }
    .actions .btn { min-width:0; padding: 9px 10px; font-size: 14px; line-height: 1.15; }
    .actions .actionPrimary { grid-column: 1 / -1; font-weight: 800; }
    .sourceBtn { flex: unset; }

    .reviewNotice { margin: 9px 0; padding: 11px 13px 11px 40px; border-radius: 14px; border: 1px solid rgba(160, 0, 0, .36); background: rgba(160, 0, 0, .075); color: rgb(92, 20, 20); font-size: 14px; font-weight: 760; line-height: 1.34; position: relative; box-shadow: 0 10px 22px rgba(80, 25, 25, .08); }
    .reviewNotice::before { content: "!"; position: absolute; left: 13px; top: 11px; width: 18px; height: 18px; border-radius: 999px; display: grid; place-items: center; background: rgb(160, 0, 0); color: #fff; font-size: 12px; font-weight: 900; line-height: 1; }
    .reviewNotice--success { border-color: rgba(38, 118, 62, .38); background: rgba(38, 118, 62, .085); color: rgb(24, 83, 42); }
    .reviewNotice--success::before { content: "✓"; background: rgb(38, 118, 62); }
    .reviewNotice[hidden] { display: none !important; }
    .footer { margin-top: 10px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }

    @media (max-width: 560px) {
      .wrap { padding: 8px; }
      .top { align-items:flex-start; }
      .inboxToolbar .btn { padding: 8px 10px; }
      .reviewRow { grid-template-columns: 1fr; gap:1px; }
      .actions { grid-template-columns: 1fr; }
    }
    /* === END BLOCK: REVIEW_INBOX_WORKBENCH_UI_V2 === */
  </style>

<body>
  <main class="wrap">
    <div class="top">
      <div class="brand">
        <div class="title">Inbox Review</div>
        <span id="lockState" class="pill muted">gesperrt</span>
      </div>
      <div class="inboxToolbar">
        <!-- === BEGIN BLOCK: INBOX_COMPACT_TOOLBAR_V1 | Zweck: reduziert den Inbox-Header und blendet die lokale Diagnose-Testmeldung aus; Umfang: sichtbare Toolbar-Buttons === -->
        <button id="pushBtn" class="btn" type="button">Push aktivieren</button>
        <button id="deployBtn" class="btn" type="button">Deploy jetzt</button>
        <button id="reloadBtn" class="btn" type="button" aria-label="Reload">↻</button>
        <!-- === END BLOCK: INBOX_COMPACT_TOOLBAR_V1 === -->
      </div>
    </div>

    <div id="statusLine" class="status muted"></div>

    <!-- === BEGIN BLOCK: INBOX_CONTENT_AUDIT_MODE_SWITCH_V1 | Zweck: macht Content-Pruefung in derselben privaten Inbox bearbeitbar, aber getrennt von neuen Event-Kandidaten; Umfang: zwei Mode-Buttons === -->
    <div class="reviewModeSwitch" aria-label="Review-Bereich">
      <button id="modeCurationBtn" class="btn is-active" type="button">Neue Events</button>
      <button id="modeAuditBtn" class="btn" type="button">Content-Prüfung</button>
    </div>
    <!-- === END BLOCK: INBOX_CONTENT_AUDIT_MODE_SWITCH_V1 === -->

    <section id="one"></section>

    <div class="footer">
      <span id="progressLeft" class="pill muted"></span>
      <span id="progressRight" class="pill muted"></span>
    </div>
  </main>

  <script>
    // === BEGIN BLOCK: FINAL REVIEW LOGIC (storage-free, fixed API, auto-unlock) ===
    // Zweck:
    // - Lädt /data/inbox.json, filtert status=review
    // - Zeigt immer genau 1 Event
    // - description immer sichtbar
    // - Auto-Unlock beim ersten Approve/Reject (Passwort-Prompt)
    // - Token nur im RAM (solange Tab offen)
    // Umfang:
    // - Vollständige Logik für diese Seite (konsolidiert)
    // === END BLOCK: FINAL REVIEW LOGIC (storage-free, fixed API, auto-unlock) ===

    // === BEGIN BLOCK: REVIEW_INBOX_SOURCE_ENDPOINTS_V1 ===
    // Zweck:
    // - Bestehende KI-/Sheet-Inbox bleibt unverändert
    // - Formular-Submissions werden zusätzlich aus der DB-Review-API geladen
    // Umfang:
    // - Nur Endpoint-Konstanten für inbox/index.html
    const API_URL  = "https://script.google.com/macros/s/AKfycbxU3MYnINbhk-1XFehzGRYeto3f4BH9fyL6RmMlQPwmTt_wciHoESRo27nx1-KSIAos/exec";
    const SUBMISSIONS_REVIEW_API_URL = "/api/submissions/review-list.php";
    /* === BEGIN BLOCK: INBOX_CONTENT_AUDIT_ENDPOINTS_V1 | Zweck: laedt und bearbeitet Content-Quality-Faelle aus Content_Audit/Content_Audit_Staging ueber geschuetzte Backend-Endpunkte; Umfang: Endpoint-Konstanten === */
    const CONTENT_AUDIT_LIST_API_URL = "/api/content-audit/list.php";
    const CONTENT_AUDIT_UPDATE_API_URL = "/api/content-audit/update.php";
    /* === END BLOCK: INBOX_CONTENT_AUDIT_ENDPOINTS_V1 === */

    /* === BEGIN BLOCK: INBOX_PUSH_ENDPOINTS_V1 | Zweck: interne Browser-Push-Registrierung nur für diese private Inbox-Seite; Umfang: Push-Endpunkt-Konstanten === */
    const PUSH_CONFIG_API_URL = "/api/push/config.php";
    const PUSH_SUBSCRIBE_API_URL = "/api/push/subscribe.php";
    const PUSH_TEST_API_URL = "/api/push/test.php";
    /* === END BLOCK: INBOX_PUSH_ENDPOINTS_V1 === */
    
    // === END BLOCK: REVIEW_INBOX_SOURCE_ENDPOINTS_V1 ===

    const elOne = document.getElementById("one");
    const elStatus = document.getElementById("statusLine");
    const elLock = document.getElementById("lockState");
    const elLeft = document.getElementById("progressLeft");
    const elRight = document.getElementById("progressRight");
    const elPushBtn = document.getElementById("pushBtn");
    const elLocalPushTestBtn = document.getElementById("localPushTestBtn");
    /* === BEGIN BLOCK: INBOX_CONTENT_AUDIT_MODE_STATE_V1 | Zweck: haelt Kuratierung und Content-Pruefung als getrennte Queues in einer UI; Umfang: DOM-Referenzen und Mode-State === */
    const elModeCurationBtn = document.getElementById("modeCurationBtn");
    const elModeAuditBtn = document.getElementById("modeAuditBtn");
    let activeReviewMode = "curation";
    /* === END BLOCK: INBOX_CONTENT_AUDIT_MODE_STATE_V1 === */
    
    let queue = [];
    let current = null;
    let totalLoaded = 0;
    /* === BEGIN BLOCK: INBOX_CONTENT_AUDIT_NAV_STATE_V1 | Zweck: erlaubt Vor-/Weiter-Navigation in Content-Prueffaellen ohne Statusaenderung; Umfang: nur Sitzungszustand fuer die Content-Pruefung === */
    let contentAuditHistory = [];
    /* === END BLOCK: INBOX_CONTENT_AUDIT_NAV_STATE_V1 === */

    // Token nur im RAM (keine Storage APIs)
    let sessionToken = "";
    let reviewApiPassword = "";

    // === BEGIN BLOCK: REVIEW PAGE BUTTON BINDINGS V2 ===
    // Zweck:
    // - Bindet Reload und Deploy genau einmal
    // Umfang:
    // - Entfernt den doppelten Deploy-Listener
    document.getElementById("reloadBtn").addEventListener("click", async () => {
      const ok = await ensureUnlocked();
      if (!ok) {
        renderLockedState();
        return;
      }
      await loadAndShow();
    });
    document.getElementById("deployBtn").addEventListener("click", async () => {
      const ok = await ensureUnlocked();
      if (!ok) return;
      await triggerDeploy();
    });

    /* === BEGIN BLOCK: INBOX_PUSH_BUTTON_BINDING_V1 | Zweck: registriert dieses Gerät für einfache Inbox-Pushmeldungen; Umfang: zusätzlicher Button-Listener ohne Review-Flow-Änderung === */
    if (elPushBtn) {
      elPushBtn.addEventListener("click", async () => {
        const ok = await ensureUnlocked();
        if (!ok) return;
        await enableInboxPush();
      });
    }
    /* === END BLOCK: INBOX_PUSH_BUTTON_BINDING_V1 === */

    /* === BEGIN BLOCK: INBOX_CONTENT_AUDIT_MODE_BINDINGS_V1 | Zweck: wechselt zwischen Event-Kuratierung und Content-Pruefung ohne Vermischung der Queues; Umfang: Mode-Button-Listener === */
    function refreshReviewModeButtons() {
      if (elModeCurationBtn) elModeCurationBtn.classList.toggle("is-active", activeReviewMode === "curation");
      if (elModeAuditBtn) elModeAuditBtn.classList.toggle("is-active", activeReviewMode === "content_audit");
    }

    async function switchReviewMode(mode) {
      activeReviewMode = mode === "content_audit" ? "content_audit" : "curation";
      refreshReviewModeButtons();
      const ok = await ensureUnlocked();
      if (!ok) {
        renderLockedState();
        return;
      }
      await loadAndShow();
    }

    if (elModeCurationBtn) {
      elModeCurationBtn.addEventListener("click", () => switchReviewMode("curation"));
    }
    if (elModeAuditBtn) {
      elModeAuditBtn.addEventListener("click", () => switchReviewMode("content_audit"));
    }
    /* === END BLOCK: INBOX_CONTENT_AUDIT_MODE_BINDINGS_V1 === */
        /* === BEGIN BLOCK: INBOX_LOCAL_NOTIFICATION_TEST_BINDING_V1 | Zweck: testet lokale Notification-Anzeige auf genau diesem Gerät ohne Server-Push; Umfang: zusätzlicher Diagnose-Button === */
    if (elLocalPushTestBtn) {
      elLocalPushTestBtn.addEventListener("click", async () => {
        const ok = await ensureUnlocked();
        if (!ok) return;
        await showLocalInboxNotificationTest();
      });
    }
    /* === END BLOCK: INBOX_LOCAL_NOTIFICATION_TEST_BINDING_V1 === */
    // === END BLOCK: REVIEW PAGE BUTTON BINDINGS V2 ===

    function setStatus(msg) {
      elStatus.textContent = msg || "";
    }
    /* === BEGIN BLOCK: REVIEW_CARD_NOTICE_HELPER_V1 | Zweck: zeigt fachliche Aktionsmeldungen direkt in der aktuellen Karte nahe bei den Review-Buttons; Umfang: lokale Hinweissteuerung === */
    function setReviewCardNotice(message, type = "error") {
      const node = document.getElementById("reviewCardNotice");
      if (!node) {
        setStatus(message);
        return;
      }

      const text = String(message || "").trim();
      if (!text) {
        node.hidden = true;
        node.textContent = "";
        node.className = "reviewNotice";
        return;
      }

      node.hidden = false;
      node.textContent = text;
      node.className = `reviewNotice reviewNotice--${type}`;
      node.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
    /* === END BLOCK: REVIEW_CARD_NOTICE_HELPER_V1 === */
    function isUnlocked() {
      return !!sessionToken;
    }

    function refreshLock() {
      if (isUnlocked()) {
        elLock.textContent = "entsperrt";
        elLock.classList.remove("muted");
      } else {
        elLock.textContent = "gesperrt";
        elLock.classList.add("muted");
      }
    }

    // === BEGIN BLOCK: REVIEW_INBOX_LOCKED_STATE_V1 ===
    // Zweck:
    // - Zeigt einen echten Sperrzustand, wenn die Passwortabfrage abgebrochen wird
    // - Verhindert sichtbares Laden von Review-Inhalten ohne erfolgreiche Entsperrung
    // Umfang:
    // - Ergänzt reinen UI-State ohne API-/Datenlogik
    function renderLockedState() {
      queue = [];
      current = null;
      totalLoaded = 0;
      setStatus("Kuratier-Inbox gesperrt. Bitte neu laden und Passwort eingeben.");
      elLeft.textContent = "";
      elRight.textContent = "";
      refreshLock();
      elOne.innerHTML = `
        <article class="card">
          <h1>Gesperrt</h1>
          <p class="muted">Die Kuratier-Inbox wird erst nach erfolgreicher Passwortabfrage geladen.</p>
          <button class="btn" type="button" onclick="window.location.reload()">Neu laden und entsperren</button>
        </article>
      `;
    }
    // === END BLOCK: REVIEW_INBOX_LOCKED_STATE_V1 ===

    // === BEGIN BLOCK: REVIEW_INBOX_LOAD_SHEET_AND_SUBMISSIONS_V1 ===
    // Zweck:
    // - Lädt bestehende KI-/Sheet-Fälle weiter über Apps Script
    // - Lädt bezahlte Formular-Einreichungen zusätzlich aus MySQL über PHP-Review-API
    // - Kennzeichnet Sheet-Fälle als ai_search, ohne Event-Kategorie zu verändern
    // Umfang:
    // - Ersetzt loadAndShow und ergänzt Fetch-/Normalisierungshelfer

    // === BEGIN BLOCK: INBOX_PUSH_REGISTRATION_HELPERS_V2 ===
    // Zweck:
    // - Aktiviert Web Push nur nach erfolgreichem Review-Unlock.
    // - Erkennt bestehende Browser-Subscriptions beim Neuladen der Inbox.
    // - Erzwingt beim Aktivieren ein Service-Worker-Update, damit der aktuelle Push-Handler genutzt wird.
    // Umfang:
    // - Additiv; ändert keine Lade-/Approve-/Reject-Logik.
    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);

      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }

      return outputArray;
    }

    function setInboxPushButtonActive(isActive) {
      if (!elPushBtn) return;

      elPushBtn.textContent = isActive ? "Push aktiv" : "Push aktivieren";
      elPushBtn.classList.toggle("btn-push-active", isActive);
    }

    async function fetchPushPublicKey() {
      const response = await fetch(PUSH_CONFIG_API_URL, {
        method: "GET",
        headers: {
          "Accept": "application/json",
          "X-BE-Review-Password": reviewApiPassword
        },
        cache: "no-store"
      });

      const payload = await response.json().catch(() => null);
      if (!response.ok || !payload || payload.status !== "ok" || !payload.data?.public_key) {
        throw new Error(payload?.message || "push_config_failed");
      }

      return String(payload.data.public_key);
    }

    async function getInboxPushRegistration({ forceUpdate = false } = {}) {
      if (!("serviceWorker" in navigator)) {
        return null;
      }

      let registration = await navigator.serviceWorker.getRegistration("/");
      if (!registration) {
        registration = await navigator.serviceWorker.register("/service-worker.js", {
          updateViaCache: "none"
        });
      }

      if (forceUpdate && registration && typeof registration.update === "function") {
        try {
          await registration.update();
        } catch (_error) {
          // Service-Worker-Update darf die Inbox nicht blockieren.
        }
      }

      if (registration?.waiting) {
        try {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        } catch (_error) {
          // Best effort.
        }
      }

      return await navigator.serviceWorker.ready;
    }

    async function refreshInboxPushState({ silent = false } = {}) {
      if (!elPushBtn) return false;

      if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) {
        setInboxPushButtonActive(false);
        if (!silent) setStatus("Push wird von diesem Browser nicht unterstützt.");
        return false;
      }

      if (Notification.permission !== "granted") {
        setInboxPushButtonActive(false);
        return false;
      }

      try {

    async function enableInboxPush() {
      if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) {
        setStatus("Push wird von diesem Browser nicht unterstützt.");
        return;
      }

      if (window.isSecureContext !== true) {
        setStatus("Push benötigt HTTPS.");
        return;
      }

      if (elPushBtn) elPushBtn.disabled = true;

      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          setInboxPushButtonActive(false);
          setStatus("Push wurde nicht erlaubt.");
          return;
        }

        const publicKey = await fetchPushPublicKey();
        const registration = await getInboxPushRegistration({ forceUpdate: true });

        let subscription = await registration.pushManager.getSubscription();
        if (!subscription) {
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey)
          });
        }

        const response = await fetch(PUSH_SUBSCRIBE_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
            "X-BE-Review-Password": reviewApiPassword
          },
          body: JSON.stringify({ subscription: subscription.toJSON() })
        });

        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload || payload.status !== "ok") {
          throw new Error(payload?.message || "push_subscribe_failed");
        }

        setInboxPushButtonActive(true);
        setStatus("Push aktiviert. Testnachricht wird gesendet …");

        await sendInboxPushTest();

        setStatus("Push aktiviert.");
      } catch (error) {
        console.error(error);
        setStatus("Push konnte nicht aktiviert werden: " + (error?.message || error));
        await refreshInboxPushState({ silent: true });
      } finally {
        if (elPushBtn) elPushBtn.disabled = false;

        if (activeReviewMode === "content_audit") {

          queue = Array.isArray(auditResult.items) ? auditResult.items : [];

          contentAuditHistory = [];

          refreshLock();

          } else if (queue.length > 0) {

          } else {
            setStatus("Content-Prüfung: keine offenen Fälle.");
          }

          showNext(totalLoaded);
          return;
        }
        /* === END BLOCK: INBOX_CONTENT_AUDIT_LOAD_BRANCH_V1 === */

        const [res, submissionsResult] = await Promise.all([
          jsonp(API_URL, { action: "listReview" }),
          fetchSubmissionReviewItems()
        ]);

        if (!res || !res.ok) {
          const err = (res && (res.error || res.detail || JSON.stringify(res))) || "unknown_error";

          elRight.textContent = "";
          refreshLock();
          return;

        /* === BEGIN BLOCK: REVIEW_QUEUE_ORDER_WITH_WAITING_PAYMENTS_V1 | Zweck: hält zahlungswartende Einzelevents sichtbar, sortiert sie aber hinter aktive Review-Fälle und Sheet-Kandidaten; Umfang: Queue-Aufbau und Statusmeldung in loadAndShow === */
        const sheetItems = Array.isArray(res.items) ? res.items.map(normalizeSheetReviewItem) : [];
        const submissionItems = Array.isArray(submissionsResult.items) ? submissionsResult.items : [];
        const waitingPaymentSubmissionItems = submissionItems.filter((item) => {

        });
        const activeSubmissionItems = submissionItems.filter((item) => {
          return !["payment_released", "checkout_started"].includes(trimValue(item.status));
        });

        queue = [...activeSubmissionItems, ...sheetItems, ...waitingPaymentSubmissionItems];
        totalLoaded = Number(res.total || sheetItems.length || 0) + Number(submissionsResult.total || submissionItems.length || 0);

        refreshLock();
        if (!queue.length && submissionsResult.error) {
          setStatus("Keine review-items. DB-Review konnte nicht geladen werden: " + submissionsResult.error);
        } else if (waitingPaymentSubmissionItems.length > 0 && queue.length === waitingPaymentSubmissionItems.length) {
          setStatus(`${waitingPaymentSubmissionItems.length} Einreichung(en) warten auf Zahlung. Keine weiteren aktiven Review-Fälle.`);
        } else if (waitingPaymentSubmissionItems.length > 0) {
          setStatus(`${waitingPaymentSubmissionItems.length} Einreichung(en) warten auf Zahlung und wurden ans Ende sortiert.`);
        } else {
          setStatus(queue.length ? "" : "Keine review-items.");

        showNext(totalLoaded);

    // === BEGIN BLOCK: REVIEW_DISPLAY_GERMAN_FORMAT_HELPERS_V2 ===
    // Zweck:
    // - Formatiert Datum, Zeitraum und Uhrzeiten für Einzeltage und Mehrtagesevents im deutschen Anzeigeformat
    // - Zeigt bei Mehrtagesevents ohne einheitliche Uhrzeit keinen falschen Startzeitwert an
    // - Unterstützt optional detaillierte Zeitpläne aus schedule_text/time_details/zeiten, ohne bestehende Datenquellen zu ändern
    // - Entfernt technische Dopplungen aus Formular-Notizen
    // Umfang:
    // - Nur Anzeigehelfer für inbox/index.html, keine Daten-/API-Logik
    function trimValue(value) {
      return String(value || "").trim();
    }

    function formatGermanDate(value) {
      const raw = trimValue(value);
      if (!raw) return "";

      const isoMatch = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (isoMatch) {
        return `${isoMatch[3]}.${isoMatch[2]}.${isoMatch[1]}`;
      }

      const germanMatch = raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (germanMatch) {
        return `${germanMatch[1].padStart(2, "0")}.${germanMatch[2].padStart(2, "0")}.${germanMatch[3]}`;
      }

      return raw;
    }

    function formatGermanTimeText(value) {
      const raw = trimValue(value);
      if (!raw) return "";

      let normalized = raw
        .replace(/\s*[–—-]\s*/g, "–")
        .replace(/\s+/g, " ")
        .trim();

      if (/uhr/i.test(normalized)) return normalized;

      const protectedRanges = [];
      normalized = normalized.replace(/(\d{1,2}):(\d{2})(?::\d{2})?\s*–\s*(\d{1,2}):(\d{2})(?::\d{2})?/g, (_match, h1, m1, h2, m2) => {
        const token = `__BE_TIME_RANGE_${protectedRanges.length}__`;
        protectedRanges.push([
          token,
          `${String(h1).padStart(2, "0")}:${m1}–${String(h2).padStart(2, "0")}:${m2} Uhr`
        ]);
        return token;
      });

      normalized = normalized.replace(/\b(\d{1,2}):(\d{2})(?::\d{2})?\b/g, (_match, h, m) => {
        return `${String(h).padStart(2, "0")}:${m} Uhr`;
      });

      for (const [token, replacement] of protectedRanges) {
        normalized = normalized.replace(token, replacement);
      }

      return normalized;
    }

    function formatGermanDateTimeText(value) {
      const raw = trimValue(value);
      if (!raw) return "";

      const withGermanDates = raw.replace(/\b(\d{4})-(\d{2})-(\d{2})\b/g, (_match, year, month, day) => {
        return `${day}.${month}.${year}`;
      });

      return formatGermanTimeText(withGermanDates);
    }

    function formatGermanDateTime(value) {
      const raw = trimValue(value);
      if (!raw) return "";

      const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})(?:[ T](\d{1,2}:\d{2})(?::\d{2})?)?/);
      if (!match) return formatGermanDateTimeText(raw);

      const datePart = `${match[3]}.${match[2]}.${match[1]}`;
      const timePart = match[4] ? formatGermanTimeText(match[4]) : "";

      return timePart ? `${datePart}, ${timePart}` : datePart;
    }

    function isMultiDayEvent(date, endDate) {
      const start = trimValue(date);
      const end = trimValue(endDate);
      return Boolean(start && end && start !== end);
    }

    function buildGermanDateRange(date, endDate) {
      const start = formatGermanDate(date);
      const end = formatGermanDate(endDate);

      if (start && end && start !== end) return `${start} bis ${end}`;
      return start || end || "";
    }

    function buildGermanTimeLine(item, date, endDate) {
      const timeLine = formatGermanTimeText(item.time);
      if (timeLine) return timeLine;

      if (isMultiDayEvent(date, endDate)) {
        return "keine einheitliche Uhrzeit angegeben – Beschreibung/Quelle prüfen";
      }

      return "keine Uhrzeit angegeben";
    }

    function buildScheduleDetails(item) {
      const explicitSchedule = [
        item.schedule_text,
        item.scheduleText,
        item.time_details,
        item.timeDetails,
        item.zeiten,
        item.zeitdetails
      ].map(trimValue).find(Boolean);

      return explicitSchedule ? formatGermanDateTimeText(explicitSchedule) : "";
    }

    function buildCurationNote(item) {
      const notes = trimValue(item.notes);
      if (!notes) return "";

      if (String(item.review_source || "") !== "submission_db") return notes;

      const filteredLines = notes
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .filter((line) => !/^Adresse \/ offizieller Treffpunkt:/i.test(line))
        .filter((line) => !/^PLZ:/i.test(line))
        .filter((line) => !/^Stadt \/ Ort:/i.test(line))
        .filter((line) => !/^Adresse zusammengesetzt:/i.test(line))
        .filter((line) => !/^Ortsbestätigung:/i.test(line));

      return filteredLines.join("\n");
    }

    function buildDedupeHint(item) {
      const hints = [

        trimValue(item.matched_event_id) ? `Matched Event-ID: ${trimValue(item.matched_event_id)}` : "",
        trimValue(item.id_suggestion) ? `ID-Vorschlag: ${trimValue(item.id_suggestion)}` : ""
      ].filter(Boolean);

      return hints.join(" · ");
    }
    // === END BLOCK: REVIEW_DISPLAY_GERMAN_FORMAT_HELPERS_V2 ===
    /* === BEGIN BLOCK: REVIEW_SUBMISSION_PAYMENT_FLOW_HELPERS_V1 | Zweck: übersetzt DB-Submission-Status in Review-Aktionen für Vorprüfung, Zahlungsfreigabe und finale Veröffentlichung; Umfang: Statuslabel- und Aktionshelper === */
    /* === BEGIN BLOCK: ACTIVITY_PRESENCE_REVIEW_HELPERS_V1 | Zweck: erkennt Aktivitaetspraesenzen und passt Review-Labels ohne neue Inbox-Architektur an; Umfang: ergänzt reine Helper vor getSubmissionReviewState === */

    /* === BEGIN BLOCK: REVIEW_ACTIVITY_OPENING_DISPLAY_V1 | Zweck: zeigt vom Anbieter angegebene Oeffnungszeiten in der Review-Inbox; Umfang: reine Anzeigehelfer fuer activity_opening ohne Review-Flow zu veraendern === */
    const ACTIVITY_OPENING_DAYS = Object.freeze([

      ["thursday", "Do"],
      ["friday", "Fr"],

    function getReviewPlainObject(value) {

    function formatActivityAccessType(value) {

    function formatActivityOpeningIntervals(intervals) {

      return intervals.map((interval) => {
        if (!Array.isArray(interval) || interval.length < 2) return "";

    function buildActivityOpeningSummary(opening) {
      const weekly = getReviewPlainObject(opening && opening.weekly);
      if (!weekly) return "";

    function buildActivityOpeningReviewRows(item) {

      const sourceUrl = trimValue(opening.source_url);
      if (sourceUrl) {
        rows.push(["Quelle Öffnungszeiten", sourceUrl]);
      }

      rows.push([
        "Prüfhinweis Öffnungszeiten",
        "Anbieterangabe; offensichtliche Fehler prüfen. Regelmäßige Aktualitätsprüfung folgt später."

    /* === END BLOCK: REVIEW_ACTIVITY_OPENING_DISPLAY_V1 === */

    /* === BEGIN BLOCK: REVIEW_ACTIVITY_IMAGE_DISPLAY_V1 | Zweck: zeigt Bildmaterial-Angaben aus Aktivitaetspraesenz-Einreichungen in der Review-Inbox; Umfang: reine Anzeigehelfer ohne Aktionslogik === */
    function formatActivityImageAvailability(value) {
      const key = trimValue(value);
      const labels = {
        yes: "Bildmaterial vorhanden",
        no: "Bocholt erleben soll sich kümmern",
        unsure: "Unsicher"
      };

      return labels[key] || key;
    }

    function formatActivityImageMethod(value) {
      const key = trimValue(value);
      const labels = {
        download_link: "Downloadlink / Cloud-Ordner / Pressemappe",
        website_gallery: "Website-Galerie",
        email_later: "Bilder folgen per E-Mail",
        other: "Sonstiges"
      };

      return labels[key] || key;
    }

    function formatActivityImageReviewStatus(value) {
      const key = trimValue(value);
      const labels = {
        customer_material_available: "Kundenmaterial prüfen",
        editorial_image_needed: "Redaktionelles Bild vorbereiten",
        image_clarification_needed: "Bildfrage klären"
      };

      return labels[key] || key;
    }

    function buildActivityImageReviewRows(item) {
      const image = getReviewPlainObject(item && item.activity_image);
      if (!image) return [];

      const rows = [
        ["Bildmaterial laut Anbieter", formatActivityImageAvailability(image.availability)],
        ["Bereitstellung", formatActivityImageMethod(image.method)],
        ["Bildlink", trimValue(image.url)],
        ["Hinweis zum Bildmaterial", trimValue(image.notes)],
        ["Bildrechte bestätigt", image.rights_confirmed === true ? "ja" : "nein / nicht erforderlich"],
        ["Bild-Prüfstatus", formatActivityImageReviewStatus(image.review_status)]
      ];

      return rows.filter(([, value]) => trimValue(value));
    }
    /* === END BLOCK: REVIEW_ACTIVITY_IMAGE_DISPLAY_V1 === */

    function renderCurrent(totalCount) {
      refreshLock();

      /* === BEGIN BLOCK: INBOX_CONTENT_AUDIT_PROGRESS_NAV_AWARE_V1 | Zweck: zeigt bei Content-Pruefung alle geladenen offenen Faelle weiter korrekt an, auch wenn der Nutzer nur vor/zurueck blaettert; Umfang: ersetzt Progress-Berechnung === */
      const remaining = isContentAuditItem(current)
        ? contentAuditSessionCount()
        : queue.length + (current ? 1 : 0);
      elLeft.textContent = remaining ? `${remaining} übrig` : `0 übrig`;
      elRight.textContent = totalCount ? `Inbox: ${totalCount}` : "";
      /* === END BLOCK: INBOX_CONTENT_AUDIT_PROGRESS_NAV_AWARE_V1 === */

      if (!current) {
        elOne.innerHTML = `
          <div class="card">
            <h1>Fertig 🎉</h1>
            <div class="muted">↻ zum Neuladen.</div>
          </div>
        `;
        return;
      }

      /* === BEGIN BLOCK: INBOX_CONTENT_AUDIT_RENDER_BRANCH_V1 | Zweck: rendert Content-Quality-Faelle als eigene Arbeitskarte statt sie durch die Event-Kandidaten-Logik zu schicken; Umfang: frueher Render-Branch === */
      if (isContentAuditItem(current)) {
        renderContentAuditCurrent(totalCount);
        return;
      }
      /* === END BLOCK: INBOX_CONTENT_AUDIT_RENDER_BRANCH_V1 === */

      // === BEGIN BLOCK: RENDER COMPLETE REVIEW CARD WITH REJECTION REASONS V1 ===
      // Zweck:
      // - Zeigt alle entscheidungsrelevanten Eventdaten inkl. endDate, Kategorie, URLs, Dedupe-Hinweise
      // - Verwerfen verlangt festen deutschen Ablehnungsgrund
      // Umfang:
      // - Ersetzt den Rendering-Teil innerhalb renderCurrent(totalCount) ab const it=current bis Button-Listener
      /* === BEGIN BLOCK: REVIEW_DISPLAY_CURATION_CORE_VALUES_V2 | Zweck: trennt Datum/Zeitraum und Uhrzeit/Zeiten, damit Mehrtagesevents und KI-Sheet-Fälle korrekt lesbar sind; Umfang: ersetzt Rohwert-Aufbereitung im Render-Block === */
      const it = current;

      const date = trimValue(it.date);
      const endDate = trimValue(it.endDate);
      const isMultiDay = isMultiDayEvent(date, endDate);
      const dateLabel = isMultiDay ? "Zeitraum" : "Datum";
      const dateRangeLine = buildGermanDateRange(date, endDate);
      const timeLine = buildGermanTimeLine(it, date, endDate);
      const scheduleDetails = buildScheduleDetails(it);

      const placeLine = [
        trimValue(it.location),
        trimValue(it.city)
      ].filter(Boolean).join(" · ");

      const sourceLine = trimValue(it.source_name);
      const desc = trimValue(it.description);
      const curationNote = buildCurationNote(it);
      const dedupeHint = buildDedupeHint(it);
      const submittedAt = formatGermanDateTime(it.created_at);
      const descriptionTitle = String(it.review_source || "") === "submission_db" ? "Beschreibung / Hinweise" : "Beschreibung / extrahierter Text";
      const isActivityPresence = isActivityPresenceItem(it);
      const primaryLinkLabel = getPrimaryReviewLinkLabel(it);

      const eventUrl = trimValue(it.url);
      const sourceUrl = trimValue(it.source_url);
      const openEventDisabled = !eventUrl;
      const openSourceDisabled = !sourceUrl;
      /* === END BLOCK: REVIEW_DISPLAY_CURATION_CORE_VALUES_V2 === */

      const rejectOptions = isActivityPresence ? [
        ["", "Ablehnungsgrund auswählen …"],
        ["Die Aktivität ist bereits vorhanden oder wurde bereits ausreichend abgedeckt.", "Doppelt / bereits abgedeckt"],
        ["Die Einreichung ist eher ein einzelner Termin als eine dauerhafte Aktivität.", "Einzeltermin statt Aktivität"],
        ["Die Aktivität ist nicht öffentlich oder für Besucher nicht klar nutzbar.", "Nicht öffentlich nutzbar"],
        ["Die Quelle oder die Angaben reichen für eine verlässliche Veröffentlichung nicht aus.", "Quelle / Angaben reichen nicht"],
        ["Die Aktivität passt räumlich nicht ausreichend zu Bocholt und Umgebung.", "Nicht lokal genug"],
        ["Die Einreichung ist eher Werbung, Dienstleistung oder Verkauf als eine redaktionelle Aktivität.", "Eher Werbung / Dienstleistung"],
        ["Die Aktivität ist in dieser Form nicht eigenständig genug für eine eigene Aktivitätskarte oder passt nicht ausreichend zum redaktionellen Fokus von Bocholt erleben.", "Keine eigene Aktivitätskarte"]
      ] : [
        ["", "Ablehnungsgrund auswählen …"],
        ["Die Veranstaltung ist bereits vorhanden oder wurde bereits ausreichend abgedeckt.", "Doppelt / bereits abgedeckt"],
        ["Die Terminangaben sind nicht belastbar genug, zum Beispiel Datum, Uhrzeit, Ort oder Link sind unklar.", "Terminangaben unklar"],
        ["Die Veranstaltung ist nicht öffentlich oder für Besucher nicht klar zugänglich.", "Nicht öffentlich zugänglich"],
        ["Die Einreichung ist eher ein Dauerangebot, eine Öffnungszeit, eine Kursübersicht, eine allgemeine Information oder Werbung als ein konkreter Einzeltermin.", "Kein konkreter Einzeltermin"],
        ["Die Quelle oder die Angaben reichen für eine verlässliche Veröffentlichung nicht aus.", "Quelle / Angaben reichen nicht"],
        ["Die Veranstaltung passt räumlich nicht ausreichend zu Bocholt und Umgebung.", "Nicht lokal genug"],
        ["Die Veranstaltung passt in dieser Form nicht ausreichend zum redaktionellen Fokus von Bocholt erleben.", "Redaktionell nicht passend"]
      ];

      const rejectOptionsHtml = rejectOptions.map(([value, label]) => {
        return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
      }).join("");

      const originLabel = (it.intake_origin_label || "KI-Suche").trim();
      const reviewState = getSubmissionReviewState(it);
      const originBadgeHtml = `<span class="originBadge">${escapeHtml(originLabel)}</span>`;
      const reviewRiskFlags = Array.isArray(it.review_risk_flags) ? it.review_risk_flags.filter(Boolean) : [];
      const reviewRiskHtml = reviewRiskFlags.length ? `
        <div class="riskBox">
          <strong>Review-Risiko</strong>
          <ul>${reviewRiskFlags.map((flag) => `<li>${escapeHtml(flag)}</li>`).join("")}</ul>
        </div>
      ` : "";

      /* === BEGIN BLOCK: REVIEW_CARD_WORKBENCH_LAYOUT_V2 | Zweck: verdichtet die Inbox-Karte zu einer kuratierbaren Arbeitsansicht mit priorisierten Daten, einklappbarem Flow und kompakter Aktionszone; Umfang: ersetzt Flow-/Datenzeilen und Kartenmarkup === */
      const statusKey = trimValue(it.status);
      const statusChipVariant = statusKey === "approved"
        ? "approved"
        : (["paid", "in_review"].includes(statusKey) ? "paid" : (["rejected"].includes(statusKey) ? "rejected" : "waiting"));

      const flowRows = [
        ["Review-Status", reviewState.label],
        ["Zahlungsfreigabe", trimValue(it.payment_released_at) ? formatGermanDateTime(it.payment_released_at) : ""],
        ["Zahlungslink gültig bis", trimValue(it.payment_start_token_expires_at) ? formatGermanDateTime(it.payment_start_token_expires_at) : ""],
        ["Zahlung gestartet", trimValue(it.payment_started_at) ? formatGermanDateTime(it.payment_started_at) : ""],
        ["Bezahlt am", trimValue(it.paid_at) ? formatGermanDateTime(it.paid_at) : ""]
      ].filter(([, value]) => value);

      const activityOpeningRows = isActivityPresence ? buildActivityOpeningReviewRows(it) : [];
      const activityImageRows = isActivityPresence ? buildActivityImageReviewRows(it) : [];

      const primaryRows = (isActivityPresence ? [
        ["Anbieter / Ort", placeLine],
        ["Adresse", trimValue(it.location_address)],
        ["Verfügbarkeit", timeLine || scheduleDetails],
        ["Quelle / Anbieter", sourceLine]
      ] : [
        [dateLabel, dateRangeLine],
        [isMultiDay ? "Uhrzeit / Zeiten" : "Uhrzeit", timeLine],
        ["Ort", placeLine],
        ["Adresse", trimValue(it.location_address)],
        ["Quelle / Veranstalter", sourceLine]
      ]).filter(([, value]) => value);

      const secondaryRows = (isActivityPresence ? [
        ["Ortsfreigabe", it.review_source === "submission_db" ? (it.location_public_confirmed ? "bestätigt" : "nicht bestätigt") : ""],
        ["Eingereicht am", submittedAt],
        ...activityImageRows,
        ...activityOpeningRows,
        ["Prüfhinweis", curationNote],
        ["Dubletten-/Importhinweis", dedupeHint]
      ] : [
        ["Zeitdetails", scheduleDetails],
        ["Ortsfreigabe", it.review_source === "submission_db" ? (it.location_public_confirmed ? "bestätigt" : "nicht bestätigt") : ""],
        ["Kategorie", trimValue(it.kategorie_suggestion)],
        ["Eingereicht am", submittedAt],
        ["Prüfhinweis", curationNote],
        ["Dubletten-/Importhinweis", dedupeHint]
      ]).filter(([, value]) => value);

      const renderReviewRows = (rows) => rows.map(([label, value]) => `
        <div class="reviewRow">
          <div class="reviewLabel">${escapeHtml(label)}</div>
          <div class="reviewValue">${escapeHtml(value)}</div>
        </div>
      `).join("");

      const flowRowsHtml = renderReviewRows(flowRows);
      const primaryRowsHtml = renderReviewRows(primaryRows);
      const secondaryRowsHtml = renderReviewRows(secondaryRows);
      const metaLine = (isActivityPresence
        ? [placeLine, timeLine || scheduleDetails]
        : [dateRangeLine, timeLine, placeLine]
      ).filter(Boolean).join(" · ");

      elOne.innerHTML = `
        <article class="card reviewCard">
          <header class="reviewCardHead">
            <div class="reviewBadgeRow">
              ${originBadgeHtml}
              <span class="reviewChip reviewChip--${escapeHtml(statusChipVariant)}">${escapeHtml(reviewState.label)}</span>
            </div>
            <h1>${escapeHtml(it.title || "(ohne Titel)")}</h1>
            ${metaLine ? `<div class="reviewMetaLine">${escapeHtml(metaLine)}</div>` : ``}
          </header>

          <section class="reviewSection reviewSection--data" aria-label="Event- und Aktivitätsdaten">
            <div class="reviewSectionTitle">${isActivityPresence ? "Wichtige Aktivitätsdaten" : "Wichtige Eventdaten"}</div>
            <div class="reviewPrimaryGrid">
              ${primaryRowsHtml}
            </div>
          </section>

          <section class="reviewSection reviewSection--description" aria-label="Beschreibung und Links">
            <div class="reviewSectionTitle">Beschreibung / Links</div>
            <p class="desc">${escapeHtml(desc || "(kein Text vorhanden)")}</p>
            <div class="urlBox">
              ${eventUrl ? `<div class="urlLine"><strong>${escapeHtml(primaryLinkLabel.replace(" öffnen", ""))}:</strong> ${escapeHtml(eventUrl)}</div>` : ``}
              ${sourceUrl ? `<div class="urlLine"><strong>Quelle:</strong> ${escapeHtml(sourceUrl)}</div>` : ``}
            </div>
          </section>

          ${reviewRiskHtml}

          <details class="reviewDisclosure reviewDisclosure--flow">
            <summary>Flow / Zahlung</summary>
            <div class="reviewDisclosureBody reviewGrid">
              ${flowRowsHtml}
            </div>
          </details>

          ${secondaryRowsHtml ? `
            <details class="reviewDisclosure reviewDisclosure--secondary">
              <summary>Weitere Prüfdaten</summary>
              <div class="reviewDisclosureBody reviewGrid">
                ${secondaryRowsHtml}
              </div>
            </details>
          ` : ``}

          <section class="reviewSection reviewSection--actions" aria-label="Review-Aktionen">
            <div class="rejectBox">
              <label class="rejectLabel" for="rejectReason">Ablehnungsgrund</label>
              <select id="rejectReason" class="rejectSelect">
                ${rejectOptionsHtml}
              </select>
            </div>

            <div id="reviewCardNotice" class="reviewNotice" hidden role="status" aria-live="polite"></div>

            <div class="actions actions--compact">
              <button id="btnOk" class="btn btn-good actionPrimary" type="button">${escapeHtml(reviewState.approveLabel)}</button>
              <button id="btnOpenEvent" class="btn sourceBtn" type="button" ${openEventDisabled ? "disabled" : ""}>${escapeHtml(primaryLinkLabel)}</button>
              <button id="btnOpenSource" class="btn sourceBtn" type="button" ${openSourceDisabled ? "disabled" : ""}>Quelle</button>
              <button id="btnLater" class="btn" type="button">Später</button>
              <button id="btnNo" class="btn btn-bad" type="button">${escapeHtml(reviewState.rejectLabel)}</button>
            </div>
          </section>

          ${isUnlocked() ? `` : `<div class="muted" style="margin-top:10px;">Beim ersten Klick auf Übernehmen/Verwerfen wird einmal nach Passwort gefragt.</div>`}
        </article>
      `;
      /* === END BLOCK: REVIEW_CARD_WORKBENCH_LAYOUT_V2 === */

      document.getElementById("btnOpenEvent").addEventListener("click", () => {
        if (!eventUrl) return;
        window.open(eventUrl, "_blank", "noopener,noreferrer");
      });

      document.getElementById("btnOpenSource").addEventListener("click", () => {
        if (!sourceUrl) return;
        window.open(sourceUrl, "_blank", "noopener,noreferrer");
      });
      /* === BEGIN BLOCK: REVIEW_DEFER_BUTTON_BINDING_V1 | Zweck: bindet den Später-prüfen-Button an die lokale Zurückstellen-Funktion; Umfang: ein zusätzlicher Button-Listener im Render-Block === */
      document.getElementById("btnLater").addEventListener("click", deferCurrentItem);
      /* === END BLOCK: REVIEW_DEFER_BUTTON_BINDING_V1 === */
      document.getElementById("btnOk").addEventListener("click", () => approveReject("übernehmen"));
      document.getElementById("btnNo").addEventListener("click", () => approveReject("verworfen"));
      // === END BLOCK: RENDER COMPLETE REVIEW CARD WITH REJECTION REASONS V1 ===
    }

    /* === BEGIN BLOCK: INBOX_CONTENT_VERIFICATION_RENDER_AND_ACTIONS_V2 | Zweck: macht Content-Quality-Faelle als klare Pruefaufgaben mit Checkliste, Korrekturfeldern und eindeutigen Statusaktionen bearbeitbar; Umfang: eigener Render- und Write-Pfad fuer review_source=content_audit === */
    function buildContentAuditRows(item) {
      return [
        ["Arbeitsbereich", trimValue(item.workbench_group)],
        ["Prozesskategorie", trimValue(item.process_category)],
        ["Korrekturweg", trimValue(item.correction_owner)],
        ["Automatik-Regel", trimValue(item.automation_policy)],
        ["Typ", trimValue(item.content_type)],
        ["Quelle", trimValue(item.source_system)],
        ["ID", trimValue(item.content_id)],
        ["Datum", formatGermanDate(item.date)],
        ["Issue-Code", trimValue(item.issue_code)],
        ["Status", formatContentAuditStatus(item.status)],
        ["Erstmals gesehen", formatGermanDateTime(item.first_seen_at)],
        ["Zuletzt gesehen", formatGermanDateTime(item.last_seen_at)],
        ["Anzahl", trimValue(item.occurrence_count)],
        ["Nächste Prüfung", formatGermanDate(item.next_review_at)],

      ].filter(([, value]) => trimValue(value));

      const guides = {

    async function writeContentAuditAction(it, action, extra = {}) {
      const ok = await ensureUnlocked();
      if (!ok) return;

      ["btnAuditSaveFields", "btnAuditVerified", "btnAuditSnooze", "btnAuditPatchNeeded", "btnAuditPrevious", "btnAuditNext", "btnOpenEvent", "btnOpenSource"].forEach((id) => {

        if (button) button.disabled = true;
      });

      try {
        const payload = {
          action,
          row_number: Number(it.row_number || 0),
          content_id: trimValue(it.content_id),
          issue_code: trimValue(it.issue_code),
          ...extra
        };

        await postJson(CONTENT_AUDIT_UPDATE_API_URL, payload);
        const labels = {
          update_event_fields: "Eventdaten korrigiert.",
          verify_full: "Content-Fall vollständig geprüft.",
          snooze: "Content-Fall 7 Tage zurückgestellt.",
          mark_patch_needed: "Content-Fall als Patch nötig markiert."
        };
        setStatus(labels[action] || "Content-Fall aktualisiert.");
        showNext(totalLoaded);
      } catch (error) {
        console.error(error);
        renderContentAuditCurrent(totalLoaded);
        setReviewCardNotice("Content-Fall konnte nicht aktualisiert werden: " + (error?.message || error), "error");
        setStatus("");
      }
    }

    async function ensureUnlocked() {
      if (isUnlocked()) return true;

      const pw = prompt("Passwort (einmal pro Session):");
      if (!pw) return false;

      try {
        const res = await jsonp(API_URL, { action: "unlock", password: pw });
        if (!res || !res.ok || !res.token) {
          setStatus("Unlock fehlgeschlagen.");
          return false;
        }
        sessionToken = String(res.token || "");
        reviewApiPassword = pw;
        refreshLock();
        setStatus("");
        return true;
      } catch (e) {
        console.error(e);
        setStatus("Unlock fehlgeschlagen.");
        return false;
      }
    }

    /* === BEGIN BLOCK: WRITE_STATUS_WITH_DEFER_BUTTON_STATE_V2 | Zweck: schreibt Sheet- und DB-Review-Entscheidungen mit sauberem Button-State inklusive Später-prüfen-Button; Umfang: ersetzt writeStatus vollständig === */
    function setReviewActionButtonsDisabled(disabled) {
      ["btnOk", "btnNo", "btnLater", "deployBtn"].forEach((id) => {
        const button = document.getElementById(id);
        if (button) button.disabled = disabled;
      });

      if (disabled) {
        ["btnOpenEvent", "btnOpenSource"].forEach((id) => {
          const button = document.getElementById(id);
          if (button) button.disabled = true;
        });
      }
    }

    async function writeStatus(it, newStatus) {
      setReviewActionButtonsDisabled(true);

      try {
        if (String(it.review_source || "") === "submission_db") {
          await writeSubmissionStatus(it, newStatus);
          return;
        }

        if (!it.row_number) {
          alert("Fehlt: row_number im Feed. Bitte Deploy prüfen.");
          renderCurrent(totalLoaded);
          return;
        }

        const isApprove = String(newStatus) === "übernehmen";
        let payload;

        if (isApprove) {
          payload = {
            action: "approve",
            token: sessionToken,
            row_number: String(it.row_number)
          };
        } else {
          const reasonSelect = document.getElementById("rejectReason");
          const ablehnungsgrund = reasonSelect ? String(reasonSelect.value || "").trim() : "";

          if (!ablehnungsgrund) {
            alert("Bitte zuerst einen Ablehnungsgrund auswählen.");
            renderCurrent(totalLoaded);
            return;
          }

          payload = {
            action: "setStatus",
            token: sessionToken,
            row_number: String(it.row_number),
            status: String(newStatus),
            ablehnungsgrund: ablehnungsgrund
          };
        }

        const res = await jsonp(API_URL, payload);

        if (res && res.ok) {
          setStatus(isApprove ? "Übernommen." : "Verworfen.");
          await loadAndShow();
          return;
        }

        const err = (res && (res.error || res.detail || JSON.stringify(res))) || "unknown_error";

        if (res && (res.error === "invalid_or_expired_token" || res.error === "missing_token")) {
          sessionToken = "";
          reviewApiPassword = "";
          refreshLock();
          setStatus("Token ungültig/abgelaufen – bitte erneut klicken.");
          renderCurrent(totalLoaded);
          return;
        }

        setStatus("Serverfehler: " + err);
        renderCurrent(totalLoaded);
      } catch (e) {
        console.error(e);
        if (String(it.review_source || "") === "submission_db") {
          renderCurrent(totalLoaded);
          setReviewCardNotice(normalizeSubmissionReviewError(e), "error");
          setStatus("");
        } else {
          setStatus("Fehler beim Schreiben (Netz/JSONP): " + (e && e.message ? e.message : e));
          renderCurrent(totalLoaded);
        }
      } finally {
        setReviewActionButtonsDisabled(false);
      }
    }
    /* === END BLOCK: WRITE_STATUS_WITH_DEFER_BUTTON_STATE_V2 === */

    // === BEGIN BLOCK: WRITE_SUBMISSION_REVIEW_STATUS_V1 ===
    // Zweck:
    // - Übernimmt oder verwirft DB-Submissions ohne Apps-Script-Row-Nummer
    // - Übernehmen nutzt bestehenden Approval-Endpunkt und bucht erst dann Kontingent
    // - Verwerfen nutzt neuen Reject-Endpunkt ohne Kontingentverbrauch
    // Umfang:
    // - Ergänzt PHP-JSON-Schreibpfad für review_source=submission_db
    /* === BEGIN BLOCK: SUBMISSION_REVIEW_JSON_ERROR_MESSAGES_V1 | Zweck: zeigt fachliche Backend-Fehler aus DB-Review-Aktionen direkt in der Inbox statt generischer Netz-/JSONP-Meldung; Umfang: ergänzt Error-Normalisierung und ersetzt postJson === */
    function normalizeSubmissionReviewError(error) {
      const message = String(error && error.message ? error.message : error || "").trim();

      if (!message || message === "request_failed") {
        return "Aktion konnte nicht ausgeführt werden. Bitte später erneut versuchen.";
      }

      if (message === "review_api_locked") {
        return "Review ist gesperrt. Bitte erst entsperren.";
      }

      if (
        /Zahlung wurde noch nicht bestätigt/i.test(message)
        || /noch nicht bezahlt/i.test(message)
        || /nicht freigabefähig/i.test(message)
      ) {
        return "Die Zahlung wurde noch nicht bestätigt. Bitte erst den Zahlungsstatus prüfen oder den Zahlungslink erneut senden.";
      }

      return message;
    }

    async function postJson(url, payload) {
      if (!reviewApiPassword) {
        throw new Error("review_api_locked");
      }

      const response = await fetch(url, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          Accept: "application/json",
          "X-BE-Review-Password": reviewApiPassword
        },
        body: JSON.stringify(payload)
      });

      const rawText = await response.text();
      let data = null;

      try {
        data = rawText ? JSON.parse(rawText) : null;
      } catch (_error) {
        data = null;
      }

      if (!response.ok || !data || data.status !== "ok") {
        const message = data?.message || data?.error_message || "request_failed";
        throw new Error(message);
      }

      return data;
    }
    /* === END BLOCK: SUBMISSION_REVIEW_JSON_ERROR_MESSAGES_V1 === */

    async function writeSubmissionStatus(it, newStatus) {
      const submissionId = Number(it.submission_id || 0);
      if (submissionId <= 0) {
        setReviewCardNotice("Fehlt: submission_id im DB-Review-Fall.", "error");
        return;
      }

      const isApprove = String(newStatus) === "übernehmen";

      if (isApprove) {
        const reviewState = getSubmissionReviewState(it);

        if (reviewState.actionMode === "release_payment") {
          const result = await postJson("/api/submissions/release-payment.php", { submission_id: submissionId });
          const data = result?.data || {};

          it.status = data.submission_status || "payment_released";
          it.payment_start_token_expires_at = data.payment_start_token_expires_at || it.payment_start_token_expires_at || "";

          renderCurrent(totalLoaded);
          setReviewCardNotice(
            isActivityPresenceItem(it)
              ? "Zahlungslink wurde versendet. Die Aktivität kann nach bestätigter Zahlung veröffentlicht werden."
              : "Zahlungslink wurde versendet. Die Veranstaltung kann nach bestätigter Zahlung veröffentlicht werden.",
            "success"
          );
          setStatus("");
          return;
        }

        /* === BEGIN BLOCK: INBOX_DB_TERMINAL_STATUS_ADVANCE_V1 | Zweck: entfernt veröffentlichte/abgelehnte DB-Submissions sofort aus der aktuellen Inbox-Ansicht und vermeidet Bearbeitung bereits terminaler Fälle; Umfang: ersetzt nur Publish- und Reject-Erfolgspfad in writeSubmissionStatus === */
        const result = await postJson("/api/submissions/approve.php", { submission_id: submissionId });
        const data = result?.data || {};
        const publicationMailStatus = String(data.publication_mail_status || "");
        const publicationMailError = String(data.publication_mail_error || "");

        it.status = "approved";
        it.approved_at = it.approved_at || new Date().toISOString();

        const baseMessage = isActivityPresenceItem(it)
          ? "Aktivitätspräsenz wurde veröffentlicht. Die Veröffentlichung wurde dem passenden Tarif zugeordnet."
          : "Einreichung wurde veröffentlicht. Die Veröffentlichung wurde dem passenden Tarif zugeordnet.";

        const mailMessage = publicationMailStatus === "sent"
          ? " Veröffentlichungs-Mail wurde versendet."
          : publicationMailStatus === "failed"
            ? ` Veröffentlichungs-Mail konnte nicht versendet werden: ${publicationMailError || "unbekannter Fehler"}.`
            : publicationMailStatus === "skipped"
              ? ` Veröffentlichungs-Mail wurde nicht versendet${publicationMailError ? `: ${publicationMailError}` : ""}.`
              : "";

        setStatus(baseMessage + mailMessage);
        showNext(totalLoaded);
        return;
      }

      const reasonSelect = document.getElementById("rejectReason");
      const ablehnungsgrund = reasonSelect ? String(reasonSelect.value || "").trim() : "";

      if (!ablehnungsgrund) {
        setReviewCardNotice("Bitte zuerst einen Ablehnungsgrund auswählen.", "error");
        return;
      }

      await postJson("/api/submissions/reject.php", {
        submission_id: submissionId,
        reason: ablehnungsgrund
      });

      it.status = "rejected";
      it.rejected_at = it.rejected_at || new Date().toISOString();

      setStatus(
        isActivityPresenceItem(it)
          ? "Aktivitätspräsenz wurde abgelehnt und aus der Inbox entfernt."
          : "Einreichung wurde abgelehnt und aus der Inbox entfernt."
      );
      showNext(totalLoaded);
      /* === END BLOCK: INBOX_DB_TERMINAL_STATUS_ADVANCE_V1 === */
    }
    // === END BLOCK: WRITE_SUBMISSION_REVIEW_STATUS_V1 ===

    async function triggerDeploy() {
      const btnDeploy = document.getElementById("deployBtn");
      if (btnDeploy) btnDeploy.disabled = true;

      try {
        setStatus("Deploy wird gestartet …");

        const res = await jsonp(API_URL, {
          action: "deploy",
          token: sessionToken
        });

        if (res && res.ok) {
          setStatus("Deploy gestartet.");
          return;
        }

        const err = (() => {
          if (!res) return "unknown_error";
          if (res.error === "deploy_internal_error" && res.detail) {
            return res.error + ": " + res.detail;
          }
          return res.error || res.detail || JSON.stringify(res);
        })();

        if (res && (res.error === "invalid_or_expired_token" || res.error === "missing_token")) {
          sessionToken = "";
          reviewApiPassword = "";
          refreshLock();
          setStatus("Token ungültig/abgelaufen – bitte erneut klicken.");
          return;
        }

        setStatus("Deploy-Fehler: " + err);
      } catch (e) {
        console.error(e);
        setStatus("Fehler beim Deploy (Netz/JSONP): " + (e && e.message ? e.message : e));
      } finally {
        if (btnDeploy) btnDeploy.disabled = false;
      }
    }

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // JSONP, damit Unlock robust ohne CORS-Header funktioniert
    function jsonp(apiUrl, params) {
      return new Promise((resolve, reject) => {
        const cbName = "__inbox_cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams(params || {});
        qs.set("callback", cbName);

        const src = apiUrl.replace(/\/exec.*$/, "/exec") + "?" + qs.toString() + "&t=" + Date.now();
        const script = document.createElement("script");

        window[cbName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("jsonp_load_failed"));
        };

        function cleanup() {
          try { delete window[cbName]; } catch (_) { window[cbName] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.src = src;
        document.body.appendChild(script);
      });
    }

    // === BEGIN BLOCK: REVIEW_INBOX_INITIAL_UNLOCK_REQUIRED_V2 ===
    // Zweck:
    // - Verhindert, dass die Kuratier-PWA nach abgebrochener Passwortabfrage trotzdem Inhalte lädt
    // - Entsperrt die DB-Review-Endpunkte erst nach erfolgreicher Passwortprüfung
    // Umfang:
    // - Ersetzt Init-Block
    (async function init() {
      refreshReviewModeButtons();
      refreshLock();

      try {
        const ok = await ensureUnlocked();
        if (!ok) {
          renderLockedState();
          return;
        }

        await refreshInboxPushState({ silent: true });
        await loadAndShow();
      } catch (err) {
        console.error(err);
        setStatus("Fehler beim Laden.");
      }
    })();
    // === END BLOCK: REVIEW_INBOX_INITIAL_UNLOCK_REQUIRED_V2 ===
  </script>
</body>

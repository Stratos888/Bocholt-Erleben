<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Bocholt erleben · Arbeitsansicht</title>
  <style>
    :root{--primary:#8BCF4A;--primary-muted:#EAF6DB;--background:#F9FBF6;--surface:#fff;--text:#1F2933;--muted:#5F6B73;--soft:#EDF2E8;--line:#DDE7D4;--danger:#B42318;--warning:#A15C07;--ok:#2E7D32;--radius:24px;--shadow:0 16px 36px rgba(31,41,51,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--background);color:var(--text);font:15px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{min-height:100svh;padding:18px 16px 80px;max-width:760px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.eyebrow{color:var(--muted);font-size:13px;font-weight:800;letter-spacing:.03em;text-transform:uppercase}h1{margin:3px 0 0;font-size:30px;line-height:1.05;letter-spacing:-.04em}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:0 10px 24px rgba(31,41,51,.045);margin:12px 0}.nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#EEF5E8;border:1px solid var(--line);border-radius:20px;padding:6px;margin:14px 0}.nav button,.btn{border:0;border-radius:15px;padding:10px 12px;background:transparent;color:var(--muted);font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;font:inherit}.nav button.active,.btn.primary{background:var(--primary);color:#1D3510}.btn{background:#F2F5EF;color:var(--text);cursor:pointer}.btn.danger{background:#FFE8E5;color:var(--danger)}.btn:disabled{opacity:.55;cursor:not-allowed}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}.tag{border-radius:999px;background:#F2F5EF;color:var(--muted);padding:4px 8px;font-size:12px;font-weight:850}.title{font-size:20px;font-weight:950;letter-spacing:-.03em}.sub{color:var(--muted);font-weight:750;margin-top:4px}.row{display:grid;grid-template-columns:120px 1fr;gap:8px;margin:6px 0}.label{color:var(--muted);font-weight:850}.value{overflow-wrap:anywhere}.status{margin:10px 0;color:var(--muted);font-weight:800}.empty{padding:24px 8px;color:var(--muted);text-align:center}.field{display:grid;gap:5px;margin-top:10px}.field label{font-size:12px;font-weight:850;color:var(--muted)}select,textarea,input{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px;background:#FBFCFA;font:inherit}textarea{min-height:80px}.back{border:1px solid var(--line);background:#fff;color:var(--muted)}@media(max-width:560px){.row{grid-template-columns:1fr}.nav{grid-template-columns:1fr}.actions .btn{width:100%}}
  </style>
</head>
<body>
<main class="app">
  <div class="top">
    <div><div class="eyebrow">Interne Arbeitsansicht</div><h1>Bocholt erleben</h1></div>
    <a class="btn back" href="/intern/?v=manual-work-return">Zurück</a>
  </div>
  <div id="status" class="status"></div>
  <div class="nav">
    <button class="active" data-mode="events">Neue Events</button>
    <button data-mode="audit">Content-Prüfung</button>
    <button data-mode="backlog">Backlog</button>
  </div>
  <section id="content"></section>
</main>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbxU3MYnINbhk-1XFehzGRYeto3f4BH9fyL6RmMlQPwmTt_wciHoESRo27nx1-KSIAos/exec";
const SUBMISSIONS_REVIEW_API_URL="/api/submissions/review-list.php";
const CONTENT_AUDIT_LIST_API_URL="/api/content-audit/list.php";
const CONTENT_AUDIT_UPDATE_API_URL="/api/content-audit/update.php";
const GROWTH_BACKLOG_LIST_API_URL="/api/growth-backlog/list.php";
const GROWTH_BACKLOG_UPDATE_API_URL="/api/growth-backlog/update.php";
const storageKey="beReviewPassword";
const $=id=>document.getElementById(id);
const esc=v=>String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
let password="",token="",mode="events",items=[],index=0,busy=false;
function setStatus(text){$("status").textContent=text||""}
function getPassword(){try{return localStorage.getItem(storageKey)||""}catch(e){return""}}
function formatDate(value){const s=String(value||"").trim();const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?`${m[3]}.${m[2]}.${m[1]}`:s}
function jsonp(apiUrl,params){return new Promise((resolve,reject)=>{const cb="__be_cb_"+Math.random().toString(16).slice(2);const qs=new URLSearchParams(params||{});qs.set("callback",cb);const script=document.createElement("script");window[cb]=data=>{cleanup();resolve(data)};script.onerror=()=>{cleanup();reject(new Error("jsonp_load_failed"))};function cleanup(){try{delete window[cb]}catch(e){window[cb]=undefined}script.remove()}script.src=apiUrl.replace(/\/exec.*$/,"/exec")+"?"+qs.toString()+"&t="+Date.now();document.body.appendChild(script)})}
async function unlock(){password=getPassword();if(!password){password=prompt("Review-Passwort:")||"";if(password){try{localStorage.setItem(storageKey,password)}catch(e){}}}if(!password)throw new Error("Kein Passwort vorhanden.");if(token)return true;const res=await jsonp(API_URL,{action:"unlock",password});if(!res||!res.ok||!res.token)throw new Error("Passwort konnte nicht entsperrt werden.");token=String(res.token);return true}
async function fetchJson(url,options={}){const res=await fetch(url,{credentials:"same-origin",cache:"no-store",...options,headers:{Accept:"application/json","X-BE-Review-Password":password,...(options.headers||{})}});const data=await res.json().catch(()=>null);if(!res.ok||!data||data.status!=="ok")throw new Error(data?.message||data?.error_message||"request_failed");return data}
async function postJson(url,payload){return fetchJson(url,{method:"POST",headers:{"Content-Type":"application/json; charset=utf-8"},body:JSON.stringify(payload||{})})}
async function load(){try{setStatus("Lade …");await unlock();if(mode==="events")await loadEvents();if(mode==="audit")await loadAudit();if(mode==="backlog")await loadBacklog();setStatus("");render()}catch(e){console.error(e);setStatus(e.message||String(e));$("content").innerHTML=`<div class="card"><h2>Arbeitsansicht konnte nicht geladen werden</h2><p class="sub">Bitte zurück ins Dashboard gehen, Passwort prüfen oder die alte Inbox als Fallback öffnen.</p><div class="actions"><a class="btn primary" href="/inbox/">Alte Inbox öffnen</a></div></div>`}}
async function loadEvents(){const [sheet,subs]=await Promise.all([jsonp(API_URL,{action:"listReview"}).catch(()=>({ok:false,items:[]})),fetchJson(SUBMISSIONS_REVIEW_API_URL).catch(()=>({data:{items:[]}}))]);const a=sheet&&sheet.ok&&Array.isArray(sheet.items)?sheet.items.map(x=>({...x,review_source:x.review_source||"sheet_inbox"})):[];const b=Array.isArray(subs.data?.items)?subs.data.items.map(x=>({...x,review_source:"submission_db"})):[];items=[...a,...b];index=0}
async function loadAudit(){const data=await fetchJson(CONTENT_AUDIT_LIST_API_URL);items=Array.isArray(data.data?.items)?data.data.items:[];index=0}
async function loadBacklog(){const data=await fetchJson(GROWTH_BACKLOG_LIST_API_URL);items=Array.isArray(data.data?.items)?data.data.items:[];index=0}
function current(){return items[index]||null}
function render(){document.querySelectorAll("[data-mode]").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));if(mode==="backlog")return renderBacklog();const item=current();if(!item)return $("content").innerHTML=`<div class="card empty">Keine offenen Karten in diesem Bereich.</div>`;if(mode==="audit")return renderAudit(item);renderEvent(item)}
function row(label,value){return value?`<div class="row"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`:""}
function commonNav(){return `<div class="actions"><button class="btn" ${index<=0?"disabled":""} data-prev>Zurück</button><button class="btn" ${index>=items.length-1?"disabled":""} data-next>Weiter</button></div><p class="sub">${index+1} von ${items.length}</p>`}
function renderEvent(it){const source=String(it.review_source||"");const isDb=source==="submission_db";const status=String(it.status||"");const date=formatDate(it.date||it.created_at);const time=it.time||"";const place=[it.location,it.city].filter(Boolean).join(" · ");$("content").innerHTML=`<article class="card"><div class="meta"><span class="tag">${isDb?"Einreichung":"KI-/Sheet-Inbox"}</span><span class="tag">${esc(status||"review")}</span></div><div class="title">${esc(it.title||"Ohne Titel")}</div><div class="sub">${esc([date,time,place].filter(Boolean).join(" · "))}</div>${row("Datum",date)}${row("Uhrzeit",time)}${row("Ort",place)}${row("Quelle",it.source_name)}${row("Beschreibung",it.description||it.notes)}${it.source_url||it.url?`<div class="actions"><a class="btn" href="${esc(it.source_url||it.url)}" target="_blank" rel="noopener noreferrer">Quelle öffnen</a></div>`:""}<div class="field"><label>Ablehnungsgrund</label><select id="rejectReason"><option value="">Bitte auswählen …</option><option>Doppelt / bereits abgedeckt</option><option>Termin liegt in der Vergangenheit</option><option>Quelle / Angaben reichen nicht</option><option>Nicht lokal genug</option><option>Redaktionell nicht passend</option></select></div><div class="actions"><button class="btn primary" data-event-approve>${isDb&&["pending_review","payment_released","checkout_started"].includes(status)?"Zur Zahlung freigeben":isDb&&["paid","in_review"].includes(status)?"Veröffentlichen":"Übernehmen"}</button><button class="btn danger" data-event-reject>Ablehnen / Verwerfen</button></div>${commonNav()}</article>`;bindCommon()}
async function actEvent(approve){if(busy)return;const it=current();if(!it)return;busy=true;try{await unlock();if(String(it.review_source||"")==="submission_db"){const id=Number(it.submission_id||0);if(!id)throw new Error("submission_id fehlt.");if(approve){const st=String(it.status||"");if(["pending_review","payment_released","checkout_started"].includes(st))await postJson("/api/submissions/release-payment.php",{submission_id:id});else await postJson("/api/submissions/approve.php",{submission_id:id});}else{const reason=$("rejectReason")?.value||"";if(!reason)throw new Error("Bitte Ablehnungsgrund auswählen.");await postJson("/api/submissions/reject.php",{submission_id:id,reason});}}else{if(!it.row_number)throw new Error("row_number fehlt.");if(approve){await jsonp(API_URL,{action:"approve",token,row_number:String(it.row_number)});}else{const reason=$("rejectReason")?.value||"";if(!reason)throw new Error("Bitte Ablehnungsgrund auswählen.");await jsonp(API_URL,{action:"setStatus",token,row_number:String(it.row_number),status:"verwerfen",ablehnungsgrund:reason});}}setStatus(approve?"Gespeichert.":"Verworfen.");await load()}catch(e){setStatus(e.message||String(e))}finally{busy=false}}
function renderAudit(it){$("content").innerHTML=`<article class="card"><div class="meta"><span class="tag">Content-Prüfung</span><span class="tag">${esc(it.severity||"Prüfung")}</span><span class="tag">${esc(it.workbench_group||it.process_category||"")}</span></div><div class="title">${esc(it.title||"Content-Prüffall")}</div><div class="sub">${esc([it.content_type,it.date].filter(Boolean).join(" · "))}</div>${row("Problem",it.issue_text)}${row("Empfehlung",it.recommended_action)}${row("Quelle",it.source_url)}${it.source_url?`<div class="actions"><a class="btn" href="${esc(it.source_url)}" target="_blank" rel="noopener noreferrer">Quelle öffnen</a></div>`:""}<div class="field"><label>Notiz</label><textarea id="auditNote" placeholder="Optionaler Prüfhinweis"></textarea></div><div class="actions"><button class="btn primary" data-audit-action="verify_full">Geprüft</button><button class="btn" data-audit-action="snooze">Zurückstellen</button><button class="btn danger" data-audit-action="mark_patch_needed">Patch nötig</button></div>${commonNav()}</article>`;bindCommon()}
async function actAudit(action){if(busy)return;const it=current();if(!it)return;busy=true;try{const payload={action,row_number:Number(it.row_number||0),content_id:String(it.content_id||""),issue_code:String(it.issue_code||""),review_note:$("auditNote")?.value||""};await postJson(CONTENT_AUDIT_UPDATE_API_URL,payload);setStatus("Content-Fall aktualisiert.");await load()}catch(e){setStatus(e.message||String(e))}finally{busy=false}}
function renderBacklog(){if(!items.length)return $("content").innerHTML=`<div class="card empty">Keine offenen Backlog-Punkte.</div>`;$("content").innerHTML=items.map(it=>`<article class="card"><div class="meta"><span class="tag">${esc(it.priority||"mittel")}</span><span class="tag">${esc(it.area||"Backlog")}</span></div><div class="title">${esc(it.title||"Backlog-Punkt")}</div><p class="sub">${esc(it.description||it.note||"")}</p><div class="actions"><button class="btn primary" data-backlog-action="complete" data-id="${esc(it.id)}">Abgeschlossen</button><button class="btn danger" data-backlog-action="reject" data-id="${esc(it.id)}">Ablehnen</button></div></article>`).join("")}
async function actBacklog(id,action){try{await postJson(GROWTH_BACKLOG_UPDATE_API_URL,{id,action});setStatus("Backlog aktualisiert.");await load()}catch(e){setStatus(e.message||String(e))}}
function bindCommon(){document.querySelector("[data-prev]")?.addEventListener("click",()=>{index=Math.max(0,index-1);render()});document.querySelector("[data-next]")?.addEventListener("click",()=>{index=Math.min(items.length-1,index+1);render()})}
document.body.addEventListener("click",e=>{const modeBtn=e.target.closest("[data-mode]");if(modeBtn){mode=modeBtn.dataset.mode;load();return}if(e.target.closest("[data-event-approve]"))actEvent(true);if(e.target.closest("[data-event-reject]"))actEvent(false);const a=e.target.closest("[data-audit-action]");if(a)actAudit(a.dataset.auditAction);const b=e.target.closest("[data-backlog-action]");if(b)actBacklog(b.dataset.id,b.dataset.backlogAction)});
load();
</script>
</body>
</html>

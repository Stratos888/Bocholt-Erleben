<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Bocholt erleben · Intern</title>
  <style>
    :root{--primary:#8BCF4A;--primary-muted:#EAF6DB;--background:#F9FBF6;--surface:#fff;--text:#1F2933;--muted:#5F6B73;--soft:#EDF2E8;--line:#DDE7D4;--danger:#B42318;--warning:#A15C07;--ok:#2E7D32;--shadow:0 16px 36px rgba(31,41,51,.08);--radius:24px}*{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:var(--background);color:var(--text);font:15px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}.app{min-height:100svh;padding:18px 16px calc(92px + env(safe-area-inset-bottom));max-width:720px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.eyebrow{color:var(--muted);font-size:13px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}h1{margin:3px 0 0;font-size:28px;line-height:1.05;letter-spacing:-.04em}.pill{border:1px solid var(--line);background:var(--surface);padding:8px 11px;border-radius:999px;font-size:13px;font-weight:800;color:var(--muted);white-space:nowrap}.hero{border-radius:30px;padding:22px;background:linear-gradient(135deg,var(--primary-muted),#fff);box-shadow:var(--shadow);border:1px solid rgba(139,207,74,.28);margin:12px 0 14px}.state{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.72);font-size:13px;font-weight:800;margin-bottom:12px}.dot{width:9px;height:9px;border-radius:50%;background:var(--ok)}.dot.warning{background:var(--warning)}.dot.blocked{background:var(--danger)}.hero h2{margin:0 0 8px;font-size:30px;line-height:1.02;letter-spacing:-.05em}.hero p,.card p{margin:0;color:var(--muted)}.next{margin-top:18px;border:1px solid var(--line);background:var(--surface);border-radius:22px;padding:15px}.next strong{display:block;font-size:17px;margin-bottom:3px}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:0 10px 24px rgba(31,41,51,.045)}.card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.card h3{margin:0 0 4px;font-size:18px;letter-spacing:-.025em}.num{font-size:28px;font-weight:900;line-height:1;letter-spacing:-.04em}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;background:var(--primary-muted);color:#38651F;font-size:12px;font-weight:850;margin-top:10px}.badge.warn{background:#FFF3D7;color:#7A4300}.badge.ai{background:#EBF1FF;color:#244B9A}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{background:#FBFCFA;border:1px solid var(--soft);border-radius:18px;padding:13px}.metric small{display:block;color:var(--muted);font-weight:750;margin-bottom:5px}.metric strong{font-size:23px;letter-spacing:-.035em}.task{display:grid;gap:10px}.task-top{display:flex;justify-content:space-between;gap:12px;align-items:start}.task-title{font-size:17px;font-weight:900;letter-spacing:-.025em}.task-count{min-width:44px;height:36px;display:grid;place-items:center;border-radius:14px;background:var(--primary-muted);font-weight:950}.task-meta,.action-row,.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}.tag{border-radius:999px;background:#F2F5EF;color:var(--muted);padding:4px 8px;font-size:12px;font-weight:800}.segment{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#EEF5E8;border:1px solid var(--line);border-radius:20px;padding:6px;margin-bottom:12px}.segment button,.mini-btn{border:0;border-radius:15px;padding:10px 12px;background:transparent;color:var(--muted);font-weight:900}.segment button.active,.mini-btn.primary{background:var(--surface);color:var(--text);box-shadow:0 6px 16px rgba(31,41,51,.06)}.mini-btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:#F2F5EF;color:var(--text);font-size:13px;padding:8px 10px}.filter-row{margin:0 0 12px}.filter-row .mini-btn.active{background:var(--primary-muted);color:#2E5B19}.case-card{padding:0;overflow:hidden}.case-card details{padding:0}.case-card summary{list-style:none;padding:17px;cursor:pointer}.case-card summary::-webkit-details-marker{display:none}.case-card[open],.case-card:has(details[open]){box-shadow:var(--shadow)}.case-body{display:grid;gap:10px;border-top:1px solid var(--soft);padding:0 17px 17px}.case-title{margin:0;font-size:17px;font-weight:950;letter-spacing:-.025em}.case-sub{color:var(--muted);font-weight:800;font-size:13px;margin-top:3px}.section{display:none}.section.active{display:block}.section-title{margin:18px 2px 10px;font-size:19px;letter-spacing:-.03em}.nav{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(249,251,246,.9);backdrop-filter:blur(18px);border-top:1px solid var(--line)}.nav-inner{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.nav button{border:0;border-radius:16px;padding:9px 5px;background:transparent;color:var(--muted);font-size:12px;font-weight:850}.nav button.active{background:var(--primary-muted);color:#2E5B19}.login{min-height:100svh;display:grid;place-items:center;padding:24px}.login-card{width:min(440px,100%);background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:var(--shadow)}.login-card h1{font-size:26px}.login-card input{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin:16px 0 10px;background:#FBFCFA}.primary-btn{width:100%;border:0;border-radius:16px;padding:13px 14px;background:var(--primary);font-weight:950;color:#1D3510}.primary-btn:disabled{opacity:.7}.error{color:var(--danger);font-weight:800;margin-top:10px}.muted{color:var(--muted)}.empty{padding:24px 8px;color:var(--muted);text-align:center}@media(min-width:700px){.grid.two{grid-template-columns:1fr 1fr}.hero h2{font-size:36px}}
  </style>
</head>
<body>
  <div id="login" class="login"><form class="login-card" id="loginForm"><div class="eyebrow">Intern</div><h1>Bocholt erleben</h1><p class="muted">Geschützte Steuerzentrale für Content, SEO, KI-Suche, Inbox und Systemzustand.</p><input id="password" type="password" autocomplete="current-password" placeholder="Review-Passwort"><button class="primary-btn" id="loginButton" type="submit">Dashboard öffnen</button><div id="loginError" class="error" hidden></div></form></div>
  <main id="app" class="app" hidden>
    <div class="top"><div><div class="eyebrow">Interne Steuerzentrale</div><h1>Bocholt erleben</h1></div><button class="pill" id="reloadBtn" type="button">Aktualisieren</button></div>
    <section class="section active" data-section="today"><div id="todayHero"></div><h2 class="section-title">Kurzstatus</h2><div id="todayCards" class="grid"></div></section>
    <section class="section" data-section="tasks"><h2 class="section-title">Aufgaben</h2><div id="tasksList" class="grid"></div></section>
    <section class="section" data-section="quality"><h2 class="section-title">Qualität</h2><div id="qualityCards" class="grid"></div></section>
    <section class="section" data-section="growth"><h2 class="section-title">Wachstum</h2><div id="growthCards" class="grid"></div></section>
    <section class="section" data-section="system"><h2 class="section-title">System</h2><div id="systemCards" class="grid"></div></section>
  </main>
  <nav id="nav" class="nav" hidden><div class="nav-inner"><button class="active" data-tab="today">Heute</button><button data-tab="tasks">Aufgaben</button><button data-tab="quality">Qualität</button><button data-tab="growth">Wachstum</button><button data-tab="system">System</button></div></nav>
  <script>
    const API_URL=new URL("../api/content-ops-dashboard.php?env=staging",window.location.href).toString();
    const CASES_URL=new URL("../api/content-ops-cases.php?env=staging",window.location.href).toString();
    const storageKey="beReviewPassword"; const $=id=>document.getElementById(id);
    let dashboard=null,cases={counts:{open_total:0,inbox:0,content_audit:0},items:[]},taskMode="overview",caseFilter="active";
    const optionalSources=new Set(["weekly_ki_websearch","manual_ki_intake"]);
    const esc=v=>String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
    function showLoginError(m){$("loginError").textContent=m||"Dashboard konnte nicht geladen werden.";$("loginError").hidden=false}
    function setLoginBusy(b){const x=$("loginButton");if(!x)return;x.disabled=b;x.textContent=b?"Dashboard wird geladen …":"Dashboard öffnen"}
    async function fetchJson(url,pw){const res=await fetch(url,{headers:{"X-BE-Review-Password":pw,"Accept":"application/json"},cache:"no-store"});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.message||("HTTP "+res.status));return data}
    async function loadDashboard(pw){if(!pw)throw new Error("Bitte Review-Passwort eingeben.");dashboard=await fetchJson(API_URL,pw);try{cases=await fetchJson(CASES_URL,pw)}catch(e){cases={status:"error",message:e.message,counts:{open_total:0,inbox:0,content_audit:0},items:[]}}try{localStorage.setItem(storageKey,pw)}catch(e){}$("login").hidden=true;$("app").hidden=false;$("nav").hidden=false;render()}
    function realSystemProblems(){return (dashboard?.system?.run_states||[]).filter(s=>s.state!=="ok"&&!optionalSources.has(s.source_mode))}
    function optionalNotes(){return (dashboard?.system?.run_states||[]).filter(s=>s.state!=="ok"&&optionalSources.has(s.source_mode))}
    function effectiveOverall(){const base=dashboard.overall; if(!dashboard) return base; if(base.state==="blocked") return base; const real=realSystemProblems(); if(real.length===0){return {state:"ok",headline:"Prozess greift",explanation:"Content-Prüfung, Inbox und Wachstum sind aktuell. Optionale KI-Läufe werden beobachtet, blockieren die Bewertung aber nicht.",next_action:base.next_action,attention_count:base.attention_count,attention_with_watch_count:base.attention_with_watch_count}} return base}
    function stateDot(s){return s==="blocked"?"dot blocked":s==="warning"?"dot warning":"dot"}
    function labelBucket(b){return {content:"Inhalt korrigieren",source:"Quelle prüfen",visual:"Bild prüfen",watch:"Beobachten",ki:"KI prüfen",inbox:"Inbox prüfen",later:"Später",done:"Erledigt"}[b]||"Fall prüfen"}
    function labelOrigin(o){return o==="inbox"?"Inbox":"Content-Prüfung"}
    function labelStatus(s,b){const map={needs_visual_fix:"Bild prüfen",needs_source:"Quelle prüfen",needs_patch:"Inhalt korrigieren",watch:"Beobachten",done:"Erledigt"};return map[String(s||"").toLowerCase()]||labelBucket(b)}
    function cleanMeta(item){if(item.origin==="content_audit")return [labelBucket(item.bucket),labelOrigin(item.origin)].join(" · ");return item.meta||labelOrigin(item.origin)}
    function render(){renderToday();renderTasks();renderQuality();renderGrowth();renderSystem()}
    function renderToday(){const o=effectiveOverall();const open=Number(cases?.counts?.open_total||0);const inbox=Number(cases?.counts?.inbox||0);const next=inbox>0?"Inbox-Elemente prüfen":open>0?"Prüffälle ansehen":o.next_action;$("todayHero").innerHTML=`<div class="hero"><div class="state"><span class="${stateDot(o.state)}"></span>${esc(o.headline)}</div><h2>${esc(o.attention_with_watch_count)} Punkte im Blick</h2><p>${esc(o.explanation)}</p><div class="next"><strong>Nächste sinnvolle Aktion</strong><p>${esc(next)}</p></div></div>`;const t=dashboard.today;$("todayCards").innerHTML=`<div class="split"><div class="metric"><small>Fälle offen</small><strong>${esc(open)}</strong></div><div class="metric"><small>Inbox</small><strong>${esc(inbox)}</strong></div><div class="metric"><small>Beobachten</small><strong>${esc(t.watch)}</strong></div><div class="metric"><small>Qualität</small><strong>${t.quality_clear_percent??"–"}%</strong></div></div><div class="card"><div class="card-head"><div><h3>Content-Qualität</h3><p>${esc(dashboard.quality.evaluation)}</p></div><div class="num">${t.quality_clear_percent??"–"}%</div></div><span class="badge">unkritisch / erledigt</span></div><div class="card"><h3>Zeiträume</h3><p>Heute, 7 Tage, 28 Tage, seit Referenzpunkt, seit Launch und später 6 Monate.</p><span class="badge warn">Referenzpunkt ${esc(dashboard.baseline_date)}</span></div>`}
    function dashboardTasks(){let tasks=[...(dashboard.tasks||[])].filter(t=>!(t.id==="system_health"&&realSystemProblems().length===0));const inbox=Number(cases?.counts?.inbox||0),open=Number(cases?.counts?.open_total||0);if(open>0&&inbox===0)tasks.unshift({id:"case_open_items",title:"Prüffälle ansehen",count:open,area:"Fälle",priority:"hoch",why:"Es gibt konkrete Einzelfälle aus Content-Prüfung, Quellen-, Bild- oder Beobachtungslogik.",next_action:"Fälle öffnen und die wichtigsten Einzelfälle prüfen.",ai_useful:true});if(inbox>0)tasks.unshift({id:"inbox_open_items",title:"Inbox-Elemente prüfen",count:inbox,area:"Inbox",priority:"hoch",why:"Hier warten konkrete Einzelentscheidungen. Diese Fälle sind wichtiger als reine Sammelkennzahlen.",next_action:"Fälle öffnen und Inbox-Einträge einzeln prüfen.",ai_useful:false});if(cases?.status==="error")tasks.unshift({id:"cases_load_error",title:"Fälle laden nicht",count:1,area:"System",priority:"hoch",why:"Die zentrale Bearbeitungsebene ist nicht verfügbar.",next_action:"Fälle-API prüfen.",ai_useful:true});return tasks}
    function renderTasks(){const tasks=dashboardTasks();$("tasksList").innerHTML=`<div class="segment"><button type="button" class="${taskMode==="overview"?"active":""}" data-task-mode="overview">Überblick</button><button type="button" class="${taskMode==="cases"?"active":""}" data-task-mode="cases">Fälle</button></div><div ${taskMode==="overview"?"":"hidden"}>${renderTaskOverview(tasks)}</div><div ${taskMode==="cases"?"":"hidden"}>${renderCases()}</div>`}
    function renderTaskOverview(tasks){if(!tasks.length)return`<div class="empty">Keine manuelle Aufgabe aus den letzten Läufen.</div>`;return`<div class="grid">${tasks.map(task=>`<article class="card task"><div class="task-top"><div><div class="task-title">${esc(task.title)}</div><div class="task-meta"><span class="tag">${esc(task.area)}</span><span class="tag">Priorität: ${esc(task.priority)}</span>${task.ai_useful?`<span class="tag">KI sinnvoll</span>`:``}</div></div><div class="task-count">${esc(task.count)}</div></div><p><strong>Warum?</strong> ${esc(task.why)}</p><p><strong>Nächster Schritt:</strong> ${esc(task.next_action)}</p>${task.id==="inbox_open_items"||task.id==="case_open_items"?`<div class="action-row"><button type="button" class="mini-btn primary" data-task-mode="cases">Fälle anzeigen</button></div>`:``}</article>`).join("")}</div>`}
    function casesForFilter(){const items=cases?.items||[];if(caseFilter==="active")return items.filter(i=>i.is_open&&i.bucket!=="later");if(caseFilter==="inbox")return items.filter(i=>i.origin==="inbox");return items.filter(i=>i.bucket===caseFilter)}
    function renderCases(){const c=cases?.counts||{};const filters=[["active","Offen",c.open_total||0],["content","Inhalte",c.content||0],["source","Quellen",c.source||0],["visual","Bilder",c.visual||0],["watch","Beobachten",c.watch||0],["inbox","Inbox",c.inbox||0],["done","Erledigt",c.done||0]];const items=casesForFilter();return`<div class="card"><h3>Fälle prüfen</h3><p>Hier stehen konkrete Einzelfälle aus Inbox, Content-Prüfung, Quellen, Bildern und Beobachtung. Karten sind eingeklappt, damit du mobil schnell priorisieren kannst.</p><span class="badge">${esc(c.open_total||0)} offen</span></div><div class="filter-row">${filters.map(([key,label,count])=>`<button type="button" class="mini-btn ${caseFilter===key?"active":""}" data-case-filter="${esc(key)}">${esc(label)} ${esc(count)}</button>`).join("")}</div><div class="grid">${items.length?items.map(renderCaseCard).join(""):`<div class="empty">Keine Fälle in diesem Filter.</div>`}</div>`}
    function renderCaseCard(item){const status=labelStatus(item.status,item.bucket);return`<article class="card case-card"><details><summary><div class="task-top"><div><h3 class="case-title">${esc(item.title)}</h3><div class="case-sub">${esc(status)}</div><div class="task-meta"><span class="tag">${esc(labelOrigin(item.origin))}</span><span class="tag">${esc(labelBucket(item.bucket))}</span>${item.origin==="content_audit"&&item.bucket!=="done"?`<span class="tag">KI sinnvoll</span>`:``}</div></div>${item.row_number?`<div class="task-count">#${esc(item.row_number)}</div>`:``}</div></summary><div class="case-body"><p><strong>Warum?</strong> ${esc(item.why)}</p>${cleanMeta(item)?`<p><strong>Einordnung:</strong> ${esc(cleanMeta(item))}</p>`:``}${item.description?`<p>${esc(item.description)}</p>`:``}${item.notes?`<p><strong>Notiz:</strong> ${esc(item.notes)}</p>`:``}${item.visual?`<p><strong>Visual:</strong> ${esc(item.visual)}</p>`:``}<p><strong>Nächster Schritt:</strong> ${esc(item.next_action)}</p><div class="action-row">${item.source_url?`<a class="mini-btn primary" href="${esc(item.source_url)}" target="_blank" rel="noopener noreferrer">Quelle öffnen</a>`:``}</div></div></details></article>`}
    function renderQuality(){const q=dashboard.quality,c=q.decision_class_counts||{};$("qualityCards").innerHTML=`<div class="card"><h3>Prozesswirkung</h3><p>${esc(q.trend)}</p><span class="badge">Bewertung</span></div><div class="split"><div class="metric"><small>Inhalte</small><strong>${esc(c.needs_patch||0)}</strong></div><div class="metric"><small>Quellen</small><strong>${esc(c.needs_source||0)}</strong></div><div class="metric"><small>Bilder</small><strong>${esc(c.needs_visual_fix||0)}</strong></div><div class="metric"><small>Beobachten</small><strong>${esc(c.watch||0)}</strong></div></div><div class="card"><h3>Einordnung</h3><p>${esc(q.evaluation)}</p></div>`}
    function renderGrowth(){const g=dashboard.growth;$("growthCards").innerHTML=`<div class="card"><h3>Wachstum / SEO</h3><p>${esc(g.evaluation)}</p></div><div class="split"><div class="metric"><small>SEO-Signale</small><strong>${esc(g.growth_items_created)}</strong></div><div class="metric"><small>KI-Funde</small><strong>${esc(g.ki_selected_candidates)}</strong></div><div class="metric"><small>GSC-Zeilen</small><strong>${esc(g.gsc_rows)}</strong></div><div class="metric"><small>GA4-Zeilen</small><strong>${esc(g.ga4_rows)}</strong></div></div><div class="card"><h3>Monatsreview</h3><p>Wenn hier SEO-, KI- oder Qualitätsauffälligkeiten auftauchen, gehört das als kompakter Export in die KI-Validierung.</p><span class="badge ai">für ChatGPT geeignet</span></div>`}
    function renderSystem(){const states=dashboard.system.run_states||[];$("systemCards").innerHTML=`<div class="card"><h3>Vertrauensbasis</h3><p>Hier steht nur, ob du den Zahlen vertrauen kannst. Optionale KI-Läufe werden nicht als Blocker gewertet.</p><span class="badge">Historie: ${esc(dashboard.system.history_date_count)} Messtage</span></div>${states.map(s=>{const optional=optionalSources.has(s.source_mode)&&s.state!=="ok";const label=optional?"optional":s.status_label;const reason=optional?"Noch kein Lauf vorhanden. Für die aktuelle Bewertung nicht kritisch.":s.reason;return`<article class="card"><div class="card-head"><div><h3>${esc(s.label)}</h3><p>${esc(reason)}</p></div><span class="pill">${esc(label)}</span></div><p style="margin-top:10px">Letzter Lauf: ${esc(s.age_label)}</p>${s.github_run_url?`<span class="badge">GitHub-Run vorhanden</span>`:``}</article>`}).join("")}`}
    $("loginForm").addEventListener("submit",async e=>{e.preventDefault();$("loginError").hidden=true;setLoginBusy(true);try{await loadDashboard($("password").value.trim())}catch(err){showLoginError(err&&err.message?err.message:"Dashboard konnte nicht geladen werden.")}finally{setLoginBusy(false)}});
    $("reloadBtn").addEventListener("click",()=>{let pw="";try{pw=localStorage.getItem(storageKey)||""}catch(e){}if(pw)loadDashboard(pw).catch(err=>alert(err.message))});
    $("tasksList").addEventListener("click",e=>{const mode=e.target.closest("[data-task-mode]");if(mode){taskMode=mode.getAttribute("data-task-mode")||"overview";renderTasks();return}const filter=e.target.closest("[data-case-filter]");if(filter){caseFilter=filter.getAttribute("data-case-filter")||"active";taskMode="cases";renderTasks()}});
    document.querySelectorAll("[data-tab]").forEach(btn=>btn.addEventListener("click",()=>{document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("active",b===btn));document.querySelectorAll("[data-section]").forEach(s=>s.classList.toggle("active",s.dataset.section===btn.dataset.tab))}));
    let saved="";try{saved=localStorage.getItem(storageKey)||""}catch(e){}if(saved){setLoginBusy(true);loadDashboard(saved).catch(()=>{try{localStorage.removeItem(storageKey)}catch(e){}}).finally(()=>setLoginBusy(false))}
  </script>
</body>
</html>

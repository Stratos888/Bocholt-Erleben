<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Bocholt erleben · Intern</title>
  <style>
    :root{--primary:#8BCF4A;--primary-muted:#EAF6DB;--background:#F9FBF6;--surface:#fff;--text:#1F2933;--muted:#5F6B73;--soft:#EDF2E8;--line:#DDE7D4;--danger:#B42318;--warning:#A15C07;--ok:#2E7D32;--shadow:0 16px 36px rgba(31,41,51,.08);--radius:24px}
    *{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:var(--background);color:var(--text);font:15px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}.app{min-height:100svh;padding:18px 16px calc(92px + env(safe-area-inset-bottom));max-width:720px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.eyebrow{color:var(--muted);font-size:13px;font-weight:750;letter-spacing:.02em;text-transform:uppercase}h1{margin:3px 0 0;font-size:28px;line-height:1.05;letter-spacing:-.04em}.pill{border:1px solid var(--line);background:var(--surface);padding:8px 11px;border-radius:999px;font-size:13px;font-weight:850;color:var(--muted);white-space:nowrap}.hero{border-radius:30px;padding:22px;background:linear-gradient(135deg,var(--primary-muted),#fff);box-shadow:var(--shadow);border:1px solid rgba(139,207,74,.28);margin:12px 0 14px}.state{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.72);font-size:13px;font-weight:850;margin-bottom:12px}.dot{width:9px;height:9px;border-radius:50%;background:var(--ok)}.dot.warning{background:var(--warning)}.dot.blocked{background:var(--danger)}.hero h2{margin:0 0 8px;font-size:30px;line-height:1.02;letter-spacing:-.05em}.hero p,.card p{margin:0;color:var(--muted)}.next{margin-top:18px;border:1px solid var(--line);background:var(--surface);border-radius:22px;padding:15px}.next strong{display:block;font-size:17px;margin-bottom:3px}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:0 10px 24px rgba(31,41,51,.045)}.card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.card h3{margin:0 0 4px;font-size:18px;letter-spacing:-.025em}.num{font-size:28px;font-weight:950;line-height:1;letter-spacing:-.04em}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;background:var(--primary-muted);color:#38651F;font-size:12px;font-weight:850;margin-top:10px}.badge.warn{background:#FFF3D7;color:#7A4300}.badge.ai{background:#EBF1FF;color:#244B9A}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{background:#FBFCFA;border:1px solid var(--soft);border-radius:18px;padding:13px}.metric small{display:block;color:var(--muted);font-weight:800;margin-bottom:5px}.metric strong{font-size:23px;letter-spacing:-.035em}.section{display:none}.section.active{display:block}.section-title{margin:18px 2px 10px;font-size:19px;letter-spacing:-.03em}.work-section-title{margin:22px 2px 10px;font-size:17px;letter-spacing:-.025em}.work-card{display:grid;gap:12px}.work-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.work-title{font-size:18px;font-weight:950;letter-spacing:-.03em}.work-sub{font-size:13px;color:var(--muted);font-weight:800;margin-top:3px}.work-count{min-width:48px;height:38px;display:grid;place-items:center;border-radius:15px;background:var(--primary-muted);font-weight:950}.tags,.actions,.filter-row{display:flex;gap:7px;flex-wrap:wrap}.tag{border-radius:999px;background:#F2F5EF;color:var(--muted);padding:4px 8px;font-size:12px;font-weight:850}.btn{border:0;border-radius:15px;padding:10px 12px;background:#F2F5EF;color:var(--text);font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.primary{background:var(--primary);color:#1D3510}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}.filter-row{margin:0 0 12px}.filter-row .btn.active{background:var(--primary-muted);color:#2E5B19}.cases-disclosure{border:0;padding:0;background:transparent;box-shadow:none}.cases-disclosure summary{cursor:pointer;list-style:none}.cases-disclosure summary::-webkit-details-marker{display:none}.case-card{padding:0;overflow:hidden}.case-card details{padding:0}.case-card summary{list-style:none;padding:17px;cursor:pointer}.case-card summary::-webkit-details-marker{display:none}.case-body{display:grid;gap:10px;border-top:1px solid var(--soft);padding:0 17px 17px}.case-title{margin:0;font-size:16px;font-weight:950;letter-spacing:-.02em}.case-sub{color:var(--muted);font-weight:800;font-size:13px;margin-top:3px}.empty{padding:24px 8px;color:var(--muted);text-align:center}.nav{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(249,251,246,.9);backdrop-filter:blur(18px);border-top:1px solid var(--line)}.nav-inner{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.nav button{border:0;border-radius:16px;padding:9px 5px;background:transparent;color:var(--muted);font-size:12px;font-weight:850}.nav button.active{background:var(--primary-muted);color:#2E5B19}.login{min-height:100svh;display:grid;place-items:center;padding:24px}.login-card{width:min(440px,100%);background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:var(--shadow)}.login-card h1{font-size:26px}.login-card input{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin:16px 0 10px;background:#FBFCFA}.primary-btn{width:100%;border:0;border-radius:16px;padding:13px 14px;background:var(--primary);font-weight:950;color:#1D3510}.primary-btn:disabled{opacity:.7}.error{color:var(--danger);font-weight:800;margin-top:10px}.muted{color:var(--muted)}@media(min-width:700px){.grid.two{grid-template-columns:1fr 1fr}.hero h2{font-size:36px}}
  </style>
</head>
<body>
  <div id="login" class="login"><form class="login-card" id="loginForm"><div class="eyebrow">Intern</div><h1>Bocholt erleben</h1><p class="muted">Geschützte Steuerzentrale für Content, SEO, KI-Suche, Inbox und Systemzustand.</p><input id="password" type="password" autocomplete="current-password" placeholder="Review-Passwort"><button class="primary-btn" id="loginButton" type="submit">Dashboard öffnen</button><div id="loginError" class="error" hidden></div></form></div>
  <main id="app" class="app" hidden>
    <div class="top"><div><div class="eyebrow">Interne Steuerzentrale</div><h1>Bocholt erleben</h1></div><button class="pill" id="reloadBtn" type="button">Aktualisieren</button></div>
    <section class="section active" data-section="today"><div id="todayHero"></div><h2 class="section-title">Kurzstatus</h2><div id="todayCards" class="grid"></div></section>
    <section class="section" data-section="tasks"><h2 class="section-title">Aufgaben</h2><div id="tasksList" class="grid"></div></section>
    <section class="section" data-section="quality"><h2 class="section-title">Qualität</h2><div id="qualityCards" class="grid"></div></section>
    <section class="section" data-section="growth"><h2 class="section-title">Wachstum</h2><div id="growthCards" class="grid"></div></section>
    <section class="section" data-section="system"><h2 class="section-title">System</h2><div id="systemCards" class="grid"></div></section>
  </main>
  <nav id="nav" class="nav" hidden><div class="nav-inner"><button class="active" data-tab="today">Heute</button><button data-tab="tasks">Aufgaben</button><button data-tab="quality">Qualität</button><button data-tab="growth">Wachstum</button><button data-tab="system">System</button></div></nav>
<script>
const API_URL=new URL("../api/content-ops-dashboard.php?env=staging",window.location.href).toString();
const CASES_URL=new URL("../api/content-ops-cases.php?env=staging",window.location.href).toString();
const WORK_URL=new URL("../inbox/",window.location.href).toString();
const storageKey="beReviewPassword";const $=id=>document.getElementById(id);
let dashboard=null,cases={counts:{open_total:0},items:[]},caseFilter="active";
const optionalSources=new Set(["weekly_ki_websearch","manual_ki_intake"]);
const esc=v=>String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
function showLoginError(m){$("loginError").textContent=m||"Dashboard konnte nicht geladen werden.";$("loginError").hidden=false}
function setLoginBusy(b){const x=$("loginButton");if(!x)return;x.disabled=b;x.textContent=b?"Dashboard wird geladen …":"Dashboard öffnen"}
async function fetchJson(url,pw){const res=await fetch(url,{headers:{"X-BE-Review-Password":pw,"Accept":"application/json"},cache:"no-store"});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.message||("HTTP "+res.status));return data}
async function loadDashboard(pw){if(!pw)throw new Error("Bitte Review-Passwort eingeben.");dashboard=await fetchJson(API_URL,pw);try{cases=await fetchJson(CASES_URL,pw)}catch(e){cases={status:"error",message:e.message,counts:{open_total:0},items:[]}}try{localStorage.setItem(storageKey,pw)}catch(e){}$("login").hidden=true;$("app").hidden=false;$("nav").hidden=false;render()}
function caseItems(){return Array.isArray(cases.items)?cases.items:[]}
function inboxOpen(){return caseItems().filter(i=>i.origin==="inbox"&&i.is_open).length}
function auditOpen(){return caseItems().filter(i=>i.origin==="content_audit"&&i.is_open&&!["watch","done","later"].includes(i.bucket)).length}
function watchCount(){return caseItems().filter(i=>i.is_open&&i.bucket==="watch").length||Number(dashboard?.today?.watch||0)}
function sourceCount(){return caseItems().filter(i=>i.is_open&&i.bucket==="source").length}
function visualCount(){return caseItems().filter(i=>i.is_open&&i.bucket==="visual").length}
function contentCount(){return caseItems().filter(i=>i.is_open&&i.bucket==="content").length}
function realSystemProblems(){return (dashboard?.system?.run_states||[]).filter(s=>s.state!=="ok"&&!optionalSources.has(s.source_mode))}
function effectiveOverall(){const base=dashboard.overall;if(base.state==="blocked")return base;if(realSystemProblems().length===0)return{...base,state:"ok",headline:"Prozess greift",explanation:"Die automatischen Kernprozesse liefern Daten. Manuelle Arbeit wird unten als klare Aufgabe angezeigt."};return base}
function nextManualTask(){if(realSystemProblems().length>0)return{title:"Automatik prüfen",reason:"Ein Kernprozess ist nicht gesund.",kind:"system"};if(inboxOpen()>0)return{title:"Neue Inbox-Einträge prüfen",reason:"Neue manuelle Entscheidungen warten.",kind:"work"};if(auditOpen()>0)return{title:"Content-Prüffälle bearbeiten",reason:"Inhalte, Quellen oder Bilder brauchen manuelle Prüfung.",kind:"work"};if(Number(dashboard?.growth?.growth_items_created||0)>0)return{title:"Wachstums-/Backlog-Punkte prüfen",reason:"Es gibt neue Hinweise für SEO, Wachstum oder Produktideen.",kind:"work"};if(watchCount()>0)return{title:"Beobachten",reason:"Keine Sofortaktion, aber Fälle für den nächsten Review vormerken.",kind:"observe"};return{title:"Keine manuelle Aktion",reason:"Aktuell musst du nichts bearbeiten.",kind:"none"}}
function stateDot(s){return s==="blocked"?"dot blocked":s==="warning"?"dot warning":"dot"}
function labelBucket(b){return{content:"Inhalt",source:"Quelle",visual:"Bild",watch:"Beobachten",ki:"KI",inbox:"Inbox",later:"Später",done:"Erledigt"}[b]||"Fall"}
function labelAction(item){const map={needs_visual_fix:"Bild prüfen",needs_source:"Quelle prüfen",needs_patch:"Inhalt korrigieren",watch:"Beobachten",done:"Erledigt"};return map[String(item.status||"").toLowerCase()]||({content:"Inhalt korrigieren",source:"Quelle prüfen",visual:"Bild prüfen",watch:"Beobachten",ki:"KI prüfen",inbox:"Inbox prüfen",done:"Erledigt"}[item.bucket]||"Prüfen")}
function originLabel(o){return o==="inbox"?"Inbox":"Content-Prüfung"}
function render(){renderToday();renderTasks();renderQuality();renderGrowth();renderSystem()}
function renderToday(){const o=effectiveOverall(),next=nextManualTask(),open=Number(cases?.counts?.open_total||0);$("todayHero").innerHTML=`<div class="hero"><div class="state"><span class="${stateDot(o.state)}"></span>${esc(o.headline)}</div><h2>${esc(open)} manuelle Punkte</h2><p>${esc(o.explanation)}</p><div class="next"><strong>Nächste sinnvolle Aktion</strong><p>${esc(next.title)} · ${esc(next.reason)}</p></div></div>`;const t=dashboard.today;$("todayCards").innerHTML=`<div class="split"><div class="metric"><small>Jetzt bearbeiten</small><strong>${esc(inboxOpen()+auditOpen())}</strong></div><div class="metric"><small>Inbox</small><strong>${esc(inboxOpen())}</strong></div><div class="metric"><small>Beobachten</small><strong>${esc(watchCount())}</strong></div><div class="metric"><small>Qualität</small><strong>${t.quality_clear_percent??"–"}%</strong></div></div><div class="card"><div class="card-head"><div><h3>Content-Qualität</h3><p>${esc(dashboard.quality.evaluation)}</p></div><div class="num">${t.quality_clear_percent??"–"}%</div></div><span class="badge">Bewertung</span></div><div class="card"><h3>Was bedeutet das?</h3><p>Alles Automatisierbare bleibt im Hintergrund. Hier erscheinen nur manuelle Entscheidungen, Sicherheitsprüfungen und kurze Bewertungen.</p></div>`}
function workCard({title,count,sub,why,cta,href,tab,ai}){const action=href?`<a class="btn primary" href="${esc(href)}">${esc(cta||"Bearbeiten")}</a>`:tab?`<button class="btn primary" type="button" data-go-tab="${esc(tab)}">${esc(cta||"Öffnen")}</button>`:"";return`<article class="card work-card"><div class="work-top"><div><div class="work-title">${esc(title)}</div>${sub?`<div class="work-sub">${esc(sub)}</div>`:""}<div class="tags"><span class="tag">manuell</span>${ai?`<span class="tag">KI sinnvoll</span>`:""}</div></div><div class="work-count">${esc(count)}</div></div><p>${esc(why)}</p>${action?`<div class="actions">${action}</div>`:""}</article>`}
function renderTasks(){const now=[];if(realSystemProblems().length>0)now.push(workCard({title:"Automatik prüfen",count:realSystemProblems().length,sub:"Kernprozess",why:"Ein wichtiger automatischer Prozess ist nicht gesund. Erst das prüfen, dann Zahlen bewerten.",cta:"System öffnen",tab:"system",ai:true}));if(inboxOpen()>0)now.push(workCard({title:"Neue Inbox-Einträge prüfen",count:inboxOpen(),sub:"Events / Aktivitäten / Einreichungen",why:"Diese Einträge brauchen eine manuelle Entscheidung wie übernehmen, ablehnen oder zurückstellen.",cta:"Arbeitsansicht öffnen",href:WORK_URL}));if(auditOpen()>0)now.push(workCard({title:"Content-Prüffälle bearbeiten",count:auditOpen(),sub:"Inhalte, Quellen und Bilder",why:"Diese Fälle können nicht sicher vollautomatisch entschieden werden und müssen manuell geprüft werden.",cta:"Arbeitsansicht öffnen",href:WORK_URL,ai:true}));if(Number(dashboard?.growth?.growth_items_created||0)>0)now.push(workCard({title:"Wachstums-/Backlog-Punkte prüfen",count:Number(dashboard.growth.growth_items_created),sub:"SEO / Wachstum / Produktideen",why:"Diese Hinweise sollen bewusst bewertet und nicht automatisch umgesetzt werden.",cta:"Arbeitsansicht öffnen",href:WORK_URL,ai:true}));const ki=[];if(sourceCount()>0)ki.push(workCard({title:"Quellen recherchieren lassen",count:sourceCount(),sub:"KI-Review geeignet",why:"Bei Quellenfällen kann KI helfen, offizielle oder bessere Nachweise zu finden.",cta:"Details ansehen",tab:"tasks",ai:true}));if(visualCount()>0)ki.push(workCard({title:"Bildfälle prüfen lassen",count:visualCount(),sub:"KI-Review geeignet",why:"Bei Bild-/Motivfällen kann KI helfen, den besten Visual-Fit vorzuschlagen. Freigabe bleibt manuell.",cta:"Details ansehen",tab:"tasks",ai:true}));const obs=watchCount()>0?[workCard({title:"Beobachten",count:watchCount(),sub:"Keine Sofortaktion",why:"Diese Fälle sollen im Blick bleiben, lösen aber heute keine Bearbeitung aus.",cta:"Details ansehen",tab:"tasks",ai:true})]:[];$("tasksList").innerHTML=`${renderNextTask()}<h3 class="work-section-title">Jetzt bearbeiten</h3><div class="grid">${now.length?now.join(""):`<div class="card"><h3>Nichts sofort zu bearbeiten</h3><p>Aktuell gibt es keine manuelle Sofortaufgabe.</p></div>`}</div><h3 class="work-section-title">Für KI vorbereiten</h3><div class="grid">${ki.length?ki.join(""):`<div class="card"><h3>Keine KI-Vorbereitung nötig</h3><p>Aktuell liegt kein separater KI-Review-Punkt obenauf.</p></div>`}</div><h3 class="work-section-title">Nur beobachten</h3><div class="grid">${obs.length?obs.join(""):`<div class="card"><h3>Nichts zu beobachten</h3><p>Keine zusätzlichen Beobachtungsfälle.</p></div>`}</div>${renderCaseDetails()}`}
function renderNextTask(){const n=nextManualTask();return`<div class="hero"><div class="state"><span class="dot"></span>Was muss ich jetzt tun?</div><h2>${esc(n.title)}</h2><p>${esc(n.reason)}</p></div>`}
function casesForFilter(){const items=caseItems();if(caseFilter==="active")return items.filter(i=>i.is_open&&i.bucket!=="later");if(caseFilter==="inbox")return items.filter(i=>i.origin==="inbox");return items.filter(i=>i.bucket===caseFilter)}
function renderCaseDetails(){const c=cases?.counts||{};const filters=[["active","Offen",c.open_total||0],["content","Inhalte",contentCount()],["source","Quellen",sourceCount()],["visual","Bilder",visualCount()],["watch","Beobachten",watchCount()],["inbox","Inbox",inboxOpen()],["done","Erledigt",c.done||0]];const items=casesForFilter();return`<details class="card cases-disclosure"><summary><div class="card-head"><div><h3>Details ansehen</h3><p>Nur öffnen, wenn du die einzelnen Prüffälle sehen willst. Bearbeitet wird über die Arbeitsansicht.</p></div><span class="pill">${esc(c.open_total||0)} offen</span></div></summary><div style="margin-top:14px"><div class="filter-row">${filters.map(([k,l,n])=>`<button type="button" class="btn ${caseFilter===k?"active":""}" data-case-filter="${esc(k)}">${esc(l)} ${esc(n)}</button>`).join("")}</div><div class="grid">${items.length?items.map(renderCaseCard).join(""):`<div class="empty">Keine Fälle in diesem Filter.</div>`}</div></div></details>`}
function renderCaseCard(item){return`<article class="card case-card"><details><summary><div class="work-top"><div><h3 class="case-title">${esc(item.title)}</h3><div class="case-sub">${esc(labelAction(item))}</div><div class="tags"><span class="tag">${esc(originLabel(item.origin))}</span><span class="tag">${esc(labelBucket(item.bucket))}</span></div></div>${item.row_number?`<div class="work-count">#${esc(item.row_number)}</div>`:""}</div></summary><div class="case-body"><p><strong>Warum?</strong> ${esc(item.why)}</p>${item.meta?`<p><strong>Einordnung:</strong> ${esc(item.meta)}</p>`:""}${item.description?`<p>${esc(item.description)}</p>`:""}${item.notes?`<p><strong>Notiz:</strong> ${esc(item.notes)}</p>`:""}${item.source_url?`<div class="actions"><a class="btn primary" href="${esc(item.source_url)}" target="_blank" rel="noopener noreferrer">Quelle öffnen</a><a class="btn" href="${esc(WORK_URL)}">Arbeitsansicht öffnen</a></div>`:`<div class="actions"><a class="btn primary" href="${esc(WORK_URL)}">Arbeitsansicht öffnen</a></div>`}</div></details></article>`}
function renderQuality(){const q=dashboard.quality,c=q.decision_class_counts||{};$("qualityCards").innerHTML=`<div class="card"><h3>Greift der Qualitätsprozess?</h3><p>${esc(q.trend)}</p><span class="badge">Bewertung</span></div><div class="split"><div class="metric"><small>Inhalte</small><strong>${esc(c.needs_patch||0)}</strong></div><div class="metric"><small>Quellen</small><strong>${esc(c.needs_source||0)}</strong></div><div class="metric"><small>Bilder</small><strong>${esc(c.needs_visual_fix||0)}</strong></div><div class="metric"><small>Beobachten</small><strong>${esc(c.watch||0)}</strong></div></div><div class="card"><h3>Einordnung</h3><p>${esc(q.evaluation)}</p></div>`}
function renderGrowth(){const g=dashboard.growth;$("growthCards").innerHTML=`<div class="card"><h3>Wird die App relevanter?</h3><p>${esc(g.evaluation)}</p></div><div class="split"><div class="metric"><small>SEO-Signale</small><strong>${esc(g.growth_items_created)}</strong></div><div class="metric"><small>KI-Funde</small><strong>${esc(g.ki_selected_candidates)}</strong></div><div class="metric"><small>GSC-Zeilen</small><strong>${esc(g.gsc_rows)}</strong></div><div class="metric"><small>GA4-Zeilen</small><strong>${esc(g.ga4_rows)}</strong></div></div><div class="card"><h3>Monatsreview</h3><p>Hier reicht ein kurzer Überblick. Nur echte manuelle Arbeit landet im Aufgaben-Tab.</p><span class="badge ai">für ChatGPT geeignet</span></div>`}
function renderSystem(){const states=dashboard.system.run_states||[];$("systemCards").innerHTML=`<div class="card"><h3>Kann ich den Daten vertrauen?</h3><p>Hier steht nur, ob die Zahlen belastbar sind. Optionale KI-Läufe werden nicht als Blocker gewertet.</p><span class="badge">Historie: ${esc(dashboard.system.history_date_count)} Messtage</span></div>${states.map(s=>{const optional=optionalSources.has(s.source_mode)&&s.state!=="ok";const label=optional?"optional":s.status_label;const reason=optional?"Noch kein Lauf vorhanden. Für die aktuelle Bewertung nicht kritisch.":s.reason;return`<article class="card"><div class="card-head"><div><h3>${esc(s.label)}</h3><p>${esc(reason)}</p></div><span class="pill">${esc(label)}</span></div><p style="margin-top:10px">Letzter Lauf: ${esc(s.age_label)}</p>${s.github_run_url?`<span class="badge">GitHub-Run vorhanden</span>`:""}</article>`}).join("")}`}
function goTab(tab){document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));document.querySelectorAll("[data-section]").forEach(s=>s.classList.toggle("active",s.dataset.section===tab));}
$("loginForm").addEventListener("submit",async e=>{e.preventDefault();$("loginError").hidden=true;setLoginBusy(true);try{await loadDashboard($("password").value.trim())}catch(err){showLoginError(err&&err.message?err.message:"Dashboard konnte nicht geladen werden.")}finally{setLoginBusy(false)}});
$("reloadBtn").addEventListener("click",()=>{let pw="";try{pw=localStorage.getItem(storageKey)||""}catch(e){}if(pw)loadDashboard(pw).catch(err=>alert(err.message))});
$("tasksList").addEventListener("click",e=>{const filter=e.target.closest("[data-case-filter]");if(filter){caseFilter=filter.getAttribute("data-case-filter")||"active";renderTasks();return}const tab=e.target.closest("[data-go-tab]");if(tab){goTab(tab.getAttribute("data-go-tab")||"tasks")}});
document.querySelectorAll("[data-tab]").forEach(btn=>btn.addEventListener("click",()=>goTab(btn.dataset.tab)));
let saved="";try{saved=localStorage.getItem(storageKey)||""}catch(e){}if(saved){setLoginBusy(true);loadDashboard(saved).catch(()=>{try{localStorage.removeItem(storageKey)}catch(e){}}).finally(()=>setLoginBusy(false))}
</script>
</body>
</html>

              "google": {
                  "sheet_id": os.environ.get("BE_SHEET_ID", ""),
                  "service_account_json": os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", ""),
              },
              # === END BLOCK: PRIVATE_CONFIG_GOOGLE_SHEET_PAYLOAD_V1 ===
              # === BEGIN BLOCK: PRIVATE_CONFIG_INBOX_PUSH_PAYLOAD_V1 | Zweck: optionale Web-Push-Konfiguration für interne Inbox-Hinweise; Umfang: ergänzt push-Konfiguration ohne Pflicht-Secrets ===
              "push": {
                  "enabled": bool(os.environ.get("APP_PUSH_VAPID_PUBLIC_KEY", "").strip() and os.environ.get("APP_PUSH_VAPID_PRIVATE_KEY_PEM", "").strip()),
                  "vapid_public_key": os.environ.get("APP_PUSH_VAPID_PUBLIC_KEY", "").strip(),
                  "vapid_private_key_pem": os.environ.get("APP_PUSH_VAPID_PRIVATE_KEY_PEM", "").strip(),
                  "subject": "mailto:info@bocholt-erleben.de",
                  "secret": os.environ.get("APP_PUSH_SECRET", "").strip(),
              },
              # === END BLOCK: PRIVATE_CONFIG_INBOX_PUSH_PAYLOAD_V1 ===
              # === END BLOCK: PRIVATE_CONFIG_REVIEW_PASSWORD_PAYLOAD_V1 ===
          }

          encoded = base64.b64encode(
              json.dumps(payload, ensure_ascii=False).encode("utf-8")
          ).decode("ascii")

          content = f"""<?php
          declare(strict_types=1);
          /* === BEGIN FILE: api/_config.php | Zweck: private Laufzeitkonfiguration fuer Backend und Datenbank; Umfang: komplette serverseitige Datei, nur im Deploy-Artefakt vorhanden === */
          return json_decode(base64_decode('{encoded}'), true, 512, JSON_THROW_ON_ERROR);
          /* === END FILE: api/_config.php === */
          """

          path = Path("deploy/api/_config.php")
          path.write_text(content, encoding="utf-8")
          # === END BLOCK: WRITE_PRIVATE_PHP_CONFIG_FROM_SECRETS_V1 ===
          PY

          test -s deploy/api/_config.php

          echo "=== DEPLOY CONTENTS ==="
          ls -la deploy
          echo "=== meta/build.txt ==="
          cat deploy/meta/build.txt
          echo "=== api directory ==="
          ls -la deploy/api
          # === END BLOCK: BUILD_VERSION_AND_INJECT_PRIVATE_PHP_CONFIG_V1 ===

      # === BEGIN BLOCK: STAGING_CONTENT_HASH_DELTA_V1 ===
      - name: Prepare staging content-hash delta
        shell: bash
        env:
          REQUEST_FULL_REPAIR: ${{ github.event_name == 'workflow_dispatch' && inputs.full_repair || false }}
        run: |
          set -euo pipefail
          MODE=full
          if [ "$DEPLOY_ENV_NAME" = staging ]; then MODE=delta; [ "$REQUEST_FULL_REPAIR" = true ] && MODE=full_repair; fi
          REMOTE=/tmp/deploy-manifest.json
          if [ "$MODE" = delta ]; then curl -fsSL --retry 2 --connect-timeout 10 "$SITE_ORIGIN/meta/deploy-manifest.json?run=$GITHUB_RUN_ID" -o "$REMOTE" || { echo '{}' > "$REMOTE"; MODE=full_repair; }; else echo '{}' > "$REMOTE"; fi
          echo "DEPLOY_MODE=$MODE" >> "$GITHUB_ENV"
          export MODE REMOTE
          python - <<'PY'
          import hashlib,json,os,shutil
          from pathlib import Path
          src=Path('deploy'); assets=Path('deploy-assets'); entry=Path('deploy-entry')
          for d in (assets,entry): shutil.rmtree(d,ignore_errors=True); d.mkdir(parents=True)
          def sha(p):
              h=hashlib.sha256()
              with p.open('rb') as f:
                  for c in iter(lambda:f.read(1048576),b''): h.update(c)
              return h.hexdigest()
          cur={p.relative_to(src).as_posix():sha(p) for p in src.rglob('*') if p.is_file() and p.relative_to(src).as_posix()!='meta/deploy-manifest.json'}
          try:
              old=json.loads(Path(os.environ['REMOTE']).read_text()).get('files',{})
              if not isinstance(old,dict): old={}
          except Exception: old={}
          mode=os.environ['MODE']; changed=set(cur) if mode!='delta' else {k for k,v in cur.items() if old.get(k)!=v}; deleted=(set(old)-set(cur)) if mode!='full' else set()
          if 'api/_config.php' in cur: changed.add('api/_config.php')
          late={k for k in cur if k.endswith('.html')}|{'meta/build.txt'}
          for rel in changed:
              a=src/rel; root=entry if rel in late else assets; b=root/rel; b.parent.mkdir(parents=True,exist_ok=True); shutil.copy2(a,b)
          manifest={'schema':1,'build':os.getenv('BUILD_ID',''),'environment':os.getenv('DEPLOY_ENV_NAME',''),'files':cur}
          m=entry/'meta/deploy-manifest.json'; m.parent.mkdir(parents=True,exist_ok=True); m.write_text(json.dumps(manifest,sort_keys=True,indent=2)+'\n')
          lines=[]
          for rel in sorted(deleted):
              if any(c in rel for c in ['"','\n','\r']): raise SystemExit('unsafe path')
              lines.append(f'rm -f "{rel}"')
          Path('deploy-delete.lftp').write_text('\n'.join(lines)+('\n' if lines else ''))
          print('mode',mode,'changed',len(changed),'deleted',len(deleted))
          PY
      # === END BLOCK: STAGING_CONTENT_HASH_DELTA_V1 ===

      - name: Install lftp
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      # === BEGIN BLOCK: STRATO_UPLOAD_DELTA_V1 ===
      - name: Upload changed assets to STRATO via SFTP
        timeout-minutes: 30
        shell: bash
        env:
          STRATO_FTP_SERVER: ${{ secrets.STRATO_FTP_SERVER }}
          STRATO_FTP_USERNAME: ${{ secrets.STRATO_FTP_USERNAME }}
          STRATO_FTP_PASSWORD: ${{ secrets.STRATO_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          DEL="$(cat deploy-delete.lftp 2>/dev/null || true)"
          lftp -u "$STRATO_FTP_USERNAME","$STRATO_FTP_PASSWORD" "sftp://$STRATO_FTP_SERVER" <<LFTP
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          set net:timeout 25
          set net:max-retries 4
          set net:reconnect-interval-base 2
          set net:reconnect-interval-max 15
          cd $DEPLOY_TARGET_DIR
          mirror -R --parallel=8 --verbose deploy-assets/ .
          $DEL
          bye
          LFTP

      - name: Publish HTML and build marker last
        timeout-minutes: 8
        shell: bash
        env:
          STRATO_FTP_SERVER: ${{ secrets.STRATO_FTP_SERVER }}
          STRATO_FTP_USERNAME: ${{ secrets.STRATO_FTP_USERNAME }}
          STRATO_FTP_PASSWORD: ${{ secrets.STRATO_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          lftp -u "$STRATO_FTP_USERNAME","$STRATO_FTP_PASSWORD" "sftp://$STRATO_FTP_SERVER" <<LFTP
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          set net:timeout 25
          set net:max-retries 4
          cd $DEPLOY_TARGET_DIR
          mirror -R --parallel=6 --verbose deploy-entry/ .
          bye
          LFTP
      # === END BLOCK: STRATO_UPLOAD_DELTA_V1 ===

      # === BEGIN BLOCK: DEPLOY_HTTP_SMOKE_CHECK_V1 | Zweck: prüft nach STRATO-Upload zentrale Live-/Staging-Endpunkte fail-fast; Umfang: ruft tools/smoke-check-deploy.py gegen die gerade deployte Umgebung auf ===
      - name: Smoke-check deployed site
        shell: bash
        run: |
          set -e

          if [ "$DEPLOY_ENV_NAME" = "staging" ]; then
            SMOKE_BASE_URL="https://staging.bocholt-erleben.de"
          else
            SMOKE_BASE_URL="https://bocholt-erleben.de"
          fi

          echo "SMOKE_BASE_URL=$SMOKE_BASE_URL" >> "$GITHUB_ENV"

          python tools/smoke-check-deploy.py \
            --base-url "$SMOKE_BASE_URL" \
            --expected-build "$BUILD_ID"
      # === END BLOCK: DEPLOY_HTTP_SMOKE_CHECK_V1 ===

      # === BEGIN BLOCK: DEPLOY_BROWSER_SMOKE_V1 | Zweck: prueft nach Upload die wichtigsten Browser-Nutzerwege read-only mit Desktop/Mobile-Profil; Umfang: Playwright Chromium, Summary und Screenshots bei Fehlern ===
      - name: Setup Node for browser smoke
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright for browser smoke
        shell: bash
        run: |
          set -e
          npm install --no-save playwright@1.50.1
          npx playwright install --with-deps chromium

      - name: Browser-smoke deployed site
        shell: bash
        run: |
          set -e
          mkdir -p artifacts/browser-smoke
          node scripts/browser-smoke.mjs \
            --base-url "$SMOKE_BASE_URL" \
            --profile all \
            --expected-build "$BUILD_ID" \
            --out-dir artifacts/browser-smoke

      - name: Add browser smoke summary
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/browser-smoke/summary.md ]; then
            cat artifacts/browser-smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Browser-Smoke hat keine summary.md erzeugt." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ github.ref_name }}-${{ github.run_number }}
          path: artifacts/browser-smoke/
          if-no-files-found: warn
      # === END BLOCK: DEPLOY_BROWSER_SMOKE_V1 ===

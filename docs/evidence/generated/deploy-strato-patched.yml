          import datetime as dt
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def now_iso():
              return dt.datetime.now(dt.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def source(status, site_url="", impressions=0, clicks=0, ctr=0.0, position=0.0, message=""):
              return {
                  "status": status,
                  "site_url": site_url,
                  "impressions": int(round(float(impressions or 0))),
                  "clicks": int(round(float(clicks or 0))),
                  "ctr": float(ctr or 0),
                  "position": float(position or 0),
                  "message": str(message or ""),
              }

          today = dt.datetime.now(dt.timezone.utc).date()

          current_end = today - dt.timedelta(days=3)
          current_start = current_end - dt.timedelta(days=27)

          previous_end = current_start - dt.timedelta(days=1)
          previous_start = previous_end - dt.timedelta(days=27)

          base_url = os.environ.get("APP_BASE_URL", "").strip().rstrip("/")
          google_site = os.environ.get("SEARCH_METRICS_GOOGLE_SITE_URL", "").strip() or (base_url + "/" if base_url else "")
          bing_site = os.environ.get("SEARCH_METRICS_BING_SITE_URL", "").strip() or base_url

          result = {
              "status": "not_configured",
              "generated_at": now_iso(),
              "period": {
                  "start_date": current_start.isoformat(),
                  "end_date": current_end.isoformat(),
                  "days": 28,
                  "note": "Google Search Console nutzt finalisierte Daten; Bing Webmaster QueryStats werden wöchentlich aktualisiert.",
              },
              "previous_period": {
                  "start_date": previous_start.isoformat(),
                  "end_date": previous_end.isoformat(),
                  "days": 28,
              },
              "sources": {
                  "google": source("not_configured", google_site, message="GOOGLE_SERVICE_ACCOUNT_JSON oder Search-Console-Zugriff fehlt."),
                  "bing": source("not_configured", bing_site, message="BING_WEBMASTER_API_KEY oder Bing-Webmaster-Zugriff fehlt."),
              },
              "previous_sources": {
                  "google": source("not_configured", google_site, message="GOOGLE_SERVICE_ACCOUNT_JSON oder Search-Console-Zugriff fehlt."),
                  "bing": source("not_configured", bing_site, message="BING_WEBMASTER_API_KEY oder Bing-Webmaster-Zugriff fehlt."),
              },
              "totals": {
                  "impressions": 0,
                  "clicks": 0,
              },
              "previous_totals": {
                  "impressions": 0,
                  "clicks": 0,
              },
          }

          def fetch_google(period_start, period_end):
              service_account_json = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", "").strip()
              if not service_account_json or not google_site:
                  return source("not_configured", google_site, message="Google Search Console ist nicht vollständig konfiguriert.")

              try:
                  from google.oauth2 import service_account
                  from googleapiclient.discovery import build

                  service_account_info = json.loads(service_account_json)
                  credentials = service_account.Credentials.from_service_account_info(
                      service_account_info,
                      scopes=["https://www.googleapis.com/auth/webmasters.readonly"],
                  )
                  service = build("searchconsole", "v1", credentials=credentials, cache_discovery=False)
                  response = service.searchanalytics().query(
                      siteUrl=google_site,
                      body={
                          "startDate": period_start.isoformat(),
                          "endDate": period_end.isoformat(),
                          "dimensions": [],
                          "type": "web",
                          "aggregationType": "byProperty",
                          "rowLimit": 1,
                      },
                  ).execute(num_retries=3)

                  rows = response.get("rows") or []
                  row = rows[0] if rows else {}
                  return source(
                      "ok",
                      google_site,
                      impressions=row.get("impressions", 0),
                      clicks=row.get("clicks", 0),
                      ctr=row.get("ctr", 0),
                      position=row.get("position", 0),
                  )
              except Exception as exc:
                  return source("error", google_site, message=f"Google Search Console Fehler: {type(exc).__name__}")

          def parse_bing_date(value):
              match = re.search(r"/Date\((\d+)", str(value or ""))
              if not match:
                  return None
              timestamp_ms = int(match.group(1))
              return dt.datetime.fromtimestamp(timestamp_ms / 1000, tz=dt.timezone.utc).date()

          def fetch_bing(period_start, period_end):
              api_key = os.environ.get("BING_WEBMASTER_API_KEY", "").strip()
              if not api_key or not bing_site:
                  return source("not_configured", bing_site, message="Bing Webmaster API ist nicht vollständig konfiguriert.")

              try:
                  params = urllib.parse.urlencode({"siteUrl": bing_site, "apikey": api_key})
                  url = f"https://ssl.bing.com/webmaster/api.svc/json/GetQueryStats?{params}"
                  request = urllib.request.Request(url, headers={"Accept": "application/json"})
                  with urllib.request.urlopen(request, timeout=45) as response:
                      payload = json.loads(response.read().decode("utf-8"))

                  rows = payload.get("d") or []
                  impressions = 0
                  clicks = 0
                  counted_rows = 0

                  for row in rows:
                      row_date = parse_bing_date(row.get("Date"))
                      if row_date is not None and not (period_start <= row_date <= period_end):
                          continue
                      impressions += int(round(float(row.get("Impressions") or 0)))
                      clicks += int(round(float(row.get("Clicks") or 0)))
                      counted_rows += 1

                  return source(
                      "ok",
                      bing_site,
                      impressions=impressions,
                      clicks=clicks,
                      message=f"{counted_rows} QueryStats-Zeilen im Zeitraum summiert.",
                  )
              except Exception as exc:
                  return source("error", bing_site, message=f"Bing Webmaster Fehler: {type(exc).__name__}")

          result["sources"]["google"] = fetch_google(current_start, current_end)
          result["sources"]["bing"] = fetch_bing(current_start, current_end)

          result["previous_sources"]["google"] = fetch_google(previous_start, previous_end)
          result["previous_sources"]["bing"] = fetch_bing(previous_start, previous_end)

          source_statuses = [entry.get("status") for entry in result["sources"].values()]
          if all(status == "ok" for status in source_statuses):
              result["status"] = "ok"
          elif any(status == "ok" for status in source_statuses):
              result["status"] = "partial"
          elif any(status == "error" for status in source_statuses):
              result["status"] = "error"
          else:
              result["status"] = "not_configured"

          result["totals"] = {
              "impressions": sum(entry.get("impressions", 0) for entry in result["sources"].values()),
              "clicks": sum(entry.get("clicks", 0) for entry in result["sources"].values()),
          }

          result["previous_totals"] = {
              "impressions": sum(entry.get("impressions", 0) for entry in result["previous_sources"].values()),
              "clicks": sum(entry.get("clicks", 0) for entry in result["previous_sources"].values()),
          }

          output_path = Path("deploy/data/search-metrics.json")
          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(json.dumps(result, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"=== search-metrics.json status: {result['status']} ===")
          PY

